(reduce upper airway muscle tone)\n• Family history; hypothyroidism; acromegaly","Symptoms (History)":"• Witnessed apnoeas (bed partner report) --- highly specific\n• Loud snoring, nocturnal choking or gasping arousals\n• Fragmented non-restorative sleep; nocturia; morning headaches; dry mouth\n• Excessive daytime sleepiness (Epworth Sleepiness Scale ≥8); fatigue, poor concentration, impaired cognitive function, irritability, mood disturbance\n• Women may present atypically: fatigue, insomnia, depression rather than classic snoring/apnoea\n• Risk: motor vehicle accidents (patients have 3× risk); relationship difficulties; occupational impairment\n• Use OSA50 questionnaire (validated in Australian primary care) or STOP-Bang for screening","Treatment":"• CPAP (continuous positive airway pressure): first-line for moderate--severe OSA or symptomatic mild OSA; pneumatic splint maintaining airway patency; minimum 4 h/night usage; most effective treatment\n• Mandibular advancement splint (MAS): effective for mild--moderate OSA or CPAP-intolerant patients; custom-fitted by dentist\n• Positional therapy: if OSA predominantly supine; devices to prevent supine sleep position\n• Weight loss: strongly recommended; 10% weight loss can reduce AHI by up to 26%; GLP-1 agonists (tirzepatide) showing benefit in trials\n• Upper airway surgery: uvulopalatopharyngoplasty (UPPP), tonsillectomy (if tonsillar obstruction), maxillomandibular advancement --- selected anatomical abnormalities\n• Hypoglossal nerve stimulation (Inspire): PBS-listed for moderate--severe OSA intolerant of CPAP\n• Address cardiovascular risk factors (HTN, AF); mandatory reporting obligations for commercial/heavy vehicle drivers in Australia (notify licensing authority)","Investigations":"• Overnight sleep study (polysomnography, PSG) --- gold standard: Level 1 (attended full PSG in laboratory) or Level 2 (unattended home PSG); Level 3 (home cardiorespiratory study, 4--6 channels) acceptable for straightforward presentations\n• Medicare rebate for Level 1/2 PSG: requires positive OSA screening questionnaire (OSA50 ≥5 or STOP-Bang ≥3) + ESS ≥8, OR specialist referral\n• AHI ≥5 confirms OSA; AHI ≥30 = severe\n• TFT (hypothyroidism), IGF-1 (acromegaly) if clinically indicated; ECG; echocardiogram if pulmonary hypertension suspected\n• Epworth Sleepiness Scale for quantifying and monitoring sleepiness"}},{"name":"Bronchiectasis","stars":2,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"• Permanent abnormal dilatation and distortion of bronchi due to chronic airway inflammation and transmural destruction of bronchial walls\n• Post-infective (most common in Australia): recurrent childhood pneumonia, pertussis, measles, TB, NTM (non-tuberculous mycobacteria)\n• Underlying causes: cystic fibrosis (commonest genetic cause, especially young patients), primary ciliary dyskinesia, hypogammaglobulinaemia, alpha-1 antitrypsin deficiency, ABPA (allergic bronchopulmonary aspergillosis)\n• Idiopathic in \\~50% of cases; COPD and severe asthma can also cause bronchiectasis","Risk Factors":"• Recurrent severe lower respiratory tract infections in childhood\n• Immune deficiencies (common variable immunodeficiency, selective IgA deficiency)\n• Cystic fibrosis (CFTR mutation); primary ciliary dyskinesia\n• Previous pulmonary TB or NTM infection\n• Connective tissue diseases (rheumatoid arthritis, Sjögren's syndrome)\n• Inhaled foreign body (can cause localised bronchiectasis)","Symptoms (History)":"• Chronic productive cough: daily, large volumes of mucopurulent sputum (often >30 mL/day); '3-cup sign' (sputum layer into mucus, pus, fluid)\n• Haemoptysis (common; occasionally massive --- from bronchial artery erosion)\n• Recurrent lower respiratory tract infections/exacerbations (increased sputum, dyspnoea, fever)\n• Dyspnoea (progressive with extensive disease); pleuritic chest pain\n• Constitutional: fatigue, weight loss in severe/advanced disease","Treatment":"• Airway clearance: chest physiotherapy (active cycle of breathing techniques, flutter valve, acapella); postural drainage; oscillating PEP devices (first-line non-pharmacological intervention)\n• Treat exacerbations with antibiotics: guided by sputum culture; amoxicillin-clavulanate or doxycycline empirically; antipseudomonal beta-lactam (piperacillin-tazobactam or ceftazidime) + aminoglycoside if Pseudomonas\n• Chronic suppressive/rotating antibiotics: for frequent exacerbations (≥3/year); inhaled tobramycin, azithromycin 250 mg 3×/week (anti-inflammatory + antibiotic)\n• Treat underlying cause (IVIG for hypogammaglobulinaemia, itraconazole for ABPA, CFTR modulators for CF)\n• Mucolytics: nebulised hypertonic saline (7%) improves mucociliary clearance; DNase (dornase alfa) for CF only\n• Bronchodilators (if reversible airflow obstruction); pulmonary rehabilitation\n• Surgery: resection for localised disease causing recurrent haemoptysis or infection; bronchial artery embolisation for massive haemoptysis","Investigations":"• HRCT chest (gold standard): signet ring sign (dilated bronchus > adjacent pulmonary artery), bronchial wall thickening, lack of tapering, 'tram-track' lines, mucus plugging; identify distribution and extent\n• Sputum M/C/S: identify colonising/infecting organisms (Pseudomonas aeruginosa, H. influenzae, Aspergillus); guide antibiotic choice\n• PFTs: obstructive pattern (FEV₁/FVC <0.70) most common; mixed pattern in advanced disease\n• Bloods: FBC (neutrophilia in exacerbation), serum immunoglobulins (IgG, IgA, IgM), specific antibody titres (Pneumococcal, Hib), serum IgE/RAST (ABPA), CFTR testing if CF suspected\n• CXR: tram-tracks, ring shadows, loss of volume; less sensitive than CT"}},{"name":"Pulmonary Hypertension","stars":2,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"• Defined haemodynamically as mean pulmonary artery pressure (mPAP) >20 mmHg at rest on right heart catheterisation (2022 ESC/ERS guidelines revision from previous threshold of 25 mmHg)\n• WHO classification (5 groups): Group 1 --- pulmonary arterial hypertension (PAH; idiopathic, heritable, drug/toxin-induced, associated with CTD/HIV/portal HTN/CHD); Group 2 --- left heart disease (commonest cause); Group 3 --- lung diseases/hypoxia (COPD, ILD, OSA); Group 4 --- chronic thromboembolic PH (CTEPH); Group 5 --- unclear/multifactorial\n• Pathophysiology (PAH/Group 1): endothelial dysfunction → imbalance of vasodilators (prostacyclin, NO) vs vasoconstrictors (endothelin) → pulmonary vasoconstriction, vascular remodelling, in-situ thrombosis → progressive RV failure","Risk Factors":"• Left heart disease (heart failure, valvular disease --- Group 2)\n• Lung disease: COPD, ILD, OSA --- Group 3\n• Prior PE/DVT --- risk for CTEPH (Group 4)\n• Connective tissue disease (systemic sclerosis highest risk --- \\~15% develop PAH); SLE, MCTD\n• Appetite suppressants (fenfluramine derivatives); methamphetamine; dasatinib; SSRIs (in neonates)\n• Family history of PAH (BMPR2 mutation in heritable PAH); female sex, younger age for idiopathic PAH","Symptoms (History)":"• Progressive exertional dyspnoea (commonest and earliest symptom; often attributed to deconditioning)\n• Fatigue, exercise intolerance, syncope or presyncope on exertion (reflects reduced cardiac output)\n• Chest pain (right ventricular ischaemia), palpitations (AF, flutter with RV dilation)\n• Peripheral oedema, abdominal distension (ascites) in advanced right heart failure\n• Symptoms of underlying cause: wheeze (COPD), Raynaud's/telangiectasia (systemic sclerosis), haemoptysis (CTEPH)","Treatment":"• Group 2 (left heart disease): treat underlying heart disease (diuretics, ACEi/ARB, beta-blockers); PAH-specific medications NOT indicated\n• Group 3 (lung disease/hypoxia): LTOT if hypoxaemia; treat underlying lung disease; PAH-specific medications generally NOT indicated\n• Group 4 CTEPH: pulmonary endarterectomy (PEA) is potentially curative --- refer to specialist CTEPH centre; lifelong anticoagulation; riociguat (PBS-listed) for inoperable CTEPH\n• Group 1 PAH: risk stratification guides therapy (low/intermediate/high risk); vasoreactivity testing (acute responders → high-dose CCB); non-responders → specific pulmonary vasodilators:\n• -- Endothelin receptor antagonists (ERA): bosentan, ambrisentan, macitentan (PBS-listed)\n• -- PDE-5 inhibitors: sildenafil, tadalafil (PBS-listed)\n• -- Prostacyclin pathway: epoprostenol (IV; most potent; advanced disease), iloprost (inhaled), selexipag (oral)\n• -- Combination therapy (ERA + PDE-5i ± prostacyclin) recommended upfront for intermediate/high-risk PAH\n• Lung transplantation: considered for advanced PAH failing maximal medical therapy","Investigations":"• Echo (TTE): initial screening --- estimates sPAP via TR jet velocity, RV dilation/dysfunction, septal flattening (D-sign), pericardial effusion; intermediate/high probability → refer to PH centre\n• Right heart catheterisation (gold standard and mandatory for definitive diagnosis, especially Group 1 PAH): confirms mPAP >20 mmHg, measures PVR, PAWP; differentiates pre- from post-capillary PH\n• CT chest (HRCT): parenchymal lung disease (Groups 2/3); CT-PA for PE; main PA dilation (>29 mm suggests PH)\n• V/Q scan: high sensitivity for CTEPH (preferred over CTPA for CTEPH screening)\n• PFTs + DLCO: obstructive (COPD) or restrictive (ILD, scleroderma) pattern; disproportionately reduced DLCO suggests PAH or CTEPH\n• 6-minute walk test (6MWT): functional capacity, prognosis, treatment response\n• Bloods: BNP/NT-proBNP (severity/prognosis marker, now MBS-listed for PAH); ANA, ENA, anti-Scl-70, anti-centromere (CTD); HIV, LFTs, TFT"}},{"name":"Pulmonary Tuberculosis","stars":2,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"• Caused by Mycobacterium tuberculosis (MTB); obligate aerobe, slow-growing, acid-fast bacillus with lipid-rich waxy cell wall\n• Transmission: airborne droplet nuclei (1--5 µm); highly infectious --- a single cough produces \\~3,000 droplet nuclei\n• Primary TB: initial infection --- Ghon focus (subpleural lesion) + hilar lymph nodes = Ghon complex; usually contained by cell-mediated immunity\n• Latent TB infection (LTBI): \\~10% risk of reactivation lifetime; greatest in first 2 years post-infection, immunocompromised\n• Reactivation (post-primary) TB: upper lobe/posterior segment predilection (high O₂ tension); cavitation characteristic\n• Epidemiology: Australia has low incidence (\\~6/100,000); most cases in overseas-born individuals; Indigenous Australians have higher risk","Risk Factors":"• Birth in or travel to high-prevalence country (South-East Asia, Pacific Islands, Africa, India)\n• Close contact with active pulmonary TB case\n• Immunocompromise: HIV (greatest risk; 100× increased risk), TNF-alpha inhibitors, immunosuppressive drugs, organ transplant\n• Malnutrition, alcohol misuse, homelessness, incarceration\n• Silicosis; diabetes mellitus; end-stage renal failure\n• Indigenous Australians; healthcare workers without adequate PPE","Symptoms (History)":"• Classical subacute presentation: persistent cough >2--3 weeks (dry initially, then productive), haemoptysis\n• Constitutional 'B symptoms': fever (low-grade, afternoon/evening), drenching night sweats, unintentional weight loss, fatigue, anorexia\n• Dyspnoea (with extensive disease, pleural effusion, or pneumothorax)\n• Pleuritic chest pain (pleural involvement)\n• Extrapulmonary TB (39% of Australian notifications): lymphadenopathy (most common), pleural effusion, meningitis, bone/joint (Pott's disease), genitourinary, miliary (disseminated --- haematogenous spread)","Treatment":"• Notifiable disease in all Australian states and territories --- mandatory reporting to public health unit; contact tracing mandatory\n• Standard regimen (drug-sensitive TB): Initial phase: 2 months of isoniazid (INH) + rifampicin (RIF) + pyrazinamide (PZA) + ethambutol (EMB) --- 2HRZE; Continuation phase: 4 months of INH + RIF --- 4HR; total 6 months\n• Directly observed therapy (DOT): recommended for all patients in Australia to ensure adherence and treatment completion; supervised by TB clinic nurses\n• Pyridoxine (vitamin B6): supplement with INH to prevent peripheral neuropathy\n• LTBI treatment: 9 months INH, or 4 months RIF, or 3 months INH+rifapentine (3HP) --- decision guided by risk-benefit analysis\n• MDR-TB (resistant to INH + RIF): complex 18--24 month regimen with bedaquiline, linezolid; manage at specialist TB centre\n• Treatment of LTBI (preventive therapy) in high-risk contacts/immunocompromised: screen and treat with specialist guidance\n• BCG vaccination: offered to neonates of high-risk parents (high TB prevalence countries) and healthcare workers without immunity in some states","Investigations":"• CXR: upper lobe infiltrates, cavitation, calcified Ghon complex, hilar lymphadenopathy, miliary pattern (1--2 mm nodules); normal CXR does not exclude TB in HIV\n• Sputum microscopy (Ziehl-Neelsen stain/auramine): acid-fast bacilli detected in \\~50% (requires \\~5,000 bacilli/mL)\n• Sputum culture (Löwenstein-Jensen or BACTEC MGIT): gold standard; 4--8 weeks turnaround; required for drug sensitivity testing\n• Nucleic acid amplification test (NAAT/Xpert MTB/RIF): rapid (2 h) detection of MTB + rifampicin resistance; high sensitivity/specificity; preferred initial test\n• IGRA (QuantiFERON-TB Gold Plus) or TST (Mantoux): test for LTBI or exposure; cannot distinguish LTBI from active TB --- requires CXR and clinical context\n• Bronchoscopy + BAL: for smear-negative cases or where sputum cannot be obtained\n• CT chest: better characterises extent; detects cavitation, nodules, miliary pattern\n• Bloods: FBC, LFT (baseline before treatment); HIV test (mandatory in all confirmed TB)"}},{"name":"Pneumothorax","stars":2,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"• Air in the pleural space causing lung collapse; classified as:\n• Primary spontaneous pneumothorax (PSP): no underlying lung disease; rupture of apical subpleural blebs; tall young males (20--40 years), Marfan syndrome\n• Secondary spontaneous pneumothorax (SSP): underlying lung disease --- COPD (most common cause of SSP), asthma, cystic fibrosis, TB, Pneumocystis jirovecii pneumonia, lung cancer; higher morbidity due to reduced reserve\n• Traumatic pneumothorax: penetrating or blunt chest trauma; iatrogenic (CVC insertion, thoracocentesis, lung biopsy, positive pressure ventilation)\n• Tension pneumothorax: one-way valve mechanism → progressive air accumulation → mediastinal shift → impaired venous return → cardiovascular collapse; medical emergency","Risk Factors":"• PSP: tall, thin, young male habitus; cigarette smoking (increases risk 20-fold in men); family history; Marfan/Ehlers-Danlos syndrome\n• SSP: COPD, asthma, cystic fibrosis, TB, pulmonary fibrosis, cancer\n• Iatrogenic: CVC/subclavian line, thoracocentesis, transbronchial biopsy, positive pressure ventilation (barotrauma)\n• Traumatic: penetrating (stab wound, bullet) or blunt chest trauma; rib fractures","Symptoms (History)":"• Sudden onset ipsilateral pleuritic chest pain (sharp, worsens with breathing) and dyspnoea --- classic presentation\n• May be minimal symptoms in small PSP (young patient with good reserve)\n• SSP: more severe symptoms for same size pneumothorax due to limited pulmonary reserve\n• Tension pneumothorax: severe dyspnoea, agitation, rapidly worsening haemodynamic compromise --- do NOT wait for imaging before treatment","Treatment":"• Tension pneumothorax: immediate needle decompression (14--16G cannula, 2nd intercostal space, mid-clavicular line OR 4th--5th ICS anterior axillary line) followed by intercostal drain (ICD/chest tube) --- clinical diagnosis, do not wait for imaging\n• Small PSP (<2 cm, not breathless): observation + high-flow O₂ (4× faster reabsorption), discharge with follow-up CXR 2--4 weeks; 6 hours observation in ED\n• Large PSP (≥2 cm) or symptomatic: needle aspiration (14--16G, midclavicular 2nd ICS) ± ICD; small-bore Seldinger drain preferred\n• SSP: ICD (intercostal drain); admit; treat underlying disease\n• Recurrent/persistent air leak (>5--7 days): VATS + bullectomy + pleurodesis (mechanical or talc); refer to thoracic surgery\n• Indications for surgery (VATS): 2nd ipsilateral pneumothorax, 1st contralateral, bilateral simultaneous, persistent air leak, failure of expansion, occupational risk (pilot, diver)\n• Post-discharge: no air travel until CXR confirms resolution (minimum 1 week after); SCUBA diving permanently contraindicated after any pneumothorax; smoking cessation essential","Investigations":"• CXR (PA, erect, expiratory): visualises visceral pleural line; quantify size --- rim >2 cm from chest wall = large (BTS); classify as small (<2 cm) or large (≥2 cm)\n• CT chest: superior sensitivity; mandatory for SSP (characterises underlying disease); detects bilateral or small pneumothoraces not seen on CXR; guides treatment decisions\n• Bedside USS (POCUS): absence of lung sliding and comet tail artefacts; highly sensitive; useful in trauma (eFAST)\n• ABG: hypoxaemia, hypocapnia; ECG: sinus tachycardia, anterior changes (may mimic MI)"}},{"name":"Haemothorax","stars":3,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"• Accumulation of blood in the pleural space; defined as pleural fluid haematocrit >50% of peripheral blood haematocrit\n• Traumatic haemothorax (most common): blunt or penetrating chest trauma; sources include intercostal vessels, internal mammary artery, pulmonary parenchymal lacerations, great vessel injury, cardiac injury\n• Spontaneous haemothorax: uncommon --- coagulopathy (anticoagulant therapy, haemophilia), malignancy (mesothelioma, vascular tumours), vascular (ruptured aortic aneurysm, arteriovenous malformation)\n• Haemopneumothorax: concurrent haemothorax and pneumothorax --- common in trauma\n• Undrained haemothorax risk: infection → empyema; fibrin organisation → fibrothorax/trapped lung","Risk Factors":"• Blunt chest trauma (MVA --- most common in Australia; falls, sport/crush injury)\n• Penetrating chest injury (stab wound, gunshot, iatrogenic --- during central line insertion, thoracocentesis)\n• Anticoagulation therapy (warfarin, DOACs, heparin)\n• Underlying malignancy involving thorax\n• Coagulopathy (liver disease, haematological disorders)\n• Aortic or pulmonary vascular pathology","Symptoms (History)":"• Ipsilateral chest pain (pleuritic or due to rib fractures); dyspnoea\n• Symptoms of hypovolaemia: dizziness, pallor, diaphoresis, thirst, haemodynamic instability (tachycardia, hypotension) --- proportional to blood volume lost\n• In trauma: frequently part of polytrauma --- assess for concurrent injuries (pneumothorax, rib fractures, lung contusion, abdominal injury, cardiac tamponade)\n• Retained haemothorax (delayed presentation): increasing dyspnoea, fever (empyema), chest wall rigidity","Treatment":"• Initial resuscitation: ATLS primary survey (ABCDE); 2× large-bore IV access; IV fluid resuscitation; massive transfusion protocol if haemorrhagic shock (1:1:1 pRBC:FFP:platelets); O₂ supplementation\n• Intercostal drain (ICD/chest tube): definitive initial treatment --- large-bore (28--36 Fr) drain in 'triangle of safety' (4th--5th ICS, anterior axillary line); drains blood, allows lung re-expansion, monitors ongoing losses, prevents empyema and fibrothorax\n• Indications for emergency thoracotomy (urgent surgical intervention):\n• -- Immediate drainage >1,500 mL (massive haemothorax)\n• -- Ongoing drainage >200--300 mL/h for 2--4 consecutive hours\n• -- Haemodynamic instability not responding to resuscitation\n• -- Great vessel or cardiac injury suspected\n• VATS (video-assisted thoracoscopic surgery): for retained/clotted haemothorax (ideally within 3--7 days before organisation); superior to repeat thoracocentesis; reduces risk of empyema and fibrothorax\n• Retained/clotted haemothorax: intrapleural fibrinolytics (tPA + DNase) may be used before VATS in selected cases\n• Correct coagulopathy if anticoagulant-related; reverse anticoagulation as clinically appropriate\n• Monitor for complications: empyema (fever, systemic sepsis), fibrothorax (persistent dyspnoea, CXR showing pleural thickening --- may require decortication)","Investigations":"• eFAST (extended FAST USS): first-line in trauma; detects haemothorax (>200 mL) rapidly at bedside; more sensitive than supine CXR\n• CXR (erect PA): opacification with meniscus; supine CXR may miss significant haemothorax (appears as diffuse haziness)\n• CT chest (with contrast): definitive characterisation; identifies source of bleeding, concurrent injuries, retained clot; not in haemodynamically unstable patients\n• FBC, coagulation studies (PT/APTT/INR), group and crossmatch --- essential in all significant haemothorax\n• ABG: assess respiratory failure; blood gas from pleural fluid confirms haemothorax if haematocrit >50% serum\n• Pleural fluid analysis: haemothorax if haematocrit >50% peripheral blood"}},{"name":"Rib Fractures","stars":3,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"• Disruption of rib cortical continuity from direct or indirect force; occur in \\~20--40% of blunt chest wall trauma in Australia\n• Blunt trauma mechanisms: MVA (most common), fall from height, sport, assault, crush injury\n• Low-energy mechanisms in elderly/osteoporotic patients (falls, coughing --- 'cough fractures')\n• Flail chest: 3 or more consecutive rib fractures in ≥2 places creating a free-floating segment with paradoxical movement during respiration; mortality 20--30%; associated with underlying pulmonary contusion\n• Complications: pain → splinting → impaired cough → atelectasis → pneumonia; pneumothorax, haemothorax, pulmonary contusion, aortic injury, intra-abdominal organ injury (lower ribs: liver/spleen)\n• Elderly patients: same mechanism causes more severe injury; higher complication and mortality rates","Risk Factors":"• Elderly age and osteoporosis (significantly lowers fracture threshold)\n• High-energy trauma: MVA, fall from height, sports collision\n• Chronic corticosteroid use (secondary osteoporosis)\n• Underlying bone metastases or myeloma (pathological fractures)\n• Repetitive strain: stress fractures in rowers, golfers, coughing in COPD","Symptoms (History)":"• Localised chest pain: sharp, well-localised to fracture site; significantly worsened by inspiration, coughing, movement --- leads to voluntary splinting\n• Dyspnoea (secondary to pain-related splinting and impaired ventilation; more severe with flail chest)\n• Cough suppression (pain prevents effective cough) → sputum retention → atelectasis → pneumonia\n• Flail chest: increasing dyspnoea, respiratory distress, paradoxical chest wall movement (segment moves inward on inspiration, outward on expiration)\n• Symptoms of associated injuries: haemoptysis (pulmonary contusion/laceration), haemodynamic compromise (haemothorax, tension pneumothorax, aortic injury)","Treatment":"• Pain management (cornerstone of treatment --- inadequate analgesia leads to splinting → atelectasis → pneumonia):\n• -- Multimodal analgesia: paracetamol + NSAIDs (if no contraindication) + opioids (IV PCA for severe)\n• -- Regional anaesthesia (preferred): thoracic epidural (gold standard), paravertebral block, serratus anterior plane block, intercostal nerve blocks --- superior pain control with fewer systemic effects\n• Respiratory support: incentive spirometry, aggressive physiotherapy, chest physiotherapy; high-flow nasal prongs (HFNP), CPAP/BiPAP if respiratory compromise; early intubation + mechanical ventilation for respiratory failure\n• Surgical stabilisation of rib fractures (SSRF): recommended within 72 hours for flail chest with paradoxical motion; ventilator-dependent patients; persistent pain despite adequate analgesia; severe chest deformity; reduces mortality, ICU/hospital LOS, pneumonia incidence, and mechanical ventilation days versus conservative management alone\n• Flail chest management: initially multimodal analgesia + respiratory support; early SSRF with plate fixation now standard at major trauma centres in Australia --- NICE and EAST guidelines support SSRF for flail chest\n• Treat complications: ICD for pneumothorax/haemothorax; antibiotics for pneumonia; bronchoscopy for sputum retention/lobar collapse\n• Elderly patients: low threshold for admission, analgesia optimisation, early HDU/ICU consideration; frailty significantly worsens outcomes\n• Multidisciplinary approach: trauma surgery, respiratory medicine, anaesthetics/pain team, physiotherapy; transfer to major trauma service (MTS) for severe chest injuries","Investigations":"• CXR (AP): first-line; may miss up to 50% of rib fractures (especially anterior cartilaginous); identifies pneumothorax, haemothorax, mediastinal widening\n• CT chest (gold standard): 3D reconstruction --- accurate identification of fracture number, location, displacement; quantifies pulmonary contusion; detects pneumothorax, haemothorax, great vessel injury, and splenic/hepatic injury (lower ribs)\n• Ultrasound (POCUS): sensitive for detecting rib fractures and haemothorax at bedside in trauma\n• FBC, coagulation, group and screen; ABG if respiratory compromise; ECG (arrhythmia from myocardial contusion)\n• CT aortography: if mediastinal widening or mechanism suggests great vessel injury"}},{"name":"Gastro-oesophageal Reflux Disease (GORD)","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Failure of the lower oesophageal sphincter (LOS) to maintain adequate resting pressure, allowing gastric acid/bile reflux into the oesophagus\n• Transient LOS relaxations (TLOSRs) are the dominant mechanism\n• Hiatus hernia disrupts the gastro-oesophageal junction and impairs anti-reflux barrier\n• Delayed gastric emptying and increased intra-abdominal pressure are contributing factors","Risk Factors":"• Obesity (BMI >30) --- strongest modifiable risk factor\n• Hiatus hernia\n• Pregnancy (progesterone relaxes LOS)\n• Smoking, alcohol, caffeine, chocolate, fatty/spicy foods\n• NSAIDs, calcium channel blockers, nitrates, benzodiazepines\n• Systemic sclerosis and other connective tissue disorders","Symptoms (History)":"• Heartburn --- retrosternal burning, worse postprandially and when recumbent\n• Acid regurgitation --- sour/bitter taste in mouth\n• Dysphagia (alarm symptom --- suggests stricture or Barrett's)\n• Atypical: chronic cough, hoarseness, laryngitis, asthma exacerbations\n• Odynophagia uncommon; if present consider oesophagitis or malignancy\n• Alarm features: dysphagia, haematemesis, weight loss, anaemia → urgent endoscopy","Treatment":"• Lifestyle: weight loss, head-of-bed elevation, avoid trigger foods/alcohol/smoking, small meals, avoid eating <3 hrs before lying down\n• Step-down therapy (RACGP guideline): start with PPI (e.g. omeprazole 20 mg daily or esomeprazole 40 mg daily) for 4--8 weeks, then step down to lowest effective dose or on-demand use\n• H2-receptor antagonists (e.g. famotidine): second-line or adjunct for nocturnal symptoms\n• Antacids/alginates (e.g.\n• Gaviscon): symptomatic relief\n• Anti-reflux surgery (laparoscopic Nissen fundoplication): for refractory disease, significant hiatus hernia, or young patients preferring to avoid long-term medication\n• Surveillance endoscopy if Barrett's oesophagus confirmed (every 2--5 years depending on grade)","Investigations":"• Clinical diagnosis in typical cases --- trial of PPI is both diagnostic and therapeutic\n• Upper GI endoscopy (OGD): indicated for alarm symptoms, age >50 with new onset, failure of PPI therapy; assesses for oesophagitis (LA classification A--D), Barrett's oesophagus, hiatus hernia, malignancy\n• 24-hour ambulatory pH ± impedance monitoring: gold standard for confirming pathological acid exposure; used when diagnosis uncertain or pre-operatively\n• Oesophageal manometry: assess LOS pressure and motility pre-surgery\n• Barium swallow: limited role; identifies hiatus hernia and dysmotility"}},{"name":"Peptic Ulcer Disease (PUD)","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Helicobacter pylori infection --- responsible for \\~70% of duodenal ulcers and \\~50% of gastric ulcers; disrupts mucosal protective barrier\n• NSAID/aspirin use --- inhibits COX-1, reducing prostaglandin synthesis and mucosal defence; second most common cause\n• Zollinger-Ellison syndrome (gastrinoma): rare, causes hypersecretion of gastric acid\n• Stress ulcers: critically ill patients (burns = Curling's, head injury = Cushing's ulcer)\n• Smoking impairs mucosal healing and increases acid secretion","Risk Factors":"• H. pylori infection\n• NSAID/aspirin use (especially prolonged)\n• Smoking\n• Age >60\n• Previous PUD\n• Corticosteroid use (in combination with NSAIDs)\n• Physiological stress (ICU, sepsis, burns)\n• Blood group O (associated with duodenal ulcers)","Symptoms (History)":"• Epigastric pain: burning/gnawing --- duodenal ulcer classically relieved by food; gastric ulcer worsened by food\n• Nausea, vomiting (especially with gastric outlet obstruction)\n• Anorexia and weight loss (especially gastric ulcer --- raises suspicion of malignancy)\n• Complications: haematemesis/melaena (bleeding), sudden severe abdominal pain (perforation --- 'board-like' rigidity), early satiety/vomiting (gastric outlet obstruction)\n• May be asymptomatic (especially NSAID-related)","Treatment":"• H. pylori eradication: standard triple therapy --- PPI (e.g. omeprazole 20 mg BD) + amoxicillin 1 g BD + clarithromycin 500 mg BD for 7--14 days; confirm eradication with UBT at 4 weeks post-treatment\n• Acid suppression: PPI (e.g. omeprazole 20--40 mg daily) for 4--8 weeks (duodenal) or 8 weeks (gastric); continue until healing confirmed\n• Cease NSAIDs if possible; if must continue, add PPI prophylaxis\n• Gastric ulcers: repeat OGD at 6--8 weeks to confirm healing and exclude malignancy\n• Bleeding ulcer: IV PPI infusion (pantoprazole), endoscopic haemostasis (adrenaline injection, clips, thermal therapy), interventional radiology, or surgery if refractory\n• Perforation: nil by mouth, IV PPI, NG tube, IV antibiotics, urgent surgical repair (laparoscopic or open Graham patch omentoplasty)\n• Lifestyle: smoking cessation, avoid NSAIDs/alcohol","Investigations":"• Upper GI endoscopy (OGD): gold standard --- visualises and biopsies ulcer (gastric ulcers must be biopsied to exclude malignancy); confirms H. pylori by CLO test (rapid urease)\n• H. pylori testing: urea breath test (UBT) --- best non-invasive test; stool antigen test; serology (cannot distinguish active vs past infection)\n• FBC: anaemia (chronic blood loss)\n• LFTs, coagulation: if bleeding\n• Erect CXR: free subdiaphragmatic air → perforation\n• Serum gastrin: if Zollinger-Ellison syndrome suspected"}},{"name":"Hepatitis","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Viral: Hepatitis A (faecal-oral, self-limiting), B (blood/sexual/vertical, can become chronic), C (blood-borne, most commonly chronic in Australia), D (requires HBV co-infection), E (faecal-oral, endemic in developing countries)\n• Alcohol-related hepatitis: direct hepatocyte toxicity and oxidative stress\n• Autoimmune hepatitis: type I (anti-smooth muscle, ANA) and type II (anti-LKM1)\n• Drug-induced (DILI): paracetamol overdose (commonest), isoniazid, statins, nitrofurantoin, herbal supplements\n• Non-alcoholic steatohepatitis (NASH): component of metabolic syndrome","Risk Factors":"• Hepatitis A/E: travel to endemic regions, poor sanitation, shellfish consumption\n• Hepatitis B/C: IV drug use (needle sharing), unprotected sex, needlestick injury, blood transfusion pre-1990 (Hep C), vertical transmission (Hep B)\n• Autoimmune: female sex, other autoimmune conditions\n• NASH: obesity, type 2 diabetes, dyslipidaemia, metabolic syndrome\n• Alcohol: >14 standard drinks/week (women), >21 (men)","Symptoms (History)":"• Prodrome: malaise, fatigue, anorexia, nausea, low-grade fever, arthralgia\n• Icteric phase: jaundice, dark urine (bilirubin), pale stools, pruritus\n• RUQ discomfort/pain (liver capsule distension)\n• Acute liver failure (rare): encephalopathy, coagulopathy, jaundice\n• Chronic hepatitis: often asymptomatic until cirrhosis develops; fatigue, arthralgia may occur\n• Alcohol hepatitis: fever, jaundice, tender hepatomegaly, ascites in severe disease","Treatment":"• Hepatitis A: supportive --- rest, adequate nutrition, avoid alcohol; vaccination for contacts; notifiable disease\n• Hepatitis B: acute --- supportive; chronic --- antivirals if indicated (tenofovir alafenamide or entecavir --- first-line in Australia per ASHM); vaccination program (universal childhood immunisation in Australia)\n• Hepatitis C: direct-acting antivirals (DAAs) --- e.g. sofosbuvir/velpatasvir (Epclusa) 12 weeks; cure rate >95%; PBS-listed in Australia without restrictions since 2016\n• Autoimmune: prednisolone ± azathioprine; taper to maintenance\n• Alcohol hepatitis: strict alcohol abstinence; prednisolone in severe disease (Maddrey DF >32); nutritional support; Wernicke's prophylaxis (thiamine)\n• NASH: weight loss, treat metabolic risk factors; no approved pharmacotherapy\n• All chronic hepatitis: screen for HCC (6-monthly USS ± AFP); refer gastroenterology/hepatology","Investigations":"• LFTs: elevated ALT/AST (hepatocellular pattern); elevated ALP/GGT (cholestatic pattern); bilirubin (conjugated if obstructive, mixed in hepatitis)\n• Coagulation: PT/INR --- marker of synthetic function\n• Viral serology: HBsAg, anti-HBc IgM (acute Hep B); anti-HAV IgM (acute Hep A); anti-HCV + HCV RNA (Hep C); HCV RNA is confirmatory\n• Autoimmune: ANA, ASMA, anti-LKM1, IgG levels\n• Ultrasound liver: assess liver texture, portal hypertension, exclude biliary obstruction\n• Liver biopsy: staged fibrosis, confirms diagnosis in autoimmune/NASH/uncertain aetiology\n• FBC: cytopaenia (hypersplenism); albumin (synthetic function)"}},{"name":"Functional GI Disorders (IBS, Eosinophilic Oesophagitis)","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• IBS: disorder of gut-brain interaction; altered intestinal motility, visceral hypersensitivity, altered gut microbiome, increased intestinal permeability, and psychosocial factors; post-infectious IBS follows gastroenteritis in \\~10%\n• Eosinophilic Oesophagitis (EoE): chronic immune/antigen-mediated condition driven by dietary antigens (milk, wheat, egg, soy, nuts, seafood); genetic susceptibility and environmental factors (hygiene hypothesis); eosinophilic infiltration leads to oesophageal remodelling and fibrosis","Risk Factors":"• IBS: female sex, age <50, prior GI infection, anxiety/depression, adverse life events, certain foods (FODMAPs), antibiotic use\n• EoE: male sex (3:1), atopic disease (asthma, allergic rhinitis, eczema), family history of EoE, Caucasian ethnicity, prevalence \\~1 in 100 adults in Australia","Symptoms (History)":"• IBS: recurrent abdominal pain ≥1 day/week for 3 months, associated with defecation (relief or worsening), change in stool frequency or form (Rome IV criteria); subtypes: IBS-C (constipation), IBS-D (diarrhoea), IBS-M (mixed), IBS-U (unclassified); bloating, urgency, incomplete evacuation; no alarm features\n• EoE children: feeding difficulties, vomiting, abdominal pain, failure to thrive\n• EoE adolescents/adults: dysphagia (solids), food bolus obstruction (requires emergency endoscopic removal), heartburn unresponsive to PPIs, chest pain, globus sensation","Treatment":"• IBS: patient education and reassurance; dietary modification (low-FODMAP diet --- supervised by dietitian; high efficacy in Australia); soluble fibre; antispasmodics (e.g. hyoscine, mebeverine); loperamide (IBS-D); osmotic laxatives (IBS-C); tricyclic antidepressants (low dose amitriptyline) or SSRIs for pain/mood; psychological therapies (CBT, gut-directed hypnotherapy); probiotics (limited evidence)\n• EoE: dietary elimination (empirical 6-food elimination or targeted elimination based on allergy testing --- guided by dietitian); topical swallowed corticosteroids (fluticasone MDI swallowed or budesonide viscous preparation --- most effective pharmacotherapy); PPI trial (may improve symptoms and histology); oesophageal dilation for strictures; biologics (dupilumab --- PBS-listed in Australia for EoE)","Investigations":"• IBS: diagnosis of exclusion using Rome IV criteria; investigations to exclude organic disease: FBC (anaemia), CRP/ESR (inflammation), coeliac serology (anti-TTG IgA + IgA level), faecal calprotectin (distinguish from IBD; <50 µg/g supports IBS), thyroid function; colonoscopy if alarm features or age >45; FODMAP hydrogen breath test not routine\n• EoE: upper GI endoscopy --- endoscopic features: longitudinal furrows, concentric rings/trachealization, white exudates, oedema, strictures; oesophageal biopsies required (≥15 eosinophils/high power field, proximal and distal samples); pH monitoring to exclude GORD; food allergy testing (skin prick/patch testing, though limited correlation)"}},{"name":"Cirrhosis and its Complications","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• End-stage liver fibrosis resulting in loss of normal hepatic architecture and formation of regenerative nodules\n• Causes in Australia: alcohol (most common), chronic hepatitis C, chronic hepatitis B, non-alcoholic fatty liver disease/NASH, autoimmune hepatitis, primary biliary cholangitis (PBC), primary sclerosing cholangitis (PSC), haemochromatosis, Wilson's disease, alpha-1 antitrypsin deficiency\n• Portal hypertension develops as fibrosis increases intrahepatic vascular resistance","Risk Factors":"• Chronic excessive alcohol consumption\n• Chronic viral hepatitis (B, C)\n• Obesity and metabolic syndrome (NASH)\n• Autoimmune or cholestatic liver disease\n• Genetic disorders: haemochromatosis (HFE gene), Wilson's disease (ATP7B)\n• Male sex; older age","Symptoms (History)":"• Compensated: often asymptomatic; fatigue, anorexia, weight loss, mild RUQ discomfort\n• Decompensated (onset of major complication): jaundice, ascites (abdominal distension, dyspnoea), peripheral oedema, variceal haemorrhage (haematemesis/melaena), hepatic encephalopathy (confusion, behavioural change, asterixis, coma), spontaneous bacterial peritonitis (SBP --- fever, worsening ascites, abdominal pain), hepatorenal syndrome (oliguria, rising creatinine)","Treatment":"• Treat underlying cause: alcohol abstinence, antiviral therapy, immunosuppression\n• Ascites: low-sodium diet (<2 g/day), spironolactone ± frusemide; large-volume paracentesis (LVP) with albumin replacement (6--8 g/L drained) for tense ascites; TIPSS (transjugular intrahepatic portosystemic shunt) for refractory ascites\n• Variceal haemorrhage: resuscitation, IV terlipressin (or octreotide), IV ceftriaxone prophylaxis, urgent OGD with band ligation (EVL); non-selective beta-blocker (propranolol/carvedilol) for primary/secondary prevention\n• SBP: IV cefotaxime or ceftriaxone 5 days + IV albumin (1.5 g/kg day 1, 1 g/kg day 3); prophylaxis with norfloxacin/trimethoprim in high-risk patients\n• Hepatic encephalopathy: lactulose (2--3 soft stools/day), rifaximin (PBS-listed for recurrent HE), treat precipitants (infection, constipation, GI bleed, electrolyte imbalance, sedative drugs)\n• Liver transplantation: definitive treatment for decompensated cirrhosis; assessed by MELD score; contraindications include active alcohol use, extrahepatic malignancy\n• HCC surveillance: 6-monthly USS ± AFP","Investigations":"• LFTs: elevated bilirubin, low albumin, elevated ALP/GGT; transaminases may be normal in burnt-out cirrhosis\n• Coagulation: prolonged PT/INR (impaired synthetic function)\n• FBC: thrombocytopenia (hypersplenism), anaemia\n• Renal function (U&E, creatinine): hepatorenal syndrome\n• Child-Pugh score and MELD score: assess severity and prognosis\n• Ultrasound liver ± Doppler: nodular liver, splenomegaly, portal hypertension, ascites, screen for HCC\n• Fibroscan (transient elastography): non-invasive assessment of liver stiffness/fibrosis\n• OGD (gastroscopy): varices screening at diagnosis\n• Ascitic tap (diagnostic paracentesis): cell count (PMNs >250/mm³ = SBP), albumin (SAAG ≥11 g/L = portal hypertension), culture\n• AFP + 6-monthly USS: HCC surveillance"}},{"name":"Malabsorption","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Inadequate digestion or absorption of nutrients across the GI tract\n• Luminal causes: pancreatic exocrine insufficiency (chronic pancreatitis, cystic fibrosis), bile salt deficiency (cholestatic liver disease, terminal ileal disease, bacterial overgrowth)\n• Mucosal causes: coeliac disease (immune-mediated gluten sensitivity damaging small bowel villi --- commonest in Australia, \\~1:70), Crohn's disease, tropical sprue, Whipple's disease, small bowel lymphoma, radiation enteritis\n• Post-surgical: short bowel syndrome, post-gastrectomy, post-bariatric surgery\n• Infectious: Giardia lamblia (commonest GI parasite causing malabsorption), Cryptosporidium","Risk Factors":"• Coeliac disease: HLA-DQ2/DQ8 genotype, family history, other autoimmune conditions (type 1 diabetes, thyroid disease)\n• Pancreatic insufficiency: chronic pancreatitis, alcohol, cystic fibrosis\n• Post-surgical bowel resection\n• Immunodeficiency (giardiasis, cryptosporidiosis)\n• Radiation to abdomen","Symptoms (History)":"• Steatorrhoea: pale, bulky, offensive, difficult to flush stools; fat-soluble vitamin deficiencies (A, D, E, K)\n• Diarrhoea: osmotic (stops with fasting) or secretory\n• Weight loss, failure to thrive\n• Nutritional deficiencies: iron deficiency anaemia, B12/folate deficiency, calcium/vitamin D deficiency (osteoporosis, tetany), zinc deficiency\n• Coeliac specific: dermatitis herpetiformis, aphthous ulcers, peripheral neuropathy, ataxia\n• Bloating, flatulence (carbohydrate malabsorption)","Treatment":"• Coeliac disease: strict lifelong gluten-free diet (GFD) --- mainstay; dietitian referral; monitor adherence with serial TTG-IgA; DEXA scan at diagnosis; pneumococcal/influenza vaccination (functional hyposplenism)\n• Pancreatic exocrine insufficiency: pancreatic enzyme replacement therapy (PERT --- e.g.\n• Creon) with meals; fat-soluble vitamin supplementation\n• Bacterial overgrowth: rifaximin or metronidazole/tetracycline courses; treat underlying cause\n• Giardia: metronidazole 400 mg TDS for 5--7 days or tinidazole single dose\n• Nutritional support: correct deficiencies (iron, B12 IM, calcium, vitamin D, fat-soluble vitamins)\n• Short bowel syndrome: enteral ± parenteral nutrition; teduglutide (GLP-2 analogue) for SBS-IF","Investigations":"• Coeliac serology: anti-tissue transglutaminase IgA (TTG-IgA) + total IgA (to exclude IgA deficiency); anti-endomysial antibody (EMA); HLA-DQ2/DQ8 (if serology negative)\n• Small bowel biopsy (duodenal, via OGD): gold standard --- villous atrophy, crypt hyperplasia, intraepithelial lymphocytosis (must be on gluten-containing diet)\n• FBC, iron studies, B12, folate, vitamin D, zinc, albumin, calcium\n• Faecal fat estimation (72-hour) or faecal elastase (<100 µg/g = severe pancreatic exocrine insufficiency)\n• Breath tests: hydrogen breath test (small intestinal bacterial overgrowth --- lactulose/glucose), lactose intolerance test\n• Endoscopy + biopsy: assess mucosal appearance and histology\n• CT abdomen ± CT enterography: assess small bowel (Crohn's, lymphoma, structural causes)\n• Stool MC&S + OCP: exclude Giardia, Cryptosporidium"}},{"name":"Inflammatory Bowel Disease (IBD)","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Chronic, relapsing immune-mediated inflammatory disorder of the GI tract with two main subtypes:\n• Crohn's Disease (CD): transmural inflammation; can affect any part of GI tract (mouth to anus) but commonly terminal ileum and colon; skip lesions; granulomas on histology\n• Ulcerative Colitis (UC): mucosal inflammation confined to colon, always involves rectum (proctitis), extends proximally in a continuous pattern; no skip lesions\n• Pathogenesis: aberrant mucosal immune response to gut microbiome in genetically susceptible individuals; environmental triggers (smoking protective in UC, worsens CD; appendicectomy protective in UC)","Risk Factors":"• Family history (strongest risk factor)\n• Caucasian ethnicity; Jewish ancestry\n• Smoking (increases CD risk; protective in UC)\n• Urban/Westernised lifestyle\n• Appendicectomy (protective for UC)\n• NSAIDs, antibiotics may trigger flares\n• Age: bimodal --- peaks 15--35 and 50--70 years","Symptoms (History)":"• CD: crampy abdominal pain (RIF --- terminal ileal disease), diarrhoea (may not be bloody), weight loss, fever, perianal disease (fistulae, abscesses, skin tags --- classic for CD), mouth ulcers\n• UC: bloody diarrhoea (hallmark), urgency, tenesmus, mucus PR, abdominal pain; severity graded by Truelove & Witts (mild/moderate/severe)\n• Extra-intestinal manifestations (both): arthralgia/arthropathy (most common), uveitis/episcleritis, erythema nodosum, pyoderma gangrenosum, PSC (UC), ankylosing spondylitis\n• Complications: stricture and obstruction (CD), fistulae (CD), perianal sepsis (CD), toxic megacolon (UC --- emergency), colorectal cancer (long-standing UC/CD colitis)","Treatment":"• Induction of remission: 5-ASA (mesalazine) for mild-moderate UC (topical for proctitis, oral for more extensive); corticosteroids (prednisolone or IV hydrocortisone for moderate-severe) for both CD and UC; immunomodulators (azathioprine/6-MP, methotrexate)\n• Biologic therapy: anti-TNF agents (infliximab, adalimumab --- PBS-listed); vedolizumab (gut-selective integrin inhibitor); ustekinumab (IL-12/23 inhibitor); tofacitinib/upadacitinib (JAK inhibitors --- for UC/CD)\n• Maintenance: 5-ASA maintenance (UC); azathioprine/6-MP; biologic maintenance\n• Surgery: CD --- strictureplasty, resection for refractory disease/complications (ileocaecal resection most common); UC --- proctocolectomy with ileal pouch-anal anastomosis (IPAA) is curative\n• Severe/fulminant UC: IV hydrocortisone, IV ciclosporin or infliximab rescue therapy; urgent colectomy if no response at 72 hours (refer colorectal surgery)\n• CRC surveillance: colonoscopy every 1--2 years after 8--10 years of pancolitis\n• Multidisciplinary care: gastroenterology, surgery, dietitian, IBD nurse; Crohn's & Colitis Australia support","Investigations":"• Bloods: FBC (anaemia, leukocytosis), CRP/ESR (inflammation), albumin (nutrition/severity), LFTs, iron studies, B12, folate, vitamin D\n• Faecal calprotectin: excellent marker of bowel inflammation; differentiates IBD from IBS; useful for monitoring\n• Stool culture + C. difficile toxin: exclude infective colitis\n• Colonoscopy + biopsy: gold standard for diagnosis; assess extent and severity; macroscopic (ulceration, pseudopolyps, cobblestoning in CD) and histological features\n• CT enterography or MRI enterography: small bowel assessment in CD (strictures, fistulae, abscess)\n• MRI pelvis: perianal CD --- extent of fistulae and abscesses\n• Plain AXR: assess for toxic megacolon (transverse colon >6 cm = dilatation)\n• Serology: ASCA (CD), pANCA (UC) --- limited diagnostic utility; not routine"}},{"name":"Acute and Chronic Pancreatitis","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Acute pancreatitis: premature activation of pancreatic enzymes (especially trypsinogen → trypsin) causing autodigestion; most common causes --- gallstones (most common --- obstructs pancreatic duct at ampulla of Vater) and alcohol (direct toxic effect); other causes: ERCP-induced, hypertriglyceridaemia (>11 mmol/L), hypercalcaemia, drugs (azathioprine, valproate, mesalazine), trauma, viral (mumps), autoimmune (IgG4-related), idiopathic\n• Chronic pancreatitis: progressive irreversible fibrosis and destruction of pancreatic parenchyma; alcohol (most common cause \\~70%), recurrent acute pancreatitis; genetic mutations (PRSS1, SPINK1, CFTR); autoimmune; tropical pancreatitis; idiopathic","Risk Factors":"• Acute: gallstone disease, alcohol excess, post-ERCP, hypertriglyceridaemia, drugs\n• Chronic: alcohol (>4--5 standard drinks/day for >5 years), smoking (independent risk), genetic mutations, recurrent acute pancreatitis","Symptoms (History)":"• Acute: sudden onset severe epigastric pain radiating to the back ('boring' through to back); nausea and vomiting; anorexia; pain relieved by leaning forward (pancreatitis position); fever (in severe disease); jaundice (if biliary obstruction)\n• Chronic: chronic epigastric/back pain (constant or intermittent), exocrine insufficiency (steatorrhoea, malabsorption, weight loss), endocrine insufficiency (diabetes mellitus --- 'pancreatogenic diabetes' or type 3c DM)\n• Complications (acute): SIRS/sepsis, pancreatic necrosis (infected necrosis has high mortality), pseudocyst, abscess, acute kidney injury, ARDS, pleural effusion, DIC","Treatment":"• Acute --- mild: aggressive IV fluid resuscitation (Hartmann's solution 250--500 mL/hr initially --- MJA guideline), nil by mouth until pain/nausea resolve, analgesia (IV opioids --- morphine/fentanyl, avoid morphine/codeine traditionally but no strong evidence), early recommencement of oral feeding when tolerated, cholecystectomy during index admission for mild gallstone pancreatitis (prevents recurrence)\n• Acute --- severe: ICU-level care, enteral nutrition via NGT/NJT (avoid TPN --- increased infectious complications), IV antibiotics only for proven infected necrosis (not prophylactic), ERCP within 24 hours if concurrent cholangitis or CBD obstruction; intervention for infected necrosis: endoscopic/minimally invasive step-up approach preferred over early open surgery (PANTER trial)\n• Chronic: pain management (analgesic ladder; coeliac plexus block; ERCP/EUS for ductal stones/strictures; surgical drainage --- Frey or Puestow procedures); PERT (Creon) with meals for exocrine insufficiency; insulin for endocrine insufficiency; strict alcohol and smoking cessation; fat-soluble vitamin supplementation; screen for pancreatic cancer","Investigations":"• Acute: serum lipase (preferred in Australia) --- elevated >3× upper limit of normal (or amylase if lipase unavailable); note: amylase normalises faster and can be normal in alcohol pancreatitis\n• FBC (leukocytosis), LFTs (AST/ALT --- gallstone pancreatitis), calcium, triglycerides, glucose, CRP (peak at 48 hours --- severity marker)\n• Ultrasound abdomen: gallstones (cause), biliary dilation; pancreas often poorly visualised due to gas\n• CT abdomen with IV contrast (CECT): NOT routine initially; indicated if: uncertain diagnosis, severe disease, no improvement at 48--72 hours; Balthazar grade and CT Severity Index assess necrosis\n• Severity scoring: Revised Atlanta Classification --- mild (no organ failure, no local complications), moderately severe (transient organ failure <48h or local complications), severe (persistent organ failure >48h); APACHE II, Ranson's criteria\n• Chronic: CT abdomen (calcifications --- pathognomonic; duct dilation), MRCP, EUS; faecal elastase (exocrine insufficiency); HbA1c (endocrine insufficiency)"}},{"name":"Pancreatic Cancer","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• 90% are ductal adenocarcinoma (arising from exocrine pancreatic ductal epithelium); other types: acinar cell carcinoma, pancreatic neuroendocrine tumours (pNETs --- much better prognosis), cystic neoplasms (IPMN, MCN, SCN)\n• Most commonly arises in the head of the pancreas (\\~70%)\n• Mutational profile: KRAS (>90%), CDKN2A, SMAD4, TP53 mutations\n• Poor prognosis: median survival 6--12 months; 5-year survival \\~12% (predominantly because of late presentation)","Risk Factors":"• Smoking (relative risk 2--3× --- most important modifiable risk)\n• Chronic pancreatitis (5--10% lifetime risk)\n• Type 2 diabetes (new onset DM in elderly may be paraneoplastic)\n• Obesity\n• Family history / hereditary pancreatitis (PRSS1 mutation), BRCA1/2, Lynch syndrome\n• Age >60 years, male sex\n• Alcohol (via chronic pancreatitis)\n• Occupational exposure (petrochemicals, pesticides)","Symptoms (History)":"• Insidious onset --- typically presents late\n• Painless obstructive jaundice (head of pancreas tumour --- classic presentation): dark urine, pale stools, pruritus\n• Epigastric or back pain (body/tail tumour --- worse prognosis as diagnosed later)\n• Weight loss, anorexia, cachexia\n• New-onset diabetes or worsening glycaemic control\n• Steatorrhoea (exocrine insufficiency)\n• Courvoisier's sign: palpable non-tender gallbladder in jaundiced patient → malignant biliary obstruction (gallstones cause tender contracted gallbladder)","Treatment":"• Resectable (\\~15--20%): Whipple's procedure (pancreaticoduodenectomy) for head tumours --- removal of pancreatic head, duodenum, gallbladder, common bile duct, and distal stomach; distal pancreatectomy + splenectomy for body/tail; adjuvant chemotherapy (FOLFIRINOX or gemcitabine + capecitabine post-op --- 6 months)\n• Borderline resectable: neoadjuvant chemotherapy ± radiotherapy to downstage, then reassess for surgery\n• Locally advanced / unresectable: FOLFIRINOX or gemcitabine + nab-paclitaxel chemotherapy; ERCP with biliary stent for jaundice palliation; surgical bypass (hepaticojejunostomy + gastrojejunostomy) if stenting fails or duodenal obstruction\n• Metastatic: palliative chemotherapy (FOLFIRINOX if good PS, or gem + nab-paclitaxel); best supportive care; PERT for malabsorption; coeliac plexus block for pain; SACT via MDT\n• Multidisciplinary team: hepatobiliary surgery, medical oncology, radiation oncology, palliative care, dietitian\n• All cases in Australia: refer to specialist pancreatic cancer centre","Investigations":"• CT abdomen/pelvis with IV contrast (pancreatic protocol --- arterial and venous phases): first-line for diagnosis and staging; assesses resectability (involvement of SMV/SMA/portal vein/coeliac axis)\n• CA 19-9: elevated (>37 U/mL) in \\~80%; NOT diagnostic alone; useful for monitoring response and recurrence (may be falsely elevated in benign biliary obstruction; falsely low in Lewis antigen-negative patients)\n• CEA: less sensitive than CA 19-9\n• LFTs: elevated bilirubin, ALP, GGT (obstructive picture)\n• EUS (endoscopic ultrasound) ± FNA: tissue diagnosis (biopsy); superior staging for small lesions and vascular involvement\n• MRCP/MRI: assess ductal anatomy, biliary tree\n• PET scan: assess for occult metastases pre-operatively\n• Staging laparoscopy: before intended resection to detect peritoneal metastases not seen on CT\n• Tissue diagnosis: required before chemotherapy; not required before surgery if radiologically resectable"}},{"name":"Gallstones (Cholelithiasis)","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Cholesterol gallstones (most common, \\~80%): supersaturation of bile with cholesterol, promoting nucleation and crystal formation; requires imbalance between cholesterol, bile salts, and phospholipids\n• Pigment stones: black (haemolysis --- excess unconjugated bilirubin, chronic haemolytic conditions) and brown (biliary infection/stasis --- secondary to bacteria deconjugating bilirubin)\n• Mixed stones: combination of cholesterol and pigment\n• Complications of gallstones: biliary colic, acute cholecystitis, choledocholithiasis, cholangitis, gallstone pancreatitis, gallstone ileus (large stone erodes into duodenum), Mirizzi syndrome (stone compressing CHD)","Risk Factors":"• 5 Fs: Female, Forty (age), Fat (obesity), Fertile (multiparity), Fair (Northern European ancestry)\n• Rapid weight loss / bariatric surgery\n• Oral contraceptives and oestrogen therapy\n• Diabetes mellitus\n• Hypertriglyceridaemia\n• Haemolytic anaemia (pigment stones)\n• Ileal disease / resection (reduced bile salt reabsorption)\n• Total parenteral nutrition (bile stasis)","Symptoms (History)":"• Biliary colic: right upper quadrant or epigastric pain, sudden onset, severe, constant (not truly colicky), radiates to right shoulder/scapula (phrenic nerve irritation), lasts 30 min--4 hours, often postprandial (especially fatty meals), associated nausea/vomiting; resolves spontaneously\n• Acute cholecystitis: persistent RUQ pain >4--6 hours, fever, nausea/vomiting; Murphy's sign positive\n• Choledocholithiasis: biliary colic + jaundice ± dark urine/pale stools\n• Cholangitis: Charcot's triad / Reynold's pentad\n• Gallstone pancreatitis: epigastric/back pain\n• \\~60--80% of gallstones are asymptomatic ('silent stones') --- do not require treatment","Treatment":"• Asymptomatic gallstones: conservative management (watchful waiting)\n• Symptomatic gallstones / biliary colic: laparoscopic cholecystectomy (definitive treatment --- gold standard; day surgery in most Australian centres); analgesia (NSAIDs ± opioids) for acute attacks\n• Acute cholecystitis: IV antibiotics (e.g. cefazolin or piperacillin-tazobactam), analgesia, IV fluids, NBM; laparoscopic cholecystectomy within 72 hours of onset (index admission) --- Australian and international guideline; or percutaneous cholecystostomy for high-risk surgical patients\n• Choledocholithiasis: ERCP + sphincterotomy + stone extraction, then laparoscopic cholecystectomy\n• Gallstone pancreatitis (mild): laparoscopic cholecystectomy during index admission (MJA guideline)\n• Cholangitis: see separate entry","Investigations":"• Ultrasound abdomen: first-line --- gallstones (echogenic, acoustic shadow), gallbladder wall thickening (>3 mm = cholecystitis), pericholecystic fluid, common bile duct diameter (>8 mm dilated = CBD stone until proven otherwise)\n• LFTs: elevated ALP/GGT, bilirubin (CBD stone), transaminases (pancreatitis, hepatitis)\n• Lipase/amylase: pancreatitis\n• FBC: leukocytosis (cholecystitis, cholangitis)\n• MRCP: non-invasive imaging of biliary tree --- gold standard for CBD stones, preferred before ERCP\n• ERCP: therapeutic --- removal of CBD stones, sphincterotomy; also diagnostic\n• CT abdomen: not first-line but useful if complications suspected (perforation, abscess, gallstone ileus --- Rigler's triad)\n• EUS: highly sensitive for small CBD stones and microlithiasis"}},{"name":"Obstructive Jaundice","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Post-hepatic (extrahepatic) obstruction to bile flow, causing conjugated hyperbilirubinaemia\n• Intraluminal: choledocholithiasis (most common cause), blood clot (haemobilia)\n• Mural: cholangiocarcinoma (Klatskin tumour at hilum), PSC, benign biliary stricture (post-surgical, post-ERCP), choledochal cyst\n• Extramural compression: pancreatic head cancer (classic cause of painless jaundice), periampullary tumours, lymphadenopathy, Mirizzi syndrome\n• Differentiate from pre-hepatic (unconjugated bilirubin --- haemolysis) and hepatic (hepatocellular --- hepatitis/cirrhosis)","Risk Factors":"• Gallstone disease (choledocholithiasis)\n• Malignancy: pancreatic head cancer, cholangiocarcinoma, ampullary/duodenal cancer\n• PSC (UC-associated), autoimmune cholangiopathy\n• Prior biliary surgery / ERCP (stricture)\n• HIV/AIDS (opportunistic cholangiopathy)","Symptoms (History)":"• Dark urine (conjugated bilirubin, water-soluble)\n• Pale/acholic stools (no bile reaching gut)\n• Pruritus (bile salts deposited in skin)\n• Jaundice (yellowing of skin and sclera --- visible when bilirubin >35--50 µmol/L)\n• RUQ pain if gallstone cause; painless jaundice → malignant cause until proven otherwise\n• Steatorrhoea (if bile absent from gut --- lipid malabsorption)\n• Fever if concurrent cholangitis\n• Anorexia, weight loss (malignant cause)","Treatment":"• Treat underlying cause\n• Choledocholithiasis: ERCP + sphincterotomy + stone extraction → laparoscopic cholecystectomy\n• Malignant obstruction: ERCP with biliary stenting (plastic or SEMS) for palliation; percutaneous transhepatic cholangiography (PTC) if ERCP fails; surgical bypass (hepaticojejunostomy) if endoscopic approach fails\n• Pancreatic head cancer: Whipple's procedure if resectable; biliary stent palliation if unresectable\n• PSC: ursodeoxycholic acid (limited evidence); endoscopic dilation of dominant strictures; liver transplantation for end-stage\n• Pre-operative: correct coagulopathy with vitamin K; treat cholangitis before elective surgery; biliary decompression if prolonged obstructive jaundice\n• Supportive: cholestyramine for pruritus (bile acid sequestrant); rifampicin second-line","Investigations":"• LFTs: elevated conjugated bilirubin, markedly elevated ALP and GGT; transaminases mild-moderately elevated\n• Coagulation: PT/INR (vitamin K malabsorption) --- give vitamin K before any intervention\n• FBC, U&E, CRP\n• Ultrasound abdomen: first-line --- identifies biliary dilation (CBD >8 mm, IHBD dilation), gallstones, liver metastases; pancreatic head mass (may not be seen well with bowel gas)\n• MRCP: non-invasive definitive biliary imaging --- level and cause of obstruction\n• CT abdomen/pelvis (pancreatic protocol): staging of malignant cause\n• ERCP: therapeutic --- biliary drainage and stenting (plastic or metal self-expanding stent), stone removal; tissue sampling (biliary brushings)\n• EUS: tissue biopsy of pancreatic head or periampullary lesions; small CBD stones\n• CA 19-9, CEA: if malignancy suspected\n• Tumour markers for cholangiocarcinoma: CA 19-9, CEA, biliary brushing cytology (limited sensitivity)"}},{"name":"Cholangitis","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Bacterial infection of the bile ducts, usually in the setting of biliary obstruction causing bile stasis\n• Most common cause: choledocholithiasis (CBD stones)\n• Other causes: benign biliary stricture (post-surgical, PSC), malignant biliary obstruction, biliary stent occlusion (post-ERCP), choledochal cyst, biliary parasites (Clonorchis, Ascaris)\n• Common organisms: Gram-negative enteric bacteria --- E. coli (most common), Klebsiella, Enterococcus, Enterobacter; anaerobes (Bacteroides) in severe/recurrent cases\n• Recurrent pyogenic cholangitis: endemic in Southeast Asia --- intrahepatic stone formation, biliary strictures, recurrent infection","Risk Factors":"• Choledocholithiasis\n• Prior biliary instrumentation (ERCP, biliary stent)\n• Malignant biliary obstruction\n• PSC, biliary stricture\n• Advanced age, immunocompromise\n• Biliary-enteric anastomosis","Symptoms (History)":"• Charcot's Triad: fever/rigors + jaundice + RUQ pain (present in \\~50--70% of cases --- classic but often incomplete)\n• Reynold's Pentad (severe/suppurative cholangitis): Charcot's triad + hypotension + altered mental status --- indicates septic shock and requires emergency biliary decompression\n• Nausea, vomiting\n• Pruritus (if jaundice present)\n• May present without jaundice if partial obstruction","Treatment":"• Emergency management: IV access, fluid resuscitation (aggressive), cardiac monitoring, blood cultures, urinary catheter, strict fluid balance\n• IV antibiotics: cover Gram-negative enteric organisms + anaerobes --- piperacillin-tazobactam (first-line) or ceftriaxone + metronidazole; escalate to carbapenem (meropenem) for severe/resistant cases; continue for 5--7 days or until biliary drainage achieved\n• Biliary decompression (within 24 hours for severe cholangitis; within 48--72 hours for moderate): ERCP + sphincterotomy + stone extraction + biliary stent --- preferred approach; PTC (percutaneous transhepatic cholangiogram) if ERCP fails; surgical exploration as last resort\n• Tokyo Guidelines: Grade I (mild) --- responds to antibiotics, elective ERCP; Grade II (moderate) --- IV antibiotics + early ERCP within 48--72 hours; Grade III (severe/Reynold's pentad) --- ICU, vasopressors, emergency biliary drainage within 24 hours\n• Subsequent: laparoscopic cholecystectomy after recovery if gallstone cause; treat underlying malignancy or stricture","Investigations":"• FBC: leukocytosis (elevated WCC), left shift\n• LFTs: elevated bilirubin, ALP, GGT; transaminases elevated\n• CRP/ESR: markedly elevated\n• Blood cultures: positive in 20--40% --- obtain before antibiotics (2 sets)\n• Coagulation: PT/INR\n• U&E, creatinine: renal function (sepsis-associated AKI)\n• Ultrasound abdomen: biliary dilation, CBD stones (may miss small stones), gallbladder\n• CT abdomen: CBD dilation, identify cause of obstruction, assess for complications\n• MRCP: definitive non-invasive imaging of biliary tree\n• ERCP: definitive treatment (diagnostic and therapeutic simultaneously) --- Tokyo Guidelines grade severity"}},{"name":"Bowel Obstruction (Small and Large)","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Small bowel obstruction (SBO --- 75% of bowel obstructions): adhesions (most common in developed countries --- post-surgical, post-peritonitis); hernia (incarcerated --- inguinal, femoral, umbilical, incisional); tumour; Crohn's disease stricture; volvulus; intussusception (children --- idiopathic; adults --- lead point); gallstone ileus; Meckel's diverticulum\n• Large bowel obstruction (LBO --- 25%): colorectal cancer (most common cause --- sigmoid colon); diverticular disease (stricture); volvulus (sigmoid most common, then caecal); pseudo-obstruction (Ogilvie's syndrome --- functional/neurogenic, no mechanical cause); benign stricture; faecal impaction\n• Closed-loop obstruction: high risk of strangulation and perforation (requires urgent surgery)\n• Strangulation: compromise of mesenteric blood supply → ischaemia → perforation → peritonitis","Risk Factors":"• SBO: prior abdominal surgery (adhesions), hernia, IBD, malignancy\n• LBO: age >60, colorectal cancer, diverticular disease, previous bowel surgery\n• Both: male sex, advanced age, prior abdominal/pelvic radiation","Symptoms (History)":"• Colicky abdominal pain (waves of periumbilical pain in SBO, lower abdominal in LBO)\n• Nausea and vomiting (early in SBO --- bilious; late in LBO; faeculent vomiting = late/complete obstruction)\n• Absolute constipation: no passage of flatus or faeces (complete obstruction)\n• Abdominal distension (more pronounced in LBO and distal SBO)\n• SBO: high-pitched tinkling bowel sounds (early), quiet/absent (late)\n• LBO: massive abdominal distension, late-onset vomiting\n• Signs of strangulation: constant (non-colicky) severe pain, fever, peritonism, tachycardia, haemodynamic instability --- surgical emergency","Treatment":"• Resuscitation: IV access (2 large-bore), aggressive IV fluids (Hartmann's solution), urinary catheter (strict fluid balance), NGT (gastric decompression --- reduce vomiting and aspiration risk), NBM, analgesia\n• SBO --- conservative (trial if no strangulation): NGT, IV fluids, close monitoring; Gastrografin (water-soluble contrast) --- therapeutic and prognostic for adhesional SBO; resolve in \\~80% of non-strangulated adhesional SBO; reassess at 24--48 hours\n• SBO --- surgical: failed conservative management at 24--48 hours, clinical deterioration, suspected strangulation, hernias (urgent hernia repair), virgin abdomen (no adhesions → cause may be hernia/tumour); laparoscopic or open adhesiolysis\n• LBO: colorectal cancer --- urgent endoscopic stent (SEMS) as bridge to elective surgery; emergency Hartmann's procedure (sigmoid colectomy + end colostomy) if stent fails or perforated; stoma reversal later\n• Sigmoid volvulus: rigid sigmoidoscopy + flatus tube decompression (first-line); elective sigmoid resection to prevent recurrence; emergency surgery if fails or ischaemia\n• Caecal volvulus: emergency right hemicolectomy (unlike sigmoid, colonoscopic decompression usually fails)\n• Ogilvie's syndrome: correct underlying cause; neostigmine (parasympathomimetic --- IV 2 mg if no contraindications); colonoscopic decompression; surgery rare","Investigations":"• Erect CXR: free air under diaphragm (perforation)\n• Plain AXR (supine and erect): SBO --- central dilated loops of bowel with valvulae conniventes, multiple air-fluid levels; LBO --- peripheral colonic dilation, haustral markings; absent rectal gas = complete obstruction\n• CT abdomen/pelvis with IV contrast: gold standard --- identifies level, cause, presence of strangulation (free fluid, thickened bowel wall, mesenteric haziness, lack of contrast enhancement); also assesses for mass/malignancy\n• Bloods: FBC, U&E, creatinine, LFTs, lactate (elevated in strangulation/ischaemia), coagulation, amylase (pancreatitis DDx), blood group and hold\n• Water-soluble contrast enema (Gastrografin): for LBO to confirm diagnosis and guide management; may be therapeutic in sigmoid volvulus\n• Rigid/flexible sigmoidoscopy: sigmoid volvulus (decompression)"}},{"name":"Appendicitis","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Obstruction of the appendiceal lumen causing bacterial overgrowth, distension, ischaemia, and perforation if untreated\n• Causes of obstruction: faecolith (most common in adults), lymphoid hyperplasia (most common in children --- often after viral illness), tumour, foreign body\n• Appendiceal perforation occurs in \\~20--30% of cases; higher in extremes of age\n• Most common surgical emergency worldwide; peak incidence ages 10--30 years","Risk Factors":"• Male sex (slightly higher incidence)\n• Age 10--30 years (peak)\n• Low-fibre diet (constipation --- faecolith)\n• Family history\n• Intestinal worms (Enterobius vermicularis --- rare)\n• IBD (Crohn's ileocolitis can mimic/cause appendicitis)","Symptoms (History)":"• Classic progression: periumbilical/central abdominal pain (visceral --- appendix distension) → migrates to right iliac fossa (RIF) as parietal peritoneum involved (McBurney's point)\n• Anorexia (nearly universal --- helpful diagnostic feature)\n• Nausea and vomiting (after pain onset)\n• Low-grade fever (37.5--38.5°C)\n• Diarrhoea or constipation possible\n• Atypical presentations: pelvic appendix → dysuria, tenesmus, rectal pain; retrocaecal appendix → flank pain, minimal peritonism; pregnancy → right lateral flank pain (appendix displaced); elderly → presentation more insidious, perforation more common\n• Perforation signs: sudden worsening then temporary relief of pain → generalised peritonitis","Treatment":"• Uncomplicated appendicitis: laparoscopic appendicectomy --- gold standard, preferred over open in Australia; same-day or next-day surgery; IV antibiotics perioperatively (cefazolin + metronidazole)\n• Non-operative management (antibiotics alone): evidence supports non-operative approach for uncomplicated appendicitis in adults (APPAC trial --- IV amoxicillin-clavulanate then oral); recurrence \\~20% at 1 year; patient preference and shared decision-making required; not suitable for children routinely\n• Perforated appendicitis with localised abscess: IV antibiotics + percutaneous drainage of abscess if >3 cm → interval appendicectomy at 6--8 weeks; OR emergency appendicectomy\n• Perforated appendicitis with generalised peritonitis: emergency laparoscopic/open appendicectomy + peritoneal lavage + IV antibiotics (piperacillin-tazobactam)\n• Post-op: oral antibiotics for 24--48 hours if uncomplicated; longer course if perforation; encourage early mobilisation; histology of appendix (exclude carcinoid, adenocarcinoma, endometriosis)","Investigations":"• Bloods: FBC --- elevated WCC (neutrophilia); CRP elevated; U&E; pregnancy test (women of childbearing age --- β-hCG, exclude ectopic)\n• Urinalysis: exclude UTI (sterile pyuria can occur in appendicitis due to proximity)\n• Erect CXR: free air (perforation)\n• Ultrasound abdomen/pelvis: first-line in children and women; non-compressible blind-ending tubular structure >6 mm = appendicitis; may visualise faecolith; pelvic pathology in women; limited by gas/obesity\n• CT abdomen/pelvis with IV contrast: gold standard --- sensitivity \\~95%, specificity \\~95%; dilated appendix >6 mm, fat stranding, faecolith, periappendiceal fluid/phlegmon; avoids unnecessary surgery; preferred in adults\n• MRI: preferred in pregnancy (avoid radiation)\n• Diagnostic laparoscopy: if imaging inconclusive or high suspicion"}},{"name":"Colorectal Cancer (CRC)","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Adenocarcinoma (\\~95%) arising from colorectal adenomatous polyps (adenoma-carcinoma sequence --- Vogelstein model): APC mutation → KRAS mutation → SMAD4/TP53 loss → invasive cancer\n• Molecular pathways: chromosomal instability (CIN --- most common), microsatellite instability (MSI --- associated with Lynch syndrome and sporadic tumours with MLH1 hypermethylation), CpG island methylator phenotype (CIMP)\n• \\~70% sporadic; \\~30% familial or hereditary\n• Most common sites: rectum, sigmoid colon; right-sided tumours increasing in frequency\n• Third most common cancer in Australia; second leading cause of cancer death","Risk Factors":"• Age >50 (greatest risk factor for sporadic CRC)\n• Adenomatous polyps (especially advanced adenomas: villous, high-grade dysplasia, >10 mm)\n• Family history: first-degree relative with CRC or advanced adenoma <60 years doubles risk\n• Hereditary syndromes: Lynch syndrome (MLH1, MSH2, MSH6, PMS2 mutations --- autosomal dominant, risk 40--80%); FAP (APC mutation --- 100% CRC risk without colectomy); MAP (MUTYH)\n• IBD: long-standing extensive UC or Crohn's colitis\n• Type 2 diabetes, obesity, physical inactivity\n• Red/processed meat consumption; low fibre, low calcium diet\n• Smoking, alcohol\n• Prior colorectal cancer or adenomas","Symptoms (History)":"• Change in bowel habit: looser stools, constipation, alternating (particularly concerning if new and persistent in >50 years)\n• Rectal bleeding: fresh red (left-sided/rectal) or melaena/altered blood (right-sided)\n• Iron deficiency anaemia (especially right-sided --- occult blood loss; presents late)\n• Abdominal pain (colicky --- partial obstruction, or constant --- locally advanced)\n• Weight loss, anorexia, fatigue\n• Tenesmus, mucus PR (rectal cancer)\n• Obstruction (LBO --- sigmoid/splenic flexure tumours --- emergency presentation)\n• Liver metastases: RUQ pain, hepatomegaly, jaundice (advanced disease)","Treatment":"• Colon cancer: surgical resection --- right hemicolectomy (caecum/ascending/hepatic flexure), extended right hemicolectomy (transverse), left hemicolectomy (descending/splenic flexure), sigmoid colectomy; aim for ≥12 lymph node harvest; minimally invasive (laparoscopic) preferred; adjuvant chemotherapy (FOLFOX or CAPOX/XELOX) for Stage III and high-risk Stage II\n• Rectal cancer: total mesorectal excision (TME) --- essential for achieving clear CRM; anterior resection (tumour >5 cm from anal verge --- restoring continuity, IPAA possible); abdominoperineal resection (APR --- low rectal cancer, sacrifice sphincter → permanent colostomy); neoadjuvant long-course chemoradiotherapy (LCRT) or short-course radiotherapy (SCRT) for locally advanced rectal cancer (T3/T4 or N+) to downstage and reduce local recurrence\n• Metastatic CRC: liver resection for resectable liver metastases (curative intent --- 5-year survival \\~30--50%); chemotherapy (FOLFOX, FOLFIRI, CAPOX ± bevacizumab or anti-EGFR depending on RAS/BRAF status); immunotherapy (pembrolizumab for MSI-high tumours --- PBS-listed)\n• Surveillance post-curative resection: CEA every 3 months for 3 years; CT CAP annually for 3 years; colonoscopy at 12 months post-op, then every 3--5 years\n• Emergency presentations: LBO → Hartmann's procedure or right hemicolectomy; colonic stent (SEMS) as bridge to elective surgery","Investigations":"• Colonoscopy + biopsy: gold standard --- visualise entire colon, biopsy tumour for histology, resect synchronous polyps; CT colonography if colonoscopy incomplete\n• CT chest/abdomen/pelvis with contrast: staging --- assess liver/lung metastases, local invasion, lymph nodes; TNM staging\n• MRI pelvis: rectal cancer --- essential for staging, assess mesorectal fascia involvement, CRM (circumferential resection margin --- critical for surgical planning)\n• CEA (carcinoembryonic antigen): not diagnostic; elevated in \\~70% of CRC; baseline value important for surveillance and monitoring response\n• FBC: anaemia (iron deficiency --- microcytic, hypochromic)\n• Iron studies, LFTs\n• Colonoscopic ultrasound (EUS): rectal cancer --- T and N staging\n• Genetic testing: microsatellite instability (MSI/MMR status --- deficient MMR = Lynch syndrome candidate or sporadic; also predictive of immunotherapy response); KRAS/NRAS/BRAF mutations (predictive of anti-EGFR therapy response)\n• National Bowel Cancer Screening Program (NBCSP --- Australia): biennial iFOBT (immunochemical faecal occult blood test) for all Australians aged 45--74 years"}},{"name":"Diverticular Disease","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Diverticulosis: outpouchings (pseudodiverticula --- herniation of mucosa and submucosa only, not full wall) through points of weakness in the colonic wall where the vasa recta penetrate; predominantly sigmoid colon\n• Diverticulitis: obstruction of diverticulum neck by faecolith → localised bacterial overgrowth → micro-perforation → pericolic inflammation or abscess\n• Complicated diverticulitis: abscess, perforation (purulent or faeculent peritonitis --- Hinchey classification), fistula (colovesical most common), stricture/obstruction, diverticular haemorrhage\n• Thought to be related to low-fibre diet → increased intraluminal pressure and reduced stool bulk\n• Prevalence increases with age: \\~5% at 40 years, >60% by age 80 years in Western countries","Risk Factors":"• Low-fibre, Western diet\n• Age >50 years (prevalence increases markedly)\n• Obesity\n• Physical inactivity\n• NSAID/aspirin use (increases risk of haemorrhage and perforation)\n• Constipation, low stool frequency\n• Red meat consumption","Symptoms (History)":"• Diverticulosis: usually asymptomatic\n• Symptomatic diverticular disease: mild intermittent left lower quadrant (LLQ) pain, bloating, altered bowel habit (resembles IBS)\n• Diverticulitis: constant LLQ pain (can be RLQ if right-sided or redundant sigmoid), fever, nausea, anorexia, altered bowel habit; LLQ tenderness ± localised peritonism\n• Complicated: severe pain (perforation --- generalised peritonitis); pneumaturia, faeculuria (colovesical fistula); recurrent UTI; heavy PR bleeding (diverticular haemorrhage --- typically painless, often profuse, usually right-sided diverticulum)\n• Diverticular stricture: constipation, obstruction symptoms","Treatment":"• Uncomplicated mild diverticulitis (outpatient): liquid diet, analgesia; oral antibiotics (amoxicillin-clavulanate or ciprofloxacin + metronidazole for 5--7 days); growing evidence antibiotics may not be ne
