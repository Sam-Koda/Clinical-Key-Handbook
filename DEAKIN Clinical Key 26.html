cessary in mild uncomplicated cases (AVOD trial, DIABOLO trial) --- select patients only\n• Uncomplicated moderate-severe (inpatient): bowel rest (NBM or liquid), IV antibiotics (piperacillin-tazobactam or ceftriaxone + metronidazole), IV fluids, analgesia\n• Abscess (Hinchey I/II): IV antibiotics; CT-guided percutaneous drainage if >3--4 cm\n• Purulent peritonitis (Hinchey III): emergency surgery --- laparoscopic lavage and drainage (LADIES trial) ± sigmoid resection and Hartmann's procedure\n• Faeculent peritonitis (Hinchey IV): emergency sigmoid resection + Hartmann's procedure (end colostomy --- reversal at 3--6 months in suitable patients)\n• Elective sigmoid resection: recurrent diverticulitis (≥2 hospitalised episodes), young patients (<50), immunocompromised, failed conservative management, complicated disease (fistula, stricture)\n• Diverticular haemorrhage: most stop spontaneously; colonoscopy + haemostasis; angioembolisation; surgical resection if refractory\n• High-fibre diet after resolution (≥25 g/day --- RACGP guideline); avoid NSAIDs","Investigations":"• CT abdomen/pelvis with IV contrast: preferred first-line --- confirms diagnosis, assesses severity (Hinchey grade), identifies abscess, perforation, fistula; more sensitive than USS\n• Hinchey classification: Stage I --- pericolic abscess; Stage II --- pelvic/distant abscess; Stage III --- purulent peritonitis; Stage IV --- faeculent peritonitis\n• FBC: leukocytosis, neutrophilia\n• CRP: elevated\n• Blood cultures if septic\n• Colonoscopy: NOT during acute attack (risk of perforation); recommended 4--6 weeks after resolution to exclude malignancy (CT findings can mimic CRC; risk of CRC \\~1--10% in complicated diverticulitis)\n• Cystoscopy and cystogram: if colovesical fistula suspected\n• Gastrografin enema: if CT not available; demonstrates fistula"}},{"name":"Bowel Ischaemia","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Compromise of mesenteric blood supply leading to bowel ischaemia and potentially infarction\n• Acute mesenteric ischaemia (AMI): superior mesenteric artery (SMA) embolism (\\~50% --- emboli from AF, LV thrombus, aortic atherosclerosis); SMA thrombosis (\\~25% --- acute-on-chronic, atherosclerotic); non-occlusive mesenteric ischaemia (NOMI --- \\~20% --- low flow states: cardiogenic/septic shock, vasopressors, haemodialysis); mesenteric venous thrombosis (MVT --- \\~5% --- hypercoagulable states, portal hypertension, intra-abdominal sepsis)\n• Colonic ischaemia (ischaemic colitis): most common form; usually affects watershed areas (splenic flexure --- Griffith's point, rectosigmoid junction --- Sudeck's point); causes: post-aortic surgery (SMA compromised), low-flow states, drugs (NSAIDs, cocaine, OCP), post-colonoscopy\n• Chronic mesenteric ischaemia ('intestinal angina'): atherosclerosis of at least 2 of 3 splanchnic vessels","Risk Factors":"• Atrial fibrillation (arterial embolism)\n• Atherosclerotic cardiovascular disease, hypertension\n• Age >60 years\n• Hypercoagulable states (MVT): factor V Leiden, protein C/S deficiency, antiphospholipid syndrome, polycythaemia\n• Cardiogenic shock, septic shock (NOMI)\n• Recent aortic surgery\n• Portal hypertension (MVT)\n• Vasopressor use, haemodialysis","Symptoms (History)":"• Acute mesenteric ischaemia: sudden onset severe central/periumbilical abdominal pain disproportionate to examination findings (cardinal feature --- 'pain out of proportion to signs'); nausea, vomiting, diarrhoea (early); rectal bleeding (late --- mucosal sloughing); rapid deterioration to peritonitis and shock\n• Ischaemic colitis: sudden lower abdominal pain (cramps), urgent desire to defecate, bloody diarrhoea; usually self-limiting; can progress to fulminant colitis\n• Chronic mesenteric ischaemia: postprandial abdominal pain ('intestinal angina' --- 30--60 min after eating); food fear (sitophobia), weight loss; often dismissed initially","Treatment":"• Resuscitation: aggressive IV fluids, NBM, NGT, urinary catheter, O2; correct coagulopathy, electrolytes; avoid vasopressors if possible (worsen mesenteric ischaemia)\n• Broad-spectrum IV antibiotics: cover bowel flora (piperacillin-tazobactam or carbapenem)\n• AMI --- SMA embolism: emergency revascularisation --- endovascular (catheter-directed thrombolysis/thrombectomy --- preferred if no peritonitis) or open surgical embolectomy (mesenteric bypass if thrombosis); anticoagulation post-procedure\n• AMI --- NOMI: remove precipitating cause (vasopressors), intra-arterial papaverine infusion; anticoagulation\n• MVT: anticoagulation (IV heparin → warfarin for 3--6 months or lifelong if inherited coagulopathy); thrombolysis for severe cases\n• Bowel necrosis (peritonitis): emergency laparotomy --- resection of infarcted bowel ± second-look laparotomy at 24--48 hours (to assess viability of remaining bowel before anastomosis)\n• Ischaemic colitis (mild): bowel rest, IV fluids, antibiotics; most resolve spontaneously; surgery for perforation, gangrene, fulminant colitis, or persistent symptoms >2--3 weeks\n• Chronic mesenteric ischaemia: endovascular stenting (preferred) or surgical revascularisation (bypass)","Investigations":"• Serum lactate: elevated in bowel infarction (>2 mmol/L) --- raised with ischaemia but normal early\n• FBC: leukocytosis, haemoconcentration\n• LFTs, amylase (DDx pancreatitis)\n• Coagulation studies, blood culture\n• CT angiography (CTA) abdomen/pelvis: first-line and gold standard imaging for AMI --- identifies occlusion site, bowel wall thickening, pneumatosis intestinalis, portal venous gas (late/severe), mesenteric stranding; also assesses for venous thrombosis\n• Plain AXR: pneumatosis coli (gas in bowel wall), portal venous gas (late signs, very poor prognosis); thumbprinting (mucosal oedema) in ischaemic colitis\n• Colonoscopy: ischaemic colitis --- performed within 48 hours of symptoms; shows mucosal pallor, petechiae, dark mucosa, ulceration; biopsy confirms\n• Mesenteric angiography: if CTA equivocal; allows intra-arterial papaverine infusion for NOMI"}},{"name":"Haemorrhoids","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Haemorrhoids (piles) are cushions of submucosal vascular tissue (arteriovenous communications and connective tissue) in the anal canal --- physiologically normal; become symptomatic when enlarged, prolapsed, or inflamed\n• Internal haemorrhoids: above the dentate line (covered by columnar mucosa); not painful (no somatic nerve supply above dentate line); classified by degree of prolapse\n• External haemorrhoids: below the dentate line (covered by squamous epithelium); painful if thrombosed\n• Pathophysiology: increased venous pressure, straining, weakening of supporting connective tissue","Risk Factors":"• Chronic constipation, straining at stool (prolonged sitting on toilet)\n• Low-fibre diet\n• Pregnancy and childbirth (increased intra-abdominal pressure, pelvic congestion)\n• Portal hypertension (high-flow varices --- distinct from true haemorrhoids)\n• Obesity\n• Age (tissue laxity increases)\n• Family history","Symptoms (History)":"• Painless bright red rectal bleeding (PR): blood on toilet paper or streaking on stool surface --- hallmark; NB: always investigate PR bleeding to exclude malignancy\n• Prolapse: tissue protrudes during defecation (classification: 1st° --- no prolapse; 2nd° --- prolapse and spontaneously reduce; 3rd° --- prolapse, require digital reduction; 4th° --- irreducible)\n• Pruritus ani, mucous discharge, soiling\n• Discomfort/ache (sensation of incomplete evacuation)\n• Thrombosed external haemorrhoid: acutely painful, tender perianal lump, blue-purple discolouration","Treatment":"• Lifestyle: high-fibre diet (≥25 g/day), adequate hydration (8 glasses/day), avoid straining (toilet habits --- limit sitting time), regular exercise; sitz baths for comfort\n• Topical preparations: local anaesthetic cream, astringents --- symptomatic relief only; steroid creams (short term); limited evidence\n• 1st and 2nd degree haemorrhoids: rubber band ligation (RBL) --- most effective outpatient procedure (applied above dentate line); sclerotherapy (injection of phenol in oil); infrared coagulation\n• 3rd and 4th degree haemorrhoids: surgical haemorrhoidectomy (Milligan-Morgan excisional or Ferguson's stapled haemorrhoidopexy --- PPH); haemorrhoidal artery ligation under doppler guidance (THD/HALO --- reduced post-op pain)\n• Thrombosed external haemorrhoid (acute, <72 hours): incision and evacuation under LA for rapid pain relief; conservative management (sitz baths, analgesia, ice packs) after 72 hours as spontaneous resolution occurs\n• Do not perform banding/injection in 4th degree, irreducible, or portal hypertension haemorrhoids","Investigations":"• Clinical/proctoscopic diagnosis in most cases --- no blood tests required for uncomplicated haemorrhoids\n• Proctoscopy: primary investigation --- visualise internal haemorrhoids at dentate line, assess grade\n• Rigid sigmoidoscopy: exclude distal rectal/sigmoid lesions causing PR bleeding\n• Colonoscopy: mandatory if alarm features (age >45 years, family history of CRC, iron deficiency anaemia, change in bowel habit, inadequate explanation of bleeding by haemorrhoids) --- exclude CRC/polyps\n• FBC and iron studies: if significant/chronic bleeding causing anaemia\n• Anorectal manometry: rarely required; useful if incontinence is a concern pre-operatively"}},{"name":"Anal Fissures","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Linear tear/ulcer in the squamous epithelium of the anal canal, usually in the posterior midline (90%) or anterior midline (10%); posterior due to relatively poor blood supply at this point and reduced sphincter tension elsewhere\n• Acute fissure: superficial, fresh; heals with conservative management\n• Chronic fissure: >6 weeks; associated with elevated internal anal sphincter (IAS) tone causing ischaemia --- 'ischaemic ulcer'; sentinel skin tag at external end and hypertrophied anal papilla at internal end are hallmarks\n• Atypical location (lateral, multiple): consider Crohn's disease, HIV, sexually transmitted infections (herpes, syphilis), TB, malignancy","Risk Factors":"• Constipation and hard stools (acute fissures)\n• Diarrhoea (paradoxically causes fissures --- especially Crohn's related)\n• Childbirth/obstetric trauma (anterior fissures in women)\n• Crohn's disease\n• Anal intercourse\n• Low-fibre diet","Symptoms (History)":"• Severe anal pain during and after defecation (lasts minutes to hours --- 'like passing glass/razor blades')\n• Bright red rectal bleeding: small amount on toilet paper or stool surface (distinguish from haemorrhoids --- haemorrhoids usually less painful)\n• Avoidance of defecation (fear of pain) → constipation → worsened fissure (vicious cycle)\n• Pruritus ani","Treatment":"• Acute fissure: high-fibre diet, increased fluid intake, stool softeners (lactulose or Coloxyl), sitz baths, topical local anaesthetic (lidocaine gel)\n• Chronic fissure --- first-line: topical glyceryl trinitrate (GTN 0.2--0.4% ointment BD) --- reduces IAS tone via NO release; heals \\~50% at 8 weeks; headache is main side effect; OR topical diltiazem/nifedipine (calcium channel blocker --- fewer headaches, comparable efficacy)\n• Chronic fissure --- second-line: botulinum toxin injection (into IAS, 20--40 units) --- chemical sphincterotomy; \\~70% healing rate; may cause temporary incontinence\n• Surgical --- lateral internal sphincterotomy (LIS): division of part of IAS; gold standard surgical treatment; \\~95% healing rate; small risk of permanent incontinence (especially anterior fissures in women); reserved for failed conservative/chemical treatment\n• Caution: avoid LIS in Crohn's disease (impaired healing), reduced baseline sphincter tone, obstetric sphincter injury --- risk of incontinence\n• Advance flap repair: for fissures with very high surgical risk or recurrence post-sphincterotomy","Investigations":"• Usually clinical diagnosis --- no investigations required for typical cases\n• If atypical: biopsy under EUA; MRI pelvis (Crohn's fistula); STI screening (HIV, syphilis, herpes)\n• Anorectal manometry: assess sphincter pressure (high IAS tone); guides treatment (chemical vs surgical sphincterotomy)\n• Sigmoidoscopy/colonoscopy: if Crohn's suspected or PR bleeding not explained by fissure alone"}},{"name":"Perianal Abscess / Fistula-in-Ano","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Perianal abscess: infection of the anal glands (cryptoglandular theory --- Parks, 1961); anal glands at the dentate line extend into the intersphincteric space → blocked → abscess formation\n• Classified by anatomical location: perianal (\\~60%, most common --- subcutaneous), ischiorectal (\\~30%), intersphincteric (\\~5%), suprasphincteric (<1%), horseshoe abscess (bilateral, communicates posteriorly)\n• Fistula-in-ano: chronic epithelialised track connecting an internal opening (usually at dentate line) to an external opening on perianal skin --- develops from incompletely drained or recurrent abscess in \\~30--50%\n• Parks classification of fistulae: intersphincteric (most common, \\~70%), transsphincteric (\\~25%), suprasphincteric, extrasphincteric\n• Secondary causes: Crohn's disease (associated with complex/multiple/high fistulae --- always consider), HIV, TB, malignancy, radiation, diverticular disease","Risk Factors":"• Male sex (3:1)\n• Crohn's disease (major risk for complex fistulae)\n• Diabetes mellitus (impaired immune response, poor wound healing)\n• Immunosuppression\n• HIV\n• Constipation, diarrhoea\n• Smoking","Symptoms (History)":"• Perianal abscess: constant throbbing perianal pain, swelling, tenderness; fever, malaise; may have purulent discharge if spontaneously draining\n• Ischiorectal abscess: may present with buttock pain ± fever without obvious external swelling (deeper)\n• Fistula-in-ano: persistent purulent discharge from perianal opening; recurrent perianal abscesses; intermittent pain; pruritus; may notice cord-like track on examination","Treatment":"• Perianal abscess: urgent incision and drainage (I&D) under LA (small perianal) or GA (deeper/ischiorectal) --- do NOT wait for fluctuance; ensure complete drainage of all loculations; pack cavity loosely; antibiotics only if systemic sepsis or immunocompromise or significant cellulitis\n• Simple fistula (intersphincteric, low transsphincteric, little or no sphincter involvement): fistulotomy --- lay open track; allows healing by secondary intention; effective and low recurrence rate; appropriate if ≥50% sphincter preserved\n• Complex fistula (high transsphincteric, suprasphincteric, associated with Crohn's or prior sphincter injury): staged approach --- seton insertion (non-cutting loose seton to drain, control sepsis, and allow safe subsequent definitive repair; allows fibrous reaction around sphincter); then options: advancement flap (mucosal/rectal); LIFT procedure (ligation of intersphincteric fistula tract); fibrin glue injection; VAAFT (video-assisted anal fistula treatment); collagen plugs\n• Crohn's fistulae: optimize systemic Crohn's therapy (anti-TNF --- infliximab --- most evidence for fistula closure); combination medical + surgical (loose seton + infliximab); permanent seton drainage for palliation; proctectomy in refractory cases","Investigations":"• Abscess: clinical diagnosis --- no investigations required before surgical drainage\n• FBC: leukocytosis; blood glucose (exclude diabetes)\n• MRI pelvis: gold standard for fistula mapping --- delineates anatomy, identifies extensions, secondary tracks, horseshoe component, and relationship to sphincters; essential before surgical planning\n• EUS (endo-anal ultrasound): alternative to MRI for fistula mapping; less sensitive for suprasphincteric anatomy\n• Sigmoidoscopy/colonoscopy: exclude Crohn's disease, malignancy (especially if atypical fistula)\n• Fistulogram: not commonly used now (replaced by MRI)"}},{"name":"Abdominal Wall Hernias","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Protrusion of an organ or tissue through a defect in the abdominal wall\n• Inguinal hernia (\\~75% of all hernias): indirect (through patent processus vaginalis --- lateral to inferior epigastric vessels --- congenital/young males) or direct (through Hesselbach's triangle weakness --- medial to inferior epigastric vessels --- acquired, older males)\n• Femoral hernia (\\~5%): below and lateral to pubic tubercle through femoral canal; more common in females; highest risk of strangulation\n• Umbilical hernia: through umbilical ring; common in infants (resolve spontaneously by age 5), adults (obesity, ascites, multiparity)\n• Incisional hernia: through previous surgical wound/scar; related to wound complications (infection, dehiscence)\n• Epigastric hernia: through linea alba between xiphoid and umbilicus\n• Spigelian, obturator, lumbar hernias: rare","Risk Factors":"• Male sex (inguinal hernia)\n• Age (tissue laxity, direct inguinal hernia)\n• Chronic increased intra-abdominal pressure: chronic cough (COPD, smoking), constipation, prostatism, heavy lifting, obesity, ascites, pregnancy\n• Prior abdominal surgery (incisional hernia)\n• Connective tissue disorders (Marfan's, Ehlers-Danlos)\n• Family history","Symptoms (History)":"• Reducible hernia: intermittent lump/bulge at hernia site; dull ache/discomfort (especially with exertion, Valsalva, prolonged standing); disappears on lying down\n• Irreducible (incarcerated): persistent lump, constant pain, tenderness; bowel contained → risk of obstruction\n• Strangulated hernia: severe constant pain, tender irreducible lump, features of bowel obstruction (nausea, vomiting, distension), signs of systemic illness (fever, tachycardia) --- surgical emergency (bowel ischaemia/necrosis)\n• Femoral hernia: often small and occult, presents acutely with strangulation\n• Inguinal hernia: groin/scrotal lump; cough impulse","Treatment":"• Watchful waiting: asymptomatic reducible inguinal hernia (especially elderly, unfit for surgery) --- low risk of acute complications (\\~0.2%/year); however most Australian surgeons recommend elective repair for symptomatic hernias\n• Elective surgical repair: laparoscopic (TAPP --- transabdominal preperitoneal; or TEP --- totally extraperitoneal) or open (Lichtenstein tension-free mesh repair --- gold standard for open inguinal hernia); mesh reinforcement reduces recurrence\n• Femoral hernia: elective repair recommended for all due to high strangulation risk (>50%) --- even if asymptomatic\n• Emergency repair (strangulation/incarceration): urgent surgical exploration; resection of gangrenous bowel if necrotic; mesh avoided if contaminated field (absorbable or biological mesh considered)\n• Umbilical hernia: children --- conservative until age 5 (most close spontaneously); adults --- elective repair if symptomatic or >2 cm\n• Incisional hernia: laparoscopic or open mesh repair; optimise patient pre-op (weight loss, smoking cessation, cough treatment, ascites control); component separation for large defects\n• Post-repair: avoid heavy lifting for 4--6 weeks; early return to light activities encouraged","Investigations":"• Clinical diagnosis in most cases --- no investigations required for typical hernias\n• Ultrasound: if diagnosis uncertain (especially obese patients); confirms presence and reducibility\n• CT abdomen/pelvis: complex hernias (incisional hernia size/content, obturator hernia, Spigelian); pre-operative planning for large incisional hernias; investigation of choice for strangulated hernia (identifies ischaemia)\n• Bloods: FBC, U&E, lactate --- if strangulation suspected or emergency presentation"}},{"name":"Peritonitis","stars":3,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Inflammation of the peritoneum --- can be localised or generalised\n• Primary peritonitis (Spontaneous Bacterial Peritonitis --- SBP): bacterial infection of ascitic fluid without identifiable intra-abdominal source; most common organism E. coli, Klebsiella; occurs in cirrhosis with portal hypertension and ascites\n• Secondary peritonitis (most common): contamination from ruptured intra-abdominal viscus --- perforated peptic ulcer (peptic ulcer disease), perforated appendix, perforated diverticulitis (faeculent/purulent), bowel ischaemia/infarction, anastomotic leak (post-surgical), perforated gallbladder, trauma\n• Tertiary peritonitis: persistent/recurrent peritonitis after treatment; often polymicrobial/resistant organisms; immunocompromised patients\n• Chemical peritonitis: bile (biliary perforation), gastric acid (perforated peptic ulcer), urine, blood","Risk Factors":"• Cirrhosis and ascites (SBP)\n• Previous abdominal surgery (adhesions, anastomotic leak)\n• IBD, diverticular disease\n• PUD, appendicitis\n• Bowel ischaemia, trauma\n• Immunosuppression\n• Peritoneal dialysis (PD peritonitis --- CAPD)","Symptoms (History)":"• Acute generalised abdominal pain --- constant, severe, worse with movement\n• Nausea, vomiting\n• High fever, rigors\n• Anorexia\n• Preceding symptoms of causative condition (e.g. biliary colic → perforation; pain that suddenly worsens/becomes generalised)\n• SBP: may be subtle --- worsening ascites, fever, confusion (encephalopathy), abdominal pain; can be asymptomatic","Treatment":"• Secondary peritonitis: surgical emergency --- resuscitation then urgent laparotomy/laparoscopy; 'source control' --- repair perforation, resection of infarcted bowel, drainage of pus; broad-spectrum IV antibiotics (piperacillin-tazobactam or carbapenem --- cover Gram-negative, Gram-positive, anaerobes); bowel decompression (NGT), urinary catheter, IV fluids; ICU post-operatively for severe cases; damage control surgery for unstable patients\n• Perforated PUD: Graham patch repair; IV PPI, eradication of H. pylori once recovered\n• SBP: IV cefotaxime (or ceftriaxone 1--2 g daily) for 5 days + IV albumin (1.5 g/kg day 1; 1 g/kg day 3 --- reduces hepatorenal syndrome); secondary prophylaxis: norfloxacin 400 mg OD or co-trimoxazole indefinitely\n• CAPD peritonitis: intraperitoneal antibiotics (vancomycin + ceftazidime) per ISPD guidelines; catheter removal if no improvement at 48--72 hours or fungal peritonitis\n• Sepsis management: early goal-directed fluid resuscitation, vasopressors (noradrenaline) if refractory shock, early antibiotics","Investigations":"• Erect CXR: free subdiaphragmatic gas --- perforation (\\~80% sensitive)\n• AXR: free gas, ileus\n• CT abdomen/pelvis with IV contrast: most sensitive for perforation (pneumoperitoneum), identifies source and extent; free fluid/pus; bowel wall thickening\n• Bloods: FBC (leukocytosis), CRP, U&E, creatinine, LFTs, glucose, coagulation, lactate (severity/ischaemia), blood cultures (2 sets), blood group and hold\n• Diagnostic paracentesis (SBP diagnosis): ascitic fluid --- PMN count ≥250 cells/mm³ = SBP; culture (sensitivity 40--50% with blood culture bottles); albumin (SAAG), total protein, glucose, LDH\n• ABG: metabolic acidosis (severe sepsis)"}},{"name":"Stoma Management","stars":2,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• A stoma is a surgically created opening of the bowel or urinary tract to the skin surface to divert faecal or urinary stream\n• Colostomy: opening of colon to skin; formed when continuity of bowel cannot be restored --- most common: end colostomy (Hartmann's procedure --- diverted sigmoid following resection), loop colostomy (temporary diversion)\n• Ileostomy: opening of ileum to skin; formed after proctocolectomy (ulcerative colitis --- Brooke/loop ileostomy), or as temporary defunctioning stoma; higher output (\\~1--1.5 L/day), liquid\n• Urostomy (ileal conduit): diversion of ureters via ileal segment --- bladder cancer/pelvic trauma\n• Sites: right iliac fossa (ileostomy), left iliac fossa (colostomy)","Risk Factors":"• Ileostomy complications: high output (>2 L/day) → dehydration, electrolyte abnormalities (hyponatraemia, hypokalaemia, renal impairment); prolapse; retraction; parastomal hernia; skin excoriation (alkaline ileal output)\n• Colostomy complications: constipation/diarrhoea, parastomal hernia (most common long-term complication --- occurs in >30%), prolapse, retraction, ischaemia (early)\n• All stomas: skin irritation, appliance leakage, psychological impact, body image concerns, social isolation","Symptoms (History)":"• High-output ileostomy: thirst, reduced urine output, cramps, headache (dehydration); diarrhoea\n• Parastomal hernia: bulging around stoma, discomfort (especially on standing)\n• Retraction: stoma below skin level --- appliance leakage, skin problems\n• Prolapse: stoma protrudes excessively\n• Ischaemia: dark/black stoma (within days of formation --- surgical emergency if full-thickness)\n• Mucocutaneous separation, peristomal skin irritation","Treatment":"• Pre-operative care: stoma siting (stomal therapy nurse/enterostomal therapist --- mark optimal site away from belt line, scars, skin folds), patient education, psychological preparation\n• Post-operative: stomal therapy nurse review (critical in Australia --- stoma nurse referral mandatory pre-op); correct appliance selection; skin barrier wafers and seals; peristomal hernia support belts\n• High-output ileostomy: fluid restriction (restrict hypotonic fluids); oral rehydration solution (St Mark's solution --- sodium replacement); loperamide (up to 16 mg/day in divided doses before meals --- slows transit); codeine; octreotide for refractory cases; replace electrolytes (Mg, Na, K); IV fluids if dehydrated; avoid NSAIDs (worsen output); restrict dietary fibre initially\n• Parastomal hernia: supportive hernia belt; elective surgical repair (open or laparoscopic, with mesh --- high recurrence rate); stoma relocation\n• Stoma reversal: ileostomy reversal (Hartmann's reversal for colostomy) when underlying condition resolved, patient optimised, and anastomosis safe --- typically 8--12 weeks for ileostomy, 3--12 months for Hartmann's","Investigations":"• High-output ileostomy: electrolytes (Na, K, Mg), creatinine, urine sodium (spot --- low if depletion), urine osmolality\n• Bowel obstruction: AXR, CT abdomen\n• Parastomal hernia: CT abdomen/pelvis (size, contents)\n• Stoma output: record volume; send for MC&S if infectious aetiology\n• Pre-operative: colonoscopy/imaging to assess underlying bowel disease before reversal"}},{"name":"Gastric Cancer","stars":2,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Most common type: gastric adenocarcinoma (\\~95%), classified as intestinal type (Lauren classification --- associated with H. pylori, metaplasia, intestinal-type glands, better prognosis) or diffuse type (poorly cohesive signet ring cells, more aggressive, linitis plastica pattern)\n• H. pylori infection: most important carcinogen; causes chronic gastritis → atrophy → intestinal metaplasia → dysplasia → cancer (Correa cascade)\n• Other types: GIST (gastrointestinal stromal tumour --- c-KIT/PDGFRA mutation), gastric lymphoma (MALT lymphoma --- H. pylori driven, B-cell), neuroendocrine tumours\n• Less common in Australia than East Asia; incidence declining with H. pylori eradication","Risk Factors":"• H. pylori infection (relative risk 3--6×)\n• Smoking\n• High salt diet, preserved/pickled/smoked foods, low fruit and vegetable intake\n• Family history, hereditary diffuse gastric cancer (CDH1/E-cadherin mutation --- highly penetrant)\n• Pernicious anaemia, chronic atrophic gastritis, intestinal metaplasia\n• Prior gastric surgery (Billroth II --- reflux of bile)\n• Male sex, age >60\n• Blood group A (diffuse type)","Symptoms (History)":"• Early: often asymptomatic or non-specific --- dyspepsia, epigastric discomfort, early satiety\n• Late (advanced disease): weight loss, anorexia, progressive dysphagia (GOJ tumour), nausea/vomiting (gastric outlet obstruction), haematemesis or melaena, abdominal pain\n• Signs of spread: jaundice (liver metastases), ascites (peritoneal metastases --- Krukenberg tumours to ovaries), dyspnoea (pleural/lung metastases)\n• Alarm symptoms: dysphagia, unexplained weight loss, persistent vomiting, haematemesis, iron deficiency anaemia, palpable mass --- urgent OGD","Treatment":"• Resectable disease (Stage I-III): subtotal or total gastrectomy with D2 lymphadenectomy (≥15 lymph nodes); Billroth II (gastrojejunostomy) or Roux-en-Y reconstruction; perioperative chemotherapy (FLOT --- docetaxel/oxaliplatin/5-FU/leucovorin --- preferred per FLOT4 trial) or adjuvant capecitabine + oxaliplatin\n• Early gastric cancer: endoscopic submucosal dissection (ESD) for T1a tumours meeting criteria (guideline-directed)\n• Advanced/metastatic: platinum + fluoropyrimidine (FOLFOX, XELOX) ± trastuzumab (HER2+); nivolumab or pembrolizumab added if CPS ≥5; best supportive care\n• Palliation: biliary stent or bypass for jaundice; gastric outlet obstruction --- enteral stent or gastrojejunostomy; analgesia; nutritional support\n• MDT: surgery, medical oncology, radiation, gastroenterology, dietitian, palliative care","Investigations":"• Upper GI endoscopy (OGD) + biopsy (multiple biopsies --- ≥6 for adequate sampling): gold standard; assess location, size, morphology (Borrmann classification)\n• CT chest/abdomen/pelvis with contrast: staging --- liver metastases, peritoneal disease, lymphadenopathy, adjacent organ invasion\n• Endoscopic ultrasound (EUS): T and N staging for resectable tumours\n• PET scan: staging, occult metastases\n• Diagnostic laparoscopy ± peritoneal washings: staging before intended resection (peritoneal disease not always seen on CT)\n• HER2 status (IHC/FISH): all advanced/metastatic gastric cancers --- trastuzumab if HER2-positive\n• MSI/MMR, PD-L1 (CPS): immunotherapy eligibility\n• FBC, LFTs, albumin, CEA, CA 19-9"}},{"name":"Oesophageal Cancer","stars":1,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Two main histological types: squamous cell carcinoma (SCC --- proximal/mid oesophagus; associated with smoking, alcohol, HPV, achalasia, Plummer-Vinson syndrome, hot drinks) and adenocarcinoma (ADC --- distal oesophagus/GOJ; complication of Barrett's oesophagus; associated with GORD, obesity)\n• ADC now more common than SCC in Western countries including Australia\n• Barrett's oesophagus: metaplastic replacement of squamous with columnar epithelium at GOJ due to chronic GORD → low-grade dysplasia → high-grade dysplasia → adenocarcinoma","Risk Factors":"• SCC: smoking, alcohol, achalasia, coeliac disease (refractory), hot beverages, nutritional deficiencies, low SES\n• ADC: GORD, Barrett's oesophagus, obesity, male sex, white ethnicity, age >60 years","Symptoms (History)":"• Progressive dysphagia: initially solids, then liquids (cardinal symptom)\n• Weight loss, anorexia, cachexia\n• Odynophagia (painful swallowing)\n• Regurgitation\n• Hoarseness (recurrent laryngeal nerve involvement), cough (tracheo-oesophageal fistula)\n• Advanced: haematemesis, aspiration pneumonia","Treatment":"• Resectable (T1-T3, N0-N1, M0): oesophagectomy (Ivor-Lewis, McKeown, or transhiatal) with neoadjuvant chemoradiotherapy (CROSS protocol --- carboplatin/paclitaxel + RT) or perioperative chemotherapy (FLOT for GOJ ADC); high-volume centres only\n• Early (T1a): endoscopic mucosal resection (EMR) or ESD\n• Advanced/unresectable: palliative chemotherapy (platinum + fluoropyrimidine ± immunotherapy); oesophageal stent for dysphagia palliation; radiotherapy; enteral nutrition via PEG/NJT; palliative care","Investigations":"• OGD + biopsy: diagnosis\n• CT chest/abdomen/pelvis: staging\n• EUS: T and N staging; assess resectability\n• PET-CT: detect occult metastases\n• Staging laparoscopy: before planned resection\n• Bronchoscopy: if SCC to assess airway invasion"}},{"name":"Anal Cancer","stars":1,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Squamous cell carcinoma (SCC) of the anal canal --- most common (\\~85%); arises from squamous epithelium below dentate line and transformation zone\n• Strongly associated with human papillomavirus (HPV) --- particularly HPV 16 and 18 (oncogenic subtypes); analogous to cervical SCC\n• Other types: adenocarcinoma (rare --- from anal glands or above dentate line), melanoma (aggressive, rare), GIST\n• HIV-associated immunosuppression dramatically increases risk (100× general population)","Risk Factors":"• HPV infection (types 16, 18)\n• HIV infection and immunosuppression\n• Multiple sexual partners, receptive anal intercourse (MSM)\n• History of other HPV-related cancers (cervical, vulval, penile)\n• Smoking (independent risk factor)\n• Chronic perianal inflammation (Crohn's, chronic fistula)","Symptoms (History)":"• Rectal bleeding, anal pain, perianal mass\n• Pruritus, mucous discharge\n• Change in bowel habit\n• Often misdiagnosed as haemorrhoids --- examine carefully\n• Incontinence if sphincter involved","Treatment":"• Squamous cell carcinoma: chemoradiotherapy (CRT) --- Nigro protocol (mitomycin-C + 5-FU + radiotherapy) is definitive treatment (curative in \\~80% of localised disease); surgery (APR) reserved for residual/recurrent disease or incontinence complications\n• HPV vaccination (Gardasil 9) --- prevention; included in Australian National Immunisation Program for males and females 12--13 years\n• HAART for HIV-positive patients\n• Surveillance post-CRT: digital rectal examination and flexible sigmoidoscopy at 6 and 12 months","Investigations":"• Biopsy (EUA): tissue diagnosis\n• MRI pelvis: local staging, sphincter involvement\n• CT chest/abdomen/pelvis: staging\n• PET-CT: staging, residual disease\n• HIV test, HPV typing\n• Inguinal node FNA/biopsy if enlarged"}},{"name":"Rectal Prolapse","stars":1,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Full-thickness protrusion of the rectum through the anal canal\n• Types: complete/external (full-thickness --- all layers of rectum protrude), internal (intussusception --- only diagnosed on imaging/EUA), mucosal (only mucosa protrudes --- distinguished from complete by circumferential vs radial folds)\n• Pathophysiology: redundant sigmoid colon, deep pouch of Douglas, weak pelvic floor and puborectalis, pudendal nerve neuropathy, chronic straining","Risk Factors":"• Female sex (6:1 ratio --- after childbirth)\n• Elderly age\n• Chronic constipation and straining\n• Multiparity/obstetric trauma\n• Neurological conditions (spinal cord injury, multiple sclerosis)\n• Psychiatric conditions (associated in younger patients)","Symptoms (History)":"• Protrusion of tissue through anus (with defecation or physical activity; may be persistent)\n• Mucous and bloody discharge, soiling, pruritus\n• Difficulty with defecation, constipation, incomplete emptying\n• Faecal incontinence (sphincter stretched by repeated prolapse)\n• Perianal discomfort","Treatment":"• Conservative: high-fibre diet, avoid straining, pelvic floor physiotherapy (mild cases)\n• Surgery --- indicated for most complete prolapses: abdominal approach (rectopexy --- laparoscopic ventral mesh rectopexy \\[LVMR, D'Hoore procedure\\] --- preferred in Australia for fit patients; low recurrence <5%; improves constipation and incontinence) or Altemeier's perineal rectosigmoidectomy (perineal approach --- lower morbidity, suited for elderly/unfit; higher recurrence)\n• Delormes procedure: perineal mucosal stripping with muscle plication --- for mucosal prolapse or high-risk patients\n• Strangulated/gangrenous prolapse: emergency surgery after resuscitation","Investigations":"• Clinical diagnosis in most cases\n• Defaecating proctogram (or dynamic MRI proctogram): demonstrates internal prolapse, rectocele, enterocele, pelvic floor dysfunction\n• Anorectal manometry: sphincter function (guides prognosis for incontinence post-repair)\n• Colonoscopy: exclude malignancy, polyps"}},{"name":"Obesity Surgery (Bariatric Surgery)","stars":1,"category":"Gastrointestinal Conditions","subcategory":"Gastrointestinal Conditions","sections":{"Cause / Aetiology":"• Surgical interventions that induce durable weight loss through restriction of gastric volume, malabsorption, altered gut hormone signalling, and changes to gut microbiome\n• Indications (Australian guidelines --- OSSANZ/NHMRC): BMI ≥40 kg/m², OR BMI ≥35 with obesity-related comorbidity (T2DM, OSA, hypertension, dyslipidaemia, NAFLD); failed >6 months of non-surgical weight management; no active substance abuse or uncontrolled psychiatric illness","Risk Factors":"• Most effective treatment for severe obesity and associated metabolic disease\n• Type 2 diabetes remission rates: 60--80% following RYGB; 50--60% sleeve gastrectomy\n• OSA, hypertension, dyslipidaemia --- all improve significantly post-surgery\n• Associated risks: nutritional deficiencies (iron, B12, folate, calcium, vitamin D --- life-long supplementation required), dumping syndrome, GORD (sleeve → worsens GORD), anastomotic leak (0.5--2%)","Symptoms (History)":"• Pre-operative: obesity-related comorbidities --- OSA, T2DM, GORD, musculoskeletal pain, depression\n• Post-operative complications: early --- anastomotic leak (tachycardia, fever, pain --- most feared), DVT/PE, bleeding; late --- GORD (sleeve), marginal ulcer (RYGB), nutritional deficiencies, dumping syndrome (RYGB --- early: vasomotor symptoms, sweating, palpitations post-meal; late: reactive hypoglycaemia), internal hernia (Petersen's defect --- RYGB --- bowel obstruction)","Treatment":"• Laparoscopic sleeve gastrectomy (LSG): most common procedure in Australia --- resects greater curvature, leaves 80--100 mL gastric tube; pure restriction + ghrelin reduction; good weight loss (\\~25% TBWL at 1 year); simpler, no malabsorption; worsens GORD\n• Laparoscopic Roux-en-Y gastric bypass (LRYGB): gold standard --- small gastric pouch anastomosed to Roux limb; restriction + malabsorption + gut hormone changes; superior weight loss (\\~30% TBWL) and diabetes remission; risk of nutritional deficiencies, dumping\n• Laparoscopic adjustable gastric banding (LAGB): largely abandoned in Australia due to poor long-term outcomes and high revision rates\n• Biliopancreatic diversion with duodenal switch (BPD-DS): most effective but highest risk of malabsorption; reserved for super-obese\n• Multidisciplinary team: bariatric surgeon, endocrinologist, gastroenterologist, dietitian, psychologist, sleep physician, exercise physiologist\n• Lifelong supplementation: multivitamin, iron, calcium + vitamin D, B12; regular follow-up mandatory","Investigations":"• Pre-operative workup: FBC, iron studies, B12, folate, vitamin D, zinc, parathyroid hormone, LFTs, fasting glucose/HbA1c, lipids, thyroid function, sleep study (OSA), cardiac assessment, upper GI endoscopy (H. pylori screen and eradication), psychological evaluation, dietitian assessment\n• Post-operative monitoring: regular bloods (FBC, iron, B12, folate, vitamin D, calcium, PTH, zinc) --- every 3--6 months year 1, then annually lifelong; DEXA scan; HbA1c in diabetics"}},{"name":"Headache (Migraine & Tension-Type)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Neurological Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Migraine: Female sex, family history, hormonal fluctuations (menstruation, OCP), stress, sleep disruption, dietary triggers (caffeine, alcohol, tyramine-containing foods).\n• TTH: Stress, poor posture, eye strain, dehydration, caffeine withdrawal, anxiety/depression.\n• Medication overuse headache (MOH): Frequent use of analgesics/triptans >10--15 days/month.","Symptoms (History)":"---","Treatment":"• Migraine --- Acute: NSAIDs (aspirin 900 mg, ibuprofen 400 mg) or paracetamol ± antiemetic (metoclopramide, prochlorperazine).\n• Triptans (e.g., sumatriptan 50--100 mg oral) for moderate-severe attacks.\n• Migraine --- Preventive (≥2 attacks/month impairing QoL): amitriptyline, propranolol, topiramate, valproate, candesartan.\n• CGRP antagonists (erenumab) for refractory cases.\n• TTH --- Acute: Paracetamol or NSAIDs.\n• Avoid opioids and frequent analgesic use (risk of MOH).\n• TTH --- Preventive: Amitriptyline (first-line).\n• Non-pharmacological: stress management, physiotherapy, CBT, sleep hygiene.\n• MOH: Gradual analgesic withdrawal under medical supervision.","Investigations":"• Primarily a clinical diagnosis --- no routine investigations required for typical primary headache.\n• CT head (non-contrast): for sudden-onset headache (exclude SAH), focal deficits, or first-ever severe headache.\n• MRI brain with contrast: preferred for structural lesion exclusion, especially if neurological deficit or papilloedema.\n• Headache diary: to track frequency, severity, triggers, and medication use --- aids classification and prophylaxis decisions.\n• LP (after CT): if thunderclap headache and CT negative --- to exclude SAH (xanthochromia)."}},{"name":"Epilepsy","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Neurological Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Family history of epilepsy.\n• Prior febrile convulsions (especially complex or prolonged).\n• Brain injury (TBI, stroke, CNS infection, hypoxic-ischaemic injury).\n• Neurodevelopmental disorders (cerebral palsy, intellectual disability).\n• Alcohol/drug withdrawal.","Symptoms (History)":"---","Treatment":"• Lifestyle: seizure first aid education, driving restrictions (6 months seizure-free in most states per Austroads guidelines), water safety, avoid sleep deprivation and alcohol.\n• Antiepileptic drugs (AEDs): usually commenced after second unprovoked seizure.\n• Choice guided by seizure type, epilepsy syndrome, age, sex (teratogenicity), comorbidities.\n• Focal epilepsy: levetiracetam, lamotrigine, lacosamide, oxcarbazepine, carbamazepine.\n• Generalised epilepsy: valproate (most effective --- restricted in women of childbearing age), levetiracetam, lamotrigine, ethosuximide (absences).\n• Refractory epilepsy (failure of ≥2 AEDs): refer to neurologist for epilepsy surgery evaluation, vagal nerve stimulation, or ketogenic diet.\n• Status epilepticus: IV lorazepam → phenytoin/levetiracetam → anaesthesia (ICU).","Investigations":"• EEG (electroencephalography): essential; supports diagnosis and classification; may show interictal epileptiform discharges.\n• Normal EEG does not exclude epilepsy.\n• MRI brain (preferred over CT): detects structural causes --- hippocampal sclerosis, cortical dysplasia, tumours, vascular malformations.\n• BSL, UEC, LFTs, FBC, CMP: exclude metabolic causes.\n• ECG: exclude cardiac arrhythmia (Stokes-Adams attack, long QT).\n• Autoimmune panel (anti-NMDAR, LGI1, CASPR2) if encephalitis suspected.\n• HLA-B\\*15:02 testing in patients of Asian ancestry before commencing carbamazepine."}},{"name":"Brain Tumour","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Neurological Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Prior therapeutic cranial irradiation.\n• Genetic syndromes: neurofibromatosis (NF1/NF2), tuberous sclerosis, Li-Fraumeni, Von Hippel-Lindau.\n• Immunosuppression (primary CNS lymphoma).\n• Age: GBM peaks in 6th--7th decade; medulloblastoma common in children.\n• Male sex (most gliomas), female sex (meningiomas).","Symptoms (History)":"---","Treatment":"• Surgery: craniotomy for resection (if surgically accessible) --- both therapeutic and diagnostic.\n• Stereotactic biopsy if unresectable.\n• GBM: maximal safe resection → concurrent chemoradiotherapy (temozolomide + radiation) → adjuvant temozolomide (Stupp protocol).\n• Meningioma (benign): observation (small/asymptomatic), surgical resection, or stereotactic radiosurgery (Gamma Knife).\n• Metastatic disease: whole-brain radiotherapy (WBRT), stereotactic radiosurgery (SRS), surgical resection for solitary met with controlled primary.\n• Supportive: dexamethasone to reduce perilesional oedema; antiepileptics if seizures occur; MDT approach including neuro-oncology, neurosurgery, radiation oncology, palliative care.","Investigations":"• MRI brain with gadolinium contrast: investigation of choice --- characterises lesion, identifies oedema, midline shift, herniation.\n• CT head: initial rapid assessment, especially if MRI unavailable --- ring-enhancing lesion with surrounding oedema in GBM/metastasis.\n• CT chest/abdomen/pelvis + PET: staging for metastatic disease.\n• Tissue biopsy/surgical resection: definitive diagnosis and molecular profiling (IDH, MGMT, 1p/19q co-deletion --- guides prognosis and treatment).\n• Bloods: LFTs, UEC, FBC, tumour markers as clinically indicated."}},{"name":"Degenerative Neurological Conditions (Parkinson's Disease, Motor Neurone Disease, Multiple Sclerosis)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Neurological Conditions","sections":{}},{"name":"Neuropathy (Peripheral Neuropathy)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Neurological Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Type 2 diabetes (duration and glycaemic control).\n• Chronic excessive alcohol use.\n• Chemotherapy exposure.\n• Older age, CKD, liver disease.\n• Family history (hereditary neuropathies).","Symptoms (History)":"---","Treatment":"• Treat underlying cause: glycaemic control (diabetes), B12 replacement, cease causative toxins, immunotherapy for inflammatory causes.\n• GBS: IV immunoglobulin (IVIg) or plasmapheresis; ICU if respiratory involvement (FVC monitoring).\n• CIDP: IVIg, corticosteroids, or plasmapheresis.\n• Neuropathic pain: pregabalin, gabapentin (first-line); duloxetine (especially diabetic); amitriptyline; capsaicin; lidocaine patches.\n• Physiotherapy and falls prevention (especially important in older patients).","Investigations":"• Bloods: BSL/HbA1c, B12, folate, TFTs, UEC, LFTs, FBC, SPEP (paraprotein), ANA/ANCA, HIV serology.\n• Nerve conduction studies (NCS) + EMG: characterise neuropathy type (axonal vs. demyelinating; length of involvement); essential for Guillain-Barré and CIDP.\n• Nerve biopsy (sural nerve): for suspected vasculitic or amyloid neuropathy.\n• Genetic testing: for hereditary neuropathies (PMP22, MFN2)."}},{"name":"Encephalitis","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Neurological Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Immunosuppression (HIV, transplant).\n• Exposure to mosquitoes (arboviral).\n• Young women (anti-NMDAR encephalitis --- ovarian teratoma).\n• Age extremes, pregnancy.","Symptoms (History)":"---","Treatment":"• HSV encephalitis: IV aciclovir 10 mg/kg 8-hourly × 14--21 days (commence empirically --- do not wait for PCR results).\n• Anti-NMDAR encephalitis: remove teratoma if present; first-line immunotherapy (IV methylprednisolone, IVIg, plasmapheresis); second-line (rituximab, cyclophosphamide).\n• Arboviral encephalitis: supportive care only.\n• Seizure management: IV antiepileptics.\n• ICU monitoring for autonomic instability and respiratory failure.","Investigations":"• MRI brain with contrast (preferred): temporal lobe signal change in HSV; restricted diffusion in autoimmune.\n• LP (CSF): lymphocytic pleocytosis, elevated protein; PCR for HSV, VZV, enteroviruses; autoimmune antibodies (send serum and CSF).\n• EEG: generalised slowing; temporal PLEDs in HSV.\n• CT/MRI chest/abdomen/pelvis: exclude teratoma in anti-NMDAR.\n• Blood: HSV PCR not reliable --- use CSF.\n• Autoimmune antibody panel in blood + CSF."}},{"name":"Meningitis","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Neurological Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Extremes of age (neonates, elderly).\n• Immunosuppression: HIV, corticosteroids, malignancy, asplenia.\n• Unvaccinated status (Hib, meningococcal ACWY, pneumococcal).\n• Crowded living conditions (dormitories, military barracks --- meningococcal).\n• CSF leak or prior neurosurgery/cochlear implant (pneumococcal).\n• Alcohol use disorder (pneumococcal).\n• Travel to Sub-Saharan Africa (meningococcal A, W135).","Symptoms (History)":"---","Treatment":"• Bacterial meningitis --- IMMEDIATE empirical antibiotics (do NOT delay for imaging or LP if clinical diagnosis):\n• Ceftriaxone 2 g IV 12-hourly (adults); add ampicillin/amoxicillin if Listeria suspected (elderly, immunocompromised, pregnant).\n• Vancomycin: add if penicillin-resistant pneumococcus suspected (travel from areas with high resistance).\n• Dexamethasone 0.15 mg/kg IV 6-hourly × 4 days: commenced with or before first antibiotic dose --- reduces mortality and neurological sequelae in bacterial (especially pneumococcal) meningitis.\n• Viral meningitis: supportive (analgesia, antiemetics, IV fluids) --- aciclovir if HSV suspected.\n• Cryptococcal meningitis: amphotericin B + flucytosine induction × 2 weeks → fluconazole consolidation and maintenance.\n• TB meningitis: RHZE (rifampicin, isoniazid, pyrazinamide, ethambutol) × 2 months → RH × 10 months + dexamethasone.\n• Raised ICP management: head of bed 30°, avoid hypotonic fluids, mannitol if herniation.\n• Public health: close contacts of meningococcal meningitis require chemoprophylaxis (ciprofloxacin single dose or rifampicin) and vaccination.\n• Complications: SIADH (restrict fluids), DIC, septic shock, hearing loss (audiological follow-up), cognitive impairment, hydrocephalus.","Investigations":"• Blood cultures (×2): before antibiotics if feasible --- do NOT delay antibiotics awaiting cultures.\n• CT head before LP: if GCS <13, focal neurological deficit, papilloedema, new seizure, or immunocompromised (risk of coning).\n• LP (CSF analysis): cell count and differential, protein, glucose (with simultaneous blood glucose), Gram stain and culture, PCR (meningococcal, pneumococcal, enteroviral, HSV), India ink stain + cryptococcal antigen (if immunocompromised).\n• CSF interpretation: Bacterial --- turbid, WBC >1000 (neutrophils), protein >1 g/L, glucose <0.4 (CSF:serum ratio <0.4).\n• Viral --- clear, WBC <500 (lymphocytes), mildly raised protein, normal glucose.\n• FBC, UEC, CMP, coagulation, LFTs.\n• Meningococcal PCR (blood and/or throat swab): particularly useful when antibiotics given before LP.\n• CT chest (TB meningitis if suspected); India ink/cryptococcal antigen (HIV).\n• Notifiable disease: all cases of bacterial meningitis must be notified to Public Health."}},{"name":"Stroke (Ischaemic & Haemorrhagic)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Neurological Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Non-modifiable: age, male sex, family history, Aboriginal/Torres Strait Islander ethnicity (higher burden).\n• Modifiable (major): hypertension (#1 modifiable risk factor), AF, diabetes mellitus, dyslipidaemia, smoking, physical inactivity, obesity, excess alcohol.\n• Specific: carotid stenosis, prior TIA/stroke, valvular disease, PFO (young cryptogenic stroke), hypercoagulable states.","Symptoms (History)":"---","Treatment":"• Ischaemic stroke --- Acute reperfusion (time-critical --- 'time is brain'):\n• IV alteplase (tPA) 0.9 mg/kg (max 90 mg): within 4.5 hours of onset in eligible patients (Stroke Foundation guidelines --- NHMRC 2025 update includes tenecteplase as alternative).\n• Endovascular thrombectomy (EVT): up to 24 hours from onset in selected LVO patients meeting perfusion imaging criteria --- major advance in acute stroke management.\n• Stroke unit admission: multidisciplinary acute stroke unit care reduces death and dependency.\n• Antiplatelet therapy: aspirin 300 mg loading → 100 mg/day (after haemorrhage excluded) within 24--48 hours.\n• Dual antiplatelet (aspirin + clopidogrel) for minor stroke/TIA × 3 weeks (POINT/CHANCE trial).\n• AF-related stroke: anticoagulation (DOAC preferred --- apixaban, rivaroxaban) after 2--14 days depending on stroke severity and haemorrhagic transformation.\n• Secondary prevention: BP control (<130/80), statins (LDL target <1.8 mmol/L), antiplatelet or anticoagulation as appropriate, smoking cessation, glycaemic control.\n• ICH management: target SBP 130--140 mmHg within 1 hour; reverse anticoagulation (PCC for warfarin); neurosurgery if cerebellar haematoma >3 cm or obstructive hydrocephalus.\n• TIA: ABCD2 score + urgent imaging; antiplatelet therapy immediately; investigate and admit if high-risk features (score ≥4, AF, carotid stenosis).\n• Rehabilitation: early multidisciplinary rehabilitation (physiotherapy, speech pathology, occupational therapy, neuropsychology) --- improves functional recovery.","Investigations":"• CT head (non-contrast) STAT: first-line --- rapidly excludes haemorrhage, guides thrombolysis decision.\n• Early ischaemic changes may be subtle (loss of grey-white differentiation, ASPECTS score).\n• CT angiography (CTA) head and neck: identifies large vessel occlusion (LVO) for endovascular thrombectomy decision; assess carotid stenosis.\n• MRI brain DWI: more sensitive than CT for early ischaemia and posterior fossa strokes.\n• ECG: detect AF (paroxysmal) --- attach telemetry monitor.\n• Echo (TTE/TOE): if cardioembolic source suspected --- thrombus, vegetation, PFO.\n• Bloods: FBC, UEC, coagulation (INR, APTT --- thrombolysis contraindication if anticoagulated), BSL, lipids, HbA1c.\n• Prolonged cardiac monitoring (Holter/loop recorder): for paroxysmal AF in cryptogenic stroke.\n• LP + CT: if SAH suspected and CT head normal (after 6 hours for xanthochromia on spectrophotometry)."}},{"name":"Intracranial Haemorrhage","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Neurological Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Trauma (EDH, SDH, contusion), elderly with cerebral atrophy (SDH --- minor trauma).\n• Anticoagulation/antiplatelet therapy, coagulopathy.\n• Hypertension (ICH).\n• Intracranial aneurysm (SAH) --- associated with ADPKD, connective tissue disorders, family history.\n• Vascular malformations (AVM, cavernoma).\n• Cocaine/sympathomimetic use (ICH).","Symptoms (History)":"---","Treatment":"• EDH: neurosurgical emergency --- craniotomy and haematoma evacuation (if >30 mL, >15 mm thickness, or midline shift >5 mm).\n• Conservative management for small asymptomatic EDH with close monitoring.\n• Acute SDH: craniotomy/craniectomy for symptomatic or expanding haematoma; ICP monitoring.\n• Chronic SDH: burr hole drainage; treat coagulopathy; may recur --- follow-up CT.\n• SAH: aneurysm securing --- coiling (endovascular, preferred if technically feasible) or surgical clipping within 24--72 hours.\n• Vasospasm prevention: nimodipine 60 mg 4-hourly × 21 days.\n• Maintain euvolaemia.\n• Monitor for hydrocephalus (EVD insertion if needed) and delayed cerebral ischaemia.\n• ICH: target SBP 130--140 mmHg urgently (INTERACT-2/3 trial); reverse anticoagulation (PCC for warfarin/direct factor Xa inhibitors, protamine for heparin, idarucizumab for dabigatran).\n• Surgical evacuation for cerebellar ICH >3 cm or causing obstructive hydrocephalus.\n• General ICU care: manage raised ICP (head of bed 30°, euvolaemia, avoid hypoxia/hypercapnia, mannitol/hypertonic saline), seizure prophylaxis in SAH.","Investigations":"• CT head (non-contrast) STAT: investigation of choice for acute intracranial haemorrhage --- rapid, widely available.\n• CT angiography: identifies aneurysm (SAH), AVM, underlying vascular malformation; guides neurosurgical/interventional radiology planning.\n• LP (if CT negative and SAH suspected, >6 hours post-onset): xanthochromia on spectrophotometry --- gold standard for SAH diagnosis.\n• MRI brain: superior for subacute/chronic SDH, cavernoma, cortical contusion --- haemosiderin on gradient echo/SWI.\n• Coagulation (INR, APTT, platelets): essential --- reversal needed if coagulopathic.\n• CTA/MRA or catheter angiography (digital subtraction angiography --- DSA): for aneurysm characterisation prior to clipping/coiling."}},{"name":"Glomerulonephritis","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Recent URTI or skin infection (PSGN --- Group A Strep).\n• Systemic autoimmune disease: SLE, vasculitis.\n• Viral infections: hepatitis B/C (membranous, MPGN), HIV.\n• Malignancy (membranous GN).\n• Aboriginal or Torres Strait Islander background (PSGN, high burden).\n• Family history of renal disease or hearing loss (Alport syndrome).","Symptoms (History)":"---","Treatment":"• Treat underlying cause: antibiotics (PSGN --- Group A Strep), immunosuppression (SLE nephritis --- mycophenolate + corticosteroids; ANCA vasculitis --- rituximab or cyclophosphamide + corticosteroids; anti-GBM --- plasmapheresis + immunosuppression).\n• IgA nephropathy: ACE inhibitor/ARB to reduce proteinuria; corticosteroids if eGFR >50 and persistent proteinuria >1 g/day; targeted release budesonide (Nefecon/Tarpeyo) --- new approved therapy.\n• Minimal change disease: prednisolone (usually responsive).\n• General renal protection: BP target <130/80 mmHg; ACE inhibitor or ARB (antiproteinuric); salt restriction; statin (dyslipidaemia in nephrotic).\n• Anticoagulation: for nephrotic syndrome with albumin <25 g/L (high DVT/thromboembolism risk --- especially membranous).\n• Nephrology referral for all cases; dialysis if ESRD.","Investigations":"• Urinalysis + microscopy: proteinuria (dipstick ± ACR/PCR), haematuria, red cell casts (pathognomonic of glomerular bleeding).\n• Bloods: UEC (creatinine, eGFR), albumin, complement (C3, C4 --- low in PSGN, SLE, MPGN), FBC, coagulation.\n• Immunology: ANA, anti-dsDNA (SLE); ANCA (PR3/MPO --- vasculitis); anti-GBM (Goodpasture's); ASO titre, anti-DNase B (PSGN).\n• Hepatitis B/C, HIV serology.\n• Renal ultrasound: assess size, echogenicity, exclude obstruction.\n• Renal biopsy: gold standard for diagnosis (light microscopy, immunofluorescence, electron microscopy); indicated when cause unclear or to guide immunosuppression."}},{"name":"Urinary Tract Infection (UTI) / Pyelonephritis","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Female sex (shorter urethra), sexual activity, post-menopausal oestrogen deficiency.\n• Urinary catheterisation, urinary tract obstruction (stone, BPH, stricture).\n• Pregnancy (physiological urinary stasis/dilation).\n• Diabetes mellitus, immunosuppression.\n• Vesicoureteric reflux (children), structural abnormalities.\n• Recurrent UTI (>2 in 6 months or >3 in 12 months --- consider prophylaxis).","Symptoms (History)":"---","Treatment":"• Uncomplicated lower UTI (females): trimethoprim 300 mg nocte × 3 days (first-line per Australian guidelines/Therapeutic Guidelines); nitrofurantoin 100 mg QID × 5 days (second-line); cefalexin 500 mg BD × 5 days (third-line).\n• Adjust per culture results.\n• Uncomplicated pyelonephritis (oral --- if not systemically unwell): cefalexin 500 mg QID × 10--14 days; trimethoprim/sulfamethoxazole (TMP-SMX) if susceptible.\n• Ciprofloxacin if local resistance patterns appropriate.\n• Complicated/severe pyelonephritis (IV): IV ceftriaxone 1--2 g/day → step-down to oral once clinically improving and afebrile >24 hours.\n• Add gentamicin if Gram-negative sepsis.\n• Pregnant women: treat all bacteriuria (symptomatic and asymptomatic) --- cefalexin, amoxicillin/clavulanate (avoid TMP-SMX in 1st trimester and near term, avoid nitrofurantoin near term).\n• Catheter-associated UTI: treat only if symptomatic; change catheter; appropriate antibiotic per culture; consider long-term catheter management plan.\n• Recurrent UTI prevention: D-mannose, cranberry, vaginal oestrogen (post-menopausal), post-coital antibiotic prophylaxis, low-dose nocturnal prophylaxis.\n• Urological referral: recurrent UTI in males, structural abnormality, obstruction, failure to respond.","Investigations":"• Midstream urine (MSU) --- urinalysis + microscopy + culture and sensitivity (MC&S): leucocytes, nitrites (gram-negative bacteria), bacteria; culture to guide antibiotic choice.\n• Dipstick alone sufficient for uncomplicated cystitis in young women to commence empirical treatment.\n• Blood cultures (×2): mandatory in pyelonephritis/sepsis --- drawn before antibiotics.\n• FBC, UEC, CRP: severity assessment in pyelonephritis.\n• Renal ultrasound: exclude obstruction (stone, abscess) in pyelonephritis unresponsive to treatment at 48--72 hours.\n• CT KUB (non-contrast): if stone or abscess suspected.\n• Cystoscopy + imaging: for recurrent UTI in males (structural cause), haematuria beyond infection."}},{"name":"Acute Kidney Injury (AKI)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Pre-existing CKD (most important risk factor for AKI).\n• Diabetes mellitus, hypertension, cardiac failure, liver cirrhosis.\n• Older age, hypovolaemia/sepsis.\n• Nephrotoxic medications: NSAIDs, aminoglycosides, IV contrast, ACE inhibitors/ARBs (especially in dehydrated patients), vancomycin.\n• Surgical/ICU context: major surgery, haemorrhage, rhabdomyolysis.","Symptoms (History)":"---","Treatment":"• Pre-renal: IV fluid resuscitation (isotonic crystalloid --- normal saline or Hartmann's); treat sepsis (antibiotics); withhold nephrotoxic medications (NSAIDs, ACEi/ARBs); optimise cardiac output.\n• Post-renal: urgent bladder decompression (IDC --- BPH/urethral obstruction); ureteric stenting or nephrostomy (ureteric obstruction); urgent urology referral.\n• Intrinsic ATN: supportive (optimise perfusion, avoid nephrotoxins); no specific treatment reverses ATN --- allow renal recovery.\n• AIN: cease causative drug; corticosteroids (prednisolone) if no improvement after drug withdrawal.\n• Manage complications:\n• Hyperkalaemia: ECG monitoring; calcium gluconate (cardiac membrane stabilisation); insulin + dextrose, salbutamol (shift K+ intracellular); sodium bicarbonate if acidotic; consider renal replacement therapy (RRT) if refractory.\n• Fluid overload: fluid restriction; frusemide if residual urine output (oliguric ATN --- may increase urine output but does not improve outcome).\n• Metabolic acidosis: sodium bicarbonate for pH <7.1.\n• RRT (haemodialysis/haemofiltration --- CRRT in ICU): indications --- Acidosis (pH <7.1), Electrolyte emergency (K+ >6.5), Intoxication (dialysable toxin), Overload (pulmonary oedema refractory), Uraemia (encephalopathy, pericarditis, uraemic bleeding) --- 'AEIOU'.\n• Post-AKI follow-up: 3-month creatinine check (risk of developing CKD); medication review; avoid nephrotoxins; Kidney Health Australia CARI guidelines.","Investigations":"• Serum creatinine, eGFR, UEC: confirm AKI and staging (KDIGO Stage 1/2/3).\n• Urine output monitoring: strict fluid balance (IDC if oliguric).\n• Urinalysis + microscopy: granular casts (ATN), red cell casts (glomerulonephritis), eosinophiluria (AIN), haemoglobinuria (haemolysis).\n• Urine sodium and osmolality: FeNa <1% (pre-renal), FeNa >2% (ATN) --- less reliable if diuretics given.\n• FBC, coagulation, CRP, LFTs, albumin, phosphate, LDH, CK (rhabdomyolysis --- CK typically >5000 U/L).\n• ECG: hyperkalaemia (tall peaked T waves, wide QRS, sine wave --- life-threatening).\n• Renal ultrasound: hydronephrosis (post-renal); small echogenic kidneys (pre-existing CKD); size and symmetry.\n• Immunology if intrinsic renal cause suspected: ANA, ANCA, anti-GBM, complement, hepatitis B/C.\n• Renal biopsy: if cause unclear and intrinsic renal disease suspected --- guides immunosuppressive therapy."}},{"name":"Chronic Kidney Disease (CKD)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Diabetes mellitus and hypertension (leading modifiable risk factors).\n• Older age, Aboriginal and Torres Strait Islander background (much higher burden in Australia).\n• Family history of CKD, genetic conditions (ADPKD).\n• Prior AKI, chronic use of NSAIDs, contrast nephropathy.\n• Obesity, smoking, cardiovascular disease.","Symptoms (History)":"---","Treatment":"• BP control: target <130/80 mmHg in CKD (stricter if proteinuric).\n• ACE inhibitor or ARB first-line --- reduces intraglomerular hypertension and proteinuria (antiproteinuric effect beyond BP reduction).\n• SGLT2 inhibitors (empagliflozin, dapagliflozin) --- renoprotective, now first-line adjunct.\n• Glycaemic control (diabetic CKD): HbA1c target \\~53 mmol/mol.\n• SGLT2 inhibitors reduce GFR decline and CV events.\n• Proteinuria reduction: ACE inhibitor/ARB ± finerenone (non-steroidal MRA --- reduces CKD progression in diabetic CKD).\n• Anaemia management: IV or oral iron (check iron stores); erythropoiesis-stimulating agents (ESAs --- darbepoetin alfa) if eGFR <60 and Hb <100 g/L.\n• Renal bone disease: dietary phosphate restriction; phosphate binders (calcium carbonate, sevelamer); active vitamin D (calcitriol); cinacalcet (calcimimetic) for secondary hyperparathyroidism.\n• Metabolic acidosis: sodium bicarbonate supplementation.\n• Dietary: protein restriction (0.6--0.8 g/kg/day --- Stage 4--5); low potassium (avoid hyperkalaemia); low phosphate; salt restriction.\n• Nephrology referral: eGFR <30 (Stage 4), rapid decline, difficult to manage complications.\n• Multidisciplinary renal clinic: pre-dialysis education, vascular access planning (AV fistula --- inserted months before ESRD).","Investigations":"• eGFR (CKD-EPI equation): serial measurements ≥3 months apart to confirm chronicity.\n• Urine albumin:creatinine ratio (ACR): quantifies proteinuria --- key prognostic marker.\n• Staging: A1 (<3 mg/mmol normal), A2 (3--30 mg/mmol moderately increased), A3 (>30 mg/mmol severely increased).\n• UEC (electrolytes, urea, creatinine): hyperkalaemia, metabolic acidosis (late).\n• FBC: normocytic anaemia (EPO deficiency).\n• Calcium, phosphate, PTH, 25-OH vitamin D: renal bone disease (secondary hyperparathyroidism --- high PTH, high phosphate, low calcium, low vitamin D).\n• Lipid profile (high CV risk).\n• Renal ultrasound: size (small kidneys in CKD), echogenicity, ADPKD (multiple cysts), obstruction.\n• Renal biopsy: if cause uncertain and treatment would be altered."}},{"name":"End Stage Renal Disease (ESRD)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Progressive CKD from any cause (see CKD).\n• Poorly controlled diabetes and hypertension.\n• Indigenous Australian background.\n• Acute on chronic kidney disease episodes.\n• Non-adherence to CKD management.","Symptoms (History)":"---","Treatment":"• Haemodialysis (HD): most common RRT modality in Australia.\n• 3--4 sessions/week, 4 hours each.\n• Access: AV fistula (preferred), AV graft, or tunnelled central venous catheter.\n• Peritoneal dialysis (PD): CAPD (continuous ambulatory PD) or APD (automated PD overnight).\n• Home-based --- promotes independence; preferred in Aboriginal communities, remote areas.\n• Renal transplantation (gold standard --- best survival and QoL): pre-emptive transplant before dialysis if possible.\n• See Renal Transplantation entry.\n• Conservative/palliative pathway: for patients not suitable for or declining RRT --- symptom management, advance care planning.\n• Ongoing CKD management: strict BP, anaemia, bone disease, fluid management as above.\n• ANZDATA: Australian and New Zealand Dialysis and Transplant Registry monitors outcomes.","Investigations":"• eGFR, UEC: severe azotaemia; hyperkalaemia; metabolic acidosis.\n• FBC: severe anaemia.\n• PTH, calcium, phosphate: severe secondary hyperparathyroidism.\n• Chest X-ray: pulmonary oedema, cardiomegaly, pleural effusions.\n• ECG: hyperkalaemia changes.\n• ANZDATA registry enrolment (Australia)."}},{"name":"Renal Transplantation","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Rejection risk: HLA mismatch, non-compliance with immunosuppression.\n• Infection risk: immunosuppression increases susceptibility to opportunistic infections (CMV, PCP, fungal).\n• Malignancy risk: post-transplant lymphoproliferative disorder (PTLD --- EBV-driven), skin cancer (high incidence in Australia --- sun protection essential).","Symptoms (History)":"---","Treatment":"• Immunosuppression regimen (induction + maintenance): typically tacrolimus + mycophenolate mofetil (MMF) + prednisolone ± induction (basiliximab, ATG for high-risk).\n• Rejection: acute cellular rejection --- IV methylprednisolone pulses; antibody-mediated rejection --- plasmapheresis, IVIg, rituximab.\n• Infection prophylaxis: TMP-SMX (PCP), valganciclovir (CMV), antifungal (fluconazole/nystatin).\n• Long-term surveillance: skin cancer surveillance, cardiovascular risk management, bone density, malignancy screening.\n• Australian public-funded transplant program: Medicare-funded immunosuppression (Pharmaceutical Benefits Scheme).","Investigations":"• Serial serum creatinine + eGFR: detect rejection or drug toxicity early.\n• Tacrolimus/cyclosporin drug levels: therapeutic drug monitoring essential.\n• CMV and BK viraemia: regular PCR monitoring.\n• Protocol graft biopsies (at specific time points): detect subclinical rejection.\n• DSA (donor-specific antibodies): monitor for antibody-mediated rejection."}},{"name":"Renal Stones (Nephrolithiasis)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Dehydration/low fluid intake (most important modifiable risk factor).\n• Diet: high animal protein, high sodium, low calcium intake (paradoxically increases risk), high oxalate foods (spinach, nuts, chocolate).\n• Hot climate/occupation (Australia --- high UV exposure → dehydration).\n• Gout, primary hyperparathyroidism, IBD (increased oxalate absorption), malabsorption syndromes.\n• Male sex, age 20--50 years, positive family history.\n• Recurrent UTI with urease-producing organisms (struvite).\n• Anatomical abnormality (pelvi-ureteric junction obstruction, horseshoe kidney).","Symptoms (History)":"---","Treatment":"• Acute renal colic: IV access + analgesia --- NSAIDs first-line (ketorolac IV or diclofenac IM/rectal --- superior to opioids for renal colic); opioids (morphine/fentanyl) second-line.\n• Antiemetics.\n• IV fluids if dehydrated.\n• Medical expulsive therapy (MET): tamsulosin (alpha-blocker) 0.4 mg daily --- facilitates passage of distal ureteric stones <10 mm (Australian Therapeutic Guidelines).\n• Conservative management: stones <5 mm --- 90% pass spontaneously; 5--10 mm --- 50% pass; >10 mm --- unlikely to pass spontaneously.\n• Urological intervention required for: stones >10 mm, non-passage after 4--6 weeks, obstruction, infection (pyonephrosis --- EMERGENCY: nephrostomy or ureteric stent + antibiotics), single kidney, bilateral obstruction, intractable pain.\n• ESWL (extracorporeal shock wave lithotripsy): non-invasive; best for renal stones <2 cm and upper ureteric stones; outpatient.\n• Ureteroscopy + laser lithotripsy (URSL): preferred for ureteric stones --- higher stone-free rate than ESWL.\n• Percutaneous nephrolithotomy (PCNL): for large stones >2 cm or staghorn calculi.\n• Prevention --- all patients: high fluid intake (urine output >2 L/day); reduce salt and animal protein intake.\n• Calcium stones: dietary oxalate restriction; thiazide diuretics (reduce urinary calcium); potassium citrate (increase urinary citrate, alkalinise urine).\n• Uric acid stones: allopurinol; potassium citrate (alkalinise urine to pH 6.5--7.0 --- uric acid stones dissolve in alkaline urine).\n• Struvite: treat underlying UTI; surgical stone clearance essential.","Investigations":"• CT KUB (non-contrast): investigation of choice --- sensitivity \\~99% for all stone types, size, location, obstruction, hydronephrosis.\n• Identifies alternative diagnoses.\n• Urinalysis: haematuria, pH (acidic in uric acid stones, alkaline in struvite), nitrites (infection).\n• MSU MC&S: if fever or nitrites --- urgent (pyonephrosis).\n• UEC, creatinine: renal function; UEC (electrolytes).\n• Serum calcium, uric acid: screening for metabolic cause.\n• FBC: leucocytosis in infected stone.\n• Stone analysis (if passed): guides prevention.\n• 24-hour urine collection (recurrent stones): calcium, oxalate, urate, citrate, volume --- guides specific prevention."}},{"name":"Renal Cell Carcinoma (RCC)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Smoking (doubles risk --- strongest modifiable risk factor).\n• Obesity and hypertension.\n• Male sex, age 50--70 years.\n• Chronic dialysis/acquired cystic kidney disease.\n• VHL syndrome, hereditary papillary RCC, Birt-Hogg-Dubé syndrome.\n• Occupational: trichloroethylene, asbestos exposure.","Symptoms (History)":"---","Treatment":"• Localised disease (Stage I--III): surgery is curative intent.\n• Partial nephrectomy (nephron-sparing): preferred for tumours <7 cm if technically feasible --- preserves renal function.\n• Radical nephrectomy (open or laparoscopic): for larger/central tumours; includes adrenal gland if involved.\n• Adjuvant pembrolizumab: recommended for high-risk localised RCC post-nephrectomy (TBS guidelines).\n• Small renal masses (<3 cm): active surveillance or ablative techniques (cryoablation, radiofrequency ablation) in selected patients.\n• Metastatic RCC (Stage IV): targeted therapy (sunitinib, pazopanib, cabozantinib --- VEGF/TKI pathway) + immunotherapy combinations (nivolumab + ipilimumab, pembrolizumab + axitinib --- first-line preferred).\n• RCC is resistant to conventional chemotherapy and radiotherapy (palliative radiation for bone/brain mets).\n• Cytoreductive nephrectomy: may be considered in selected metastatic patients prior to systemic therapy.","Investigations":"• Renal ultrasound: initial investigation --- solid vs. cystic lesion; solid enhancing lesion = cancer until proven otherwise.\n• CT chest/abdomen/pelvis with contrast (triple phase): characterises renal mass (enhancement), staging (nodes, adrenal, renal vein, IVC involvement), detects metastases.\n• MRI abdomen: superior for IVC tumour thrombus characterisation.\n• FBC (polycythaemia --- paraneoplastic), UEC, LFTs, calcium (hypercalcaemia), LDH, urine cytology.\n• Bone scan/PET: if bone/systemic metastases suspected.\n• Percutaneous biopsy: for small renal masses (<3 cm) where active surveillance considered, or if metastatic disease (tissue diagnosis for systemic therapy); not needed before nephrectomy for classic enhancing masses.\n• TNM staging (Stage I--IV) + Fuhrman/ISUP grade."}},{"name":"Bladder Cancer","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Smoking (most important risk factor --- 50% of cases attributable; carcinogens excreted in urine).\n• Male sex (3:1), age >65 years.\n• Occupational exposure: aromatic amines, aniline dyes, benzidine (rubber, dye, textile, leather industries).\n• Cyclophosphamide (haemorrhagic cystitis → bladder cancer risk).\n• Chronic pelvic irradiation.\n• Chronic UTI, indwelling catheter (squamous cell carcinoma).\n• Lynch syndrome (MSI-H tumours --- urothelial cancer risk).","Symptoms (History)":"---","Treatment":"• NMIBC (low risk): TURBT alone (complete resection); surveillance cystoscopy.\n• NMIBC (intermediate/high risk): TURBT + intravesical chemotherapy (mitomycin C single dose perioperatively) or BCG (Bacillus Calmette-Guérin --- immunotherapy; 6-week induction course ± maintenance).\n• High-grade T1 or CIS refractory to BCG: consider radical cystectomy.\n• MIBC (T2--T4, N0, M0): neoadjuvant cisplatin-based chemotherapy (GC or MVAC) → radical cystectomy (gold standard --- ileal conduit or neobladder for urinary diversion).\n• Bladder-sparing trimodality therapy (TURBT + chemoradiation) for selected patients.\n• Metastatic disease: platinum-based chemotherapy (gemcitabine + cisplatin); maintenance avelumab (checkpoint inhibitor) after platinum response; pembrolizumab second-line; erdafitinib (FGFR-targeted --- FGFR2/3 alterations).\n• Cystoscopic surveillance (NMIBC): every 3 months × 2 years, then 6-monthly (high-risk).","Investigations":"• Urinalysis + urine cytology (3 samples): malignant cells --- high specificity for high-grade carcinoma/CIS.\n• Flexible cystoscopy: gold standard --- visualises lesion, guides biopsy; outpatient procedure.\n• Transurethral resection of bladder tumour (TURBT): diagnostic and therapeutic; provides histological staging (depth of invasion --- detrusor muscle must be included in specimen).\n• CT urogram (CTU): assess upper tracts (urothelial tumours can occur anywhere --- ureter, renal pelvis); staging.\n• CT chest/abdomen/pelvis: systemic staging for MIBC.\n• MRI pelvis (mpMRI): superior soft tissue staging for MIBC; assess perivesical extension.\n• Urine FGFR mutation testing: for targeted therapy eligibility (erdafitinib)."}},{"name":"Benign Prostatic Hyperplasia (BPH)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"• Age >50 years (strongest risk factor).\n• Intact testes and testosterone production (eunuchs do not develop BPH).\n• Family history (genetic predisposition).\n• Obesity, metabolic syndrome, physical inactivity.\n• Exacerbating factors: anticholinergic medications, alpha-agonists (decongestants), alcohol, caffeine.","Symptoms (History)":"---","Treatment":"• Watchful waiting (mild symptoms/IPSS <7): lifestyle modification --- reduce evening fluid intake, avoid bladder irritants (caffeine, alcohol), bladder training, address medications.\n• Alpha-blockers (moderate-to-severe symptoms): tamsulosin 0.4 mg daily, alfuzosin, silodosin --- relax smooth muscle in prostate and bladder neck; onset hours to days; first-line pharmacotherapy.\n• Side effects: postural hypotension, retrograde ejaculation.\n• 5-alpha reductase inhibitors (5-ARIs): finasteride 5 mg or dutasteride 0.5 mg daily --- reduce prostate volume (\\~25% reduction over 6--12 months); indicated if large prostate (>40 g) or elevated PSA; prevent AUR and surgical need; onset months.\n• Side effects: erectile dysfunction, reduced libido, gynaecomastia.\n• Combination therapy (alpha-blocker + 5-ARI): superior for men with large prostate; prevents progression and AUR better than monotherapy.\n• Acute urinary retention: immediate IDC insertion (urethral); trial without catheter (TWOC) after 48--72 hours with alpha-blocker; if retention recurs --- surgical intervention.\n• Surgical --- indications (refractory symptoms, AUR, complications
