bone scan for extent of disease"}},{"name":"Bone Tumours","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Musculoskeletal - General","sections":{"Cause / Aetiology":"---","Risk Factors":"• Prior radiotherapy (osteosarcoma, Paget's); hereditary conditions (Li-Fraumeni syndrome --- TP53; retinoblastoma --- RB1; MHE --- osteochondromatosis)\n• Metastatic: known primary malignancy; age >40 with bone lesion highly suspicious for metastasis\n• Paget's disease: <1% risk of sarcomatous transformation","Symptoms (History)":"---","Treatment":"• Benign: observation, curettage and bone grafting, or excision depending on lesion and symptoms\n• Malignant primary: multidisciplinary oncology team --- neoadjuvant chemotherapy + wide surgical excision (limb salvage preferred over amputation) + adjuvant chemotherapy/radiotherapy for osteosarcoma and Ewing's\n• Metastatic: systemic treatment of primary; orthopaedic stabilisation for impending/actual pathological fracture (prophylactic IM nail if >50% cortical destruction --- Mirels score); radiotherapy for pain control","Investigations":"• X-ray first: assess lesion --- zone of transition, cortical destruction, periosteal reaction (Codman's triangle, sunburst --- osteosarcoma), matrix mineralisation\n• MRI: extent, soft tissue involvement, surgical planning; CT chest/abdomen/pelvis for staging; bone scan for skeletal metastases\n• Biopsy (after imaging): must be performed by treating orthopaedic oncology team to preserve limb salvage options"}},{"name":"Soft Tissue Lesions","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Musculoskeletal - General","sections":{"Cause / Aetiology":"---","Risk Factors":"• Prior radiotherapy; genetic syndromes (neurofibromatosis type 1 --- MPNSTs; Li-Fraumeni; Gardner's syndrome)\n• Lipomas: age >40, obesity, familial multiple lipomatosis; no malignant transformation risk for simple lipoma","Symptoms (History)":"---","Treatment":"• Benign confirmed (lipoma, ganglion, cyst): observation if asymptomatic; surgical excision if symptomatic or patient preference\n• Suspected or confirmed sarcoma: refer to specialist orthopaedic oncology centre; wide local excision with clear margins; adjuvant radiotherapy for high-grade or positive margins; chemotherapy for selected sarcoma types","Investigations":"• Ultrasound: first-line for superficial lesions --- distinguishes solid vs. cystic, assesses vascularity\n• MRI: required for lesions >5 cm, deep, or suspected malignancy --- characterises tissue planes and extent\n• Biopsy (after imaging): core needle biopsy preferred for suspected sarcoma; biopsy tract must be excisable at definitive surgery --- consult orthopaedic oncology before biopsy"}},{"name":"Neurovascular Limb Trauma","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Musculoskeletal - General","sections":{"Cause / Aetiology":"---","Risk Factors":"• High-energy trauma, penetrating injury, fractures around the elbow (paediatric supracondylar) and knee (dislocation)\n• Tight casts/dressings, reperfusion after ischaemia, crush injuries, anticoagulation","Symptoms (History)":"---","Treatment":"• Vascular injury: immediate vascular surgery review; damage control --- haemostasis, shunting if delayed definitive repair; vascular repair (end-to-end anastomosis, vein graft) within 6 hours of warm ischaemia\n• Compartment syndrome: surgical emergency --- urgent fasciotomy of all compartments; split skin grafting of fasciotomy wounds at 48--72 hours\n• Nerve injury: neuropraxia/axonotmesis --- conservative (splinting, physio, time); neurotmesis --- surgical exploration and repair or grafting; referral to peripheral nerve/plastic surgery unit","Investigations":"• CT angiography (CTA): investigation of choice for suspected vascular injury --- fast, widely available, high sensitivity; formal angiography if intervention planned\n• Ankle-Brachial Index (ABI): <0.9 indicates significant arterial injury in lower limb\n• EMG/NCS: nerve conduction studies at 3--4 weeks post-injury to classify nerve injury and guide prognosis"}},{"name":"Rotator Cuff Disease","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Shoulder","sections":{"Cause / Aetiology":"---","Risk Factors":"• Age >40 (prevalence of full-thickness tears increases with age --- \\~50% in those >60 years are asymptomatic)\n• Dominant arm; overhead occupational/sporting activity (swimmers, painters, overhead athletes)\n• Prior shoulder injury or dislocation; smoking (impairs tendon vascularity); hypercholesterolaemia\n• Acromial morphology (type III hooked acromion); AC joint OA with inferior osteophytes","Symptoms (History)":"---","Treatment":"• Conservative (first 3--6 months): physiotherapy (rotator cuff strengthening, scapular stabilisation, posterior capsule stretching); NSAIDs; activity modification\n• Subacromial corticosteroid injection: useful adjunct to physio for impingement/partial tears; maximum 3 injections per year (risk of tendon weakening)\n• Surgical --- arthroscopic rotator cuff repair: indicated for full-thickness tears causing significant disability after failed conservative management; traumatic tears in active patients may warrant earlier surgery; acromioplasty performed concurrently\n• Irreparable massive tears: tendon transfers (latissimus dorsi), superior capsule reconstruction, or reverse total shoulder arthroplasty (RTSA)\n• Post-operative: sling 6 weeks; physiotherapy (protected phase → strengthening → sport-specific) --- 3--6 months rehabilitation; re-tear rate 10--30% depending on tear size","Investigations":"• X-ray (AP, axial, supraspinatus outlet views): assess acromion morphology, AC joint, calcific tendinitis (hydroxyapatite deposits), superior migration of humeral head (massive tear --- acromiohumeral interval <7 mm)\n• Ultrasound: dynamic assessment, detects partial and full-thickness tears; operator-dependent; guides injection\n• MRI (or MR arthrogram): gold standard for characterising tear size, retraction, muscle atrophy/fatty infiltration (Goutallier classification --- important for surgical planning)"}},{"name":"Frozen Shoulder (Adhesive Capsulitis)","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Shoulder","sections":{"Cause / Aetiology":"---","Risk Factors":"• Diabetes mellitus (3--4× increased risk; more severe and refractory course); thyroid disease (hypo- and hyperthyroidism)\n• Female sex (F:M = 2:1); age 40--60 years\n• Immobilisation after injury, surgery, or stroke; Dupuytren's disease, Peyronie's disease (fibroproliferative link)\n• Cardiac surgery (left shoulder post-thoracotomy) --- post-surgical cause","Symptoms (History)":"---","Treatment":"• Reassurance: natural history --- most resolve within 2--3 years; outcome good in most patients\n• Physiotherapy: gentle ROM exercises (Codman's pendulum, wall walking); avoid aggressive stretching in painful phase (may worsen inflammation)\n• Intra-articular corticosteroid injection: most evidence in painful/freezing phase --- significantly reduces pain and accelerates recovery; can be repeated\n• Hydrodilatation (distension arthrography): injection of saline ± steroid ± LA to distend joint capsule; effective for frozen phase --- PBS-listed\n• Surgical: arthroscopic capsular release (anterior capsulotomy, rotator interval release) if persistent stiffness >12 months; manipulation under anaesthesia (MUA) --- falling out of favour due to risk of fracture in osteoporotic patients","Investigations":"• Clinical diagnosis --- imaging primarily to exclude other pathology\n• X-ray (AP, axillary): usually normal; may show osteopenia from disuse; excludes glenohumeral OA, calcific tendinitis, tumour\n• MRI arthrogram: if diagnosis uncertain --- shows capsular thickening and reduced joint volume (<10 mL vs. normal 20--30 mL); rotator interval obliteration\n• Ultrasound: thickening of rotator interval; can guide injection"}},{"name":"Humeral Fracture","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Shoulder","sections":{"Cause / Aetiology":"---","Risk Factors":"• Elderly, osteoporotic patients (proximal); high-energy trauma in younger patients\n• Direct trauma to arm (shaft); seizures (bilateral proximal humerus fractures)\n• FOOSH mechanism --- common across age groups","Symptoms (History)":"---","Treatment":"• Proximal humerus --- non-operative (majority): collar and cuff or shoulder immobiliser for 4--6 weeks; early pendulum exercises; physiotherapy --- most minimally displaced fractures do well conservatively\n• Proximal humerus --- surgical (displaced, unstable, young active patient): ORIF with locking plate or IM nail; hemiarthroplasty or RTSA for 4-part fractures and fracture-dislocations in elderly (especially if poor bone quality)\n• Humeral shaft: functional bracing (Sarmiento brace) in 80% --- high union rates; operative (IM nail or plate) for polytrauma, open fracture, failed conservative, radial nerve palsy that develops after reduction (iatrogenic), vascular injury\n• Paediatric supracondylar: Gartland I/II --- collar and cuff or closed reduction and POP; Gartland III --- urgent closed reduction and percutaneous K-wire fixation under GA\n• Radial nerve palsy in shaft fracture: 90% recover with conservative management over 3--4 months (neuropraxia/axonotmesis); exploration if no recovery at 3 months or open fracture","Investigations":"• X-ray: AP, lateral, axillary (or Velpeau) views; Neer classification for proximal humerus\n• CT: complex articular distal humerus fractures, preoperative planning for proximal humerus with articular involvement\n• Doppler USS or CTA if vascular injury suspected (reduced or absent radial pulse)"}},{"name":"Shoulder Dislocation / Instability","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Shoulder","sections":{"Cause / Aetiology":"---","Risk Factors":"• Young male athletes in contact sports (first-time dislocation age <25 --- >80% recurrence risk if not surgically stabilised)\n• Congenital hyperlaxity/Ehlers-Danlos syndrome; voluntary dislocators (psychiatric)\n• Glenoid dysplasia, engaging Hill-Sachs defects, glenoid bone loss >20% (off-track lesion)","Symptoms (History)":"---","Treatment":"• Acute reduction: procedural sedation or Entonox; techniques --- Cunningham (without sedation), Kocher's (ER then adduction and IR), Stimson (prone, hanging weight), Milch; post-reduction X-ray mandatory\n• Post-reduction: immobilisation in internal rotation (sling 2--3 weeks); early physiotherapy for rotator cuff and periscapular strengthening\n• Recurrent anterior instability --- surgical: arthroscopic Bankart repair (labral reattachment with suture anchors) --- excellent results if glenoid bone loss <20%; Latarjet procedure (coracoid transfer --- adds bone and sling effect) for significant bone loss, off-track Hill-Sachs, or contact athletes\n• Posterior dislocation: reduction (traction, gentle forward flexion and ER); address underlying cause (seizure management); reverse Bankart repair for recurrent posterior instability\n• MDI: intensive physiotherapy (muscle rebalancing, proprioception) for 6 months first; inferior capsular shift procedure if fails","Investigations":"• X-ray (AP, axillary, Velpeau): confirm dislocation and direction; identify associated fractures (Bankart bony lesion, Hill-Sachs, greater tuberosity avulsion)\n• CT with 3D reconstruction: quantify glenoid bone loss (>20% = significant, influences surgical strategy --- Latarjet preferred over soft tissue Bankart)\n• MRI arthrogram: labral pathology (Bankart, SLAP, HAGL), capsular tears, rotator cuff tears (>40 years)"}},{"name":"Shoulder Osteoarthritis","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Shoulder","sections":{"Cause / Aetiology":"---","Risk Factors":"• Prior shoulder trauma, dislocation history, prior surgery\n• Inflammatory arthropathy (RA increases risk of glenohumeral OA); massive rotator cuff tear\n• Age >60 years; occupational overhead loading; corticosteroid use (AVN)\n• AC joint OA: common in weightlifters (osteolysis of distal clavicle)","Symptoms (History)":"---","Treatment":"• Conservative: physiotherapy; NSAIDs with PPI cover; intra-articular corticosteroid or hyaluronic acid injection\n• AC joint OA: local steroid injection; distal clavicle excision (Mumford procedure) arthroscopically if refractory\n• Surgical: total shoulder arthroplasty (TSA --- anatomical) for GH OA with intact rotator cuff --- excellent pain relief and function; reverse total shoulder arthroplasty (RTSA) if cuff-deficient (cuff arthropathy, massive irreparable tear) or poor glenoid bone stock; hemiarthroplasty rarely used now\n• Arthroplasty outcomes: 90--95% patient satisfaction; implant survival >90% at 15 years","Investigations":"• X-ray (AP in neutral, ER and IR, axillary view): joint space narrowing (posterior glenoid --- axillary view), osteophytes (inferior humeral head 'goat beard' osteophyte), subchondral sclerosis and cysts\n• CT: glenoid version, posterior wear pattern (biconcave glenoid), bone stock --- essential for arthroplasty planning\n• MRI: assess rotator cuff integrity prior to arthroplasty (intact cuff required for anatomical TSA)"}},{"name":"Elbow Fractures","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Elbow","sections":{"Cause / Aetiology":"---","Risk Factors":"• FOOSH mechanism in all ages; contact sports; osteoporosis (low-energy in elderly)\n• Terrible triad: high-energy fall or motor vehicle accident","Symptoms (History)":"---","Treatment":"• Radial head Mason I: aspiration of haemarthrosis (pain relief); early mobilisation (collar and cuff 1--2 weeks); physiotherapy; good prognosis\n• Radial head Mason II: ORIF with mini-fragment screws if block to movement or >2 mm displacement; Mason III: radial head replacement (arthroplasty) preferred over ORIF for comminuted fractures --- do NOT excise if associated Essex-Lopresti (results in proximal radius migration)\n• Olecranon displaced: tension band wiring (TBW) for simple transverse; plate fixation for comminuted; early ROM post-fixation\n• Terrible triad: surgical reconstruction --- coronoid fixation, radial head ORIF or replacement, lateral collateral ligament repair; hinged external fixator if still unstable","Investigations":"• X-ray (AP and lateral): fat pad sign on lateral view (posterior fat pad or elevated anterior fat pad = haemarthrosis; suggests occult fracture even if fracture line not visible)\n• CT: characterise comminuted radial head, coronoid and distal humerus fractures; preoperative planning\n• Wrist X-ray if Essex-Lopresti suspected (widened DRUJ)"}},{"name":"Bursitis","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Elbow","sections":{"Cause / Aetiology":"---","Risk Factors":"• Repetitive pressure on elbow (students, manual workers, plumbers); direct trauma\n• Gout, RA, pseudogout (crystal deposition in bursa); immunosuppression, diabetes, CKD (septic bursitis)","Symptoms (History)":"---","Treatment":"• Non-septic: padding and pressure avoidance; NSAIDs; aspiration if large; steroid injection for inflammatory (avoid if infection not excluded); compression bandage\n• Septic: aspiration/drainage + oral flucloxacillin (or IV if systemic sepsis); incision and drainage if fails to resolve; surgical bursectomy for recurrent or chronic cases","Investigations":"• Aspiration: mandatory if septic suspected --- fluid for Gram stain, culture, WBC, crystals; serum uric acid if gout suspected\n• X-ray: assess for underlying bony pathology, calcification in chronic bursitis, tophaceous deposits"}},{"name":"Ulnar Nerve Lesions","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Elbow","sections":{"Cause / Aetiology":"---","Risk Factors":"• Prolonged elbow flexion (sitting at desk, sleeping with arm under pillow); repetitive flexion--extension tasks\n• Cubitus valgus deformity (childhood lateral condyle fracture); elbow OA; diabetes (susceptibility to peripheral nerve compression)","Symptoms (History)":"---","Treatment":"• Conservative: elbow splinting at night in 45° flexion (prevents stretch on nerve); activity modification; padding over cubital tunnel\n• Surgical: decompression of cubital tunnel (release of Osborne's ligament); anterior transposition (subcutaneous, intramuscular or submuscular) if nerve subluxates or conservative fails; medial epicondylectomy\n• Post-operative recovery: sensory recovery precedes motor; intrinsic muscle recovery takes 6--18 months; prognosis better with milder disease and earlier intervention","Investigations":"• Nerve conduction studies (NCS) and EMG: localise site of compression; assess severity (conduction velocity across elbow); distinguish from C8/T1 radiculopathy\n• X-ray elbow: cubitus valgus, osteophytes, loose bodies\n• Ultrasound: nerve cross-sectional area, subluxation; may identify compressive lesion"}},{"name":"Epicondylitis (Tennis / Golfer's Elbow)","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Elbow","sections":{"Cause / Aetiology":"---","Risk Factors":"• Repetitive manual work (lateral: plumbers, carpenters, computer use; medial: golf, throwing athletes, manual labour)\n• Poor technique in racquet sports (tennis --- lateral); age 35--55 years; dominant arm","Symptoms (History)":"---","Treatment":"• Conservative (mainstay): activity modification, physiotherapy (eccentric exercise programme, deep friction massage), counterforce brace (tennis elbow clasp) during activity\n• Corticosteroid injection: provides short-term pain relief but inferior long-term outcomes vs. physio alone (Bisset et al. trials); maximum 2--3 injections\n• Other injections: platelet-rich plasma (PRP) --- evidence growing; autologous blood injection; botulinum toxin\n• Surgical (if >12 months conservative failure): open or arthroscopic release/debridement of ECRB origin; 70--85% success rate","Investigations":"• Clinical diagnosis --- investigations not routinely required\n• X-ray elbow: exclude calcification, loose bodies, OA if diagnosis uncertain\n• Ultrasound: hypoechoic area at tendon origin, neovascularisation (confirms tendinopathy), tears; useful if considering injection"}},{"name":"Intra-articular Pathology (Elbow / Wrist)","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Wrist & Hand","sections":{"Cause / Aetiology":"---","Risk Factors":"• OCD capitellum: young male overhead/throwing athletes (gymnasts, baseball pitchers); repetitive valgus loading\n• TFCC: positive ulnar variance (longer ulna loads TFCC), distal radius fracture, rotational injuries, manual labour","Symptoms (History)":"---","Treatment":"• Elbow OCD: non-operative (activity restriction, physio) for stable lesions; arthroscopic debridement ± microfracture/fragment fixation for unstable or loose bodies\n• TFCC tears: splinting and activity modification; arthroscopic debridement (degenerative tears) or repair (acute peripheral tears --- good vascularity); ulnar shortening osteotomy for positive ulnar variance","Investigations":"• X-ray: elbow --- OCD lesion capitellum, loose bodies, ulnar variance at wrist (neutral rotation PA view)\n• MRI arthrogram (gadolinium): gold standard for TFCC and intrinsic ligament tears; identifies labral pathology in elbow"}},{"name":"Ganglion Cysts","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Wrist & Hand","sections":{"Cause / Aetiology":"---","Risk Factors":"• Young adults aged 20--40 years; female predominance\n• Repetitive wrist activity; prior wrist injury or OA (mucous cysts)\n• Often idiopathic; may fluctuate in size","Symptoms (History)":"---","Treatment":"• Reassurance and observation: 40--50% resolve spontaneously; first-line for asymptomatic ganglia\n• Aspiration: simple, can be performed in clinic; high recurrence rate (50--80% for dorsal wrist); appropriate for symptomatic relief or to confirm diagnosis; avoid blind aspiration of volar wrist (radial artery risk --- use USS guidance)\n• Surgical excision: lower recurrence (5--15%) for open excision, higher for arthroscopic (similar outcomes in trials); indicated for symptomatic recurrence after aspiration, interference with function, failed conservative; excise base/stalk at joint origin to prevent recurrence","Investigations":"• Clinical diagnosis in most cases --- investigations not routinely required\n• Ultrasound: confirms cystic nature, demonstrates connection to joint, identifies radial artery proximity (volar wrist) before aspiration or surgery\n• MRI: occult ganglia, complex or atypical lesions, if underlying ligament pathology suspected"}},{"name":"Tendon Injuries","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Wrist & Hand","sections":{"Cause / Aetiology":"---","Risk Factors":"• Penetrating trauma to hand/wrist; RA (attritional tendon rupture on bony prominences)\n• Trigger finger: diabetes mellitus (most significant risk factor), middle-aged women, RA, hypothyroidism, carpal tunnel syndrome (coexistent)\n• Flexor digitorum profundus avulsion (Jersey finger): strong grip on opponent's collar in rugby --- ring finger most common","Symptoms (History)":"---","Treatment":"• Flexor tendon repair: surgical emergency --- within 24 hours ideally; core suture repair (4-strand Kessler or Tajima) under LA or GA; Zone II repairs complex (two tendons, pulley preservation); post-operative early active mobilisation protocol (Belfast regimen) with hand therapy\n• Mallet finger (closed): aluminium splint to DIP in full extension --- worn continuously for 6--8 weeks; surgery rarely needed (bony mallet with >50% articular involvement or >3mm displacement)\n• Trigger finger: corticosteroid injection to tendon sheath at A1 pulley (effective in \\~70%); A1 pulley surgical release for failed injection or locked trigger\n• Jersey finger: surgical reattachment (suture anchor or pull-through) within 7--10 days (tendon retracts into palm --- Leddy classification guides urgency)","Investigations":"• Clinical diagnosis --- no imaging routinely required for acute laceration; assess neurovascular status\n• Ultrasound: dynamically assesses tendons, useful for partial tears, trigger finger nodule\n• MRI: RA with suspected multiple tendon pathology"}},{"name":"Carpal Tunnel Syndrome","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Wrist & Hand","sections":{"Cause / Aetiology":"---","Risk Factors":"• Female sex (3:1); age 40--60 years; pregnancy (fluid retention --- usually resolves post-partum)\n• Diabetes mellitus; hypothyroidism; obesity; RA\n• Repetitive hand/wrist activities (vibrating tools, keyboard use --- epidemiological association); prolonged wrist flexion (sleeping with flexed wrists)","Symptoms (History)":"---","Treatment":"• Conservative: nocturnal wrist splint in neutral position (reduces nocturnal symptoms); activity modification; treat underlying cause (thyroid replacement, glycaemic control, diuretics in pregnancy)\n• Corticosteroid injection into carpal tunnel: effective short-to-medium term relief; diagnostic (if injection relieves symptoms, surgical decompression is likely to be beneficial); may be repeated once\n• Surgical --- carpal tunnel release (CTR): open or endoscopic; division of flexor retinaculum under LA; highly effective (>90% symptom resolution); indicated for failed conservative, moderate-severe NCS findings, thenar wasting, patient preference; endoscopic has quicker return to work, similar outcomes to open at 3 months\n• Post-operative: most recover within 3--6 months; thenar wasting and severe axonal loss may not fully recover --- early referral for severe cases","Investigations":"• Nerve conduction studies (NCS) / EMG: gold standard --- confirms diagnosis and grades severity (mild: sensory only; moderate: sensory + motor slowing; severe: axonal loss/denervation on EMG); guides prognosis post-surgery\n• Bloods if secondary cause suspected: TFTs, fasting BSL, HbA1c, ESR, CRP, uric acid\n• Ultrasound: cross-sectional area of median nerve at carpal tunnel entrance >12 mm² diagnostic; emerging as alternative to NCS\n• X-ray wrist: if trauma history or bony cause suspected"}},{"name":"Scaphoid / Distal Radius Fractures","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Wrist & Hand","sections":{"Cause / Aetiology":"---","Risk Factors":"• Scaphoid: young active males 20--40 years after sports or recreational injuries; FOOSH\n• Distal radius Colles': elderly osteoporotic women (fragility fracture); younger patients --- higher energy required\n• Smith's and Barton's: young adults, fall on flexed wrist, road trauma","Symptoms (History)":"---","Treatment":"• Scaphoid --- undisplaced waist fracture: thumb spica cast 10--12 weeks (non-union rate 5--10%); percutaneous compression screw fixation (Acutrak or Herbert screw) increasingly preferred --- earlier return to function and sport\n• Scaphoid --- displaced or proximal pole: surgical ORIF ± bone grafting (vascularised bone graft from 1,2 ICSRA for AVN cases)\n• Distal radius --- conservative: acceptable position: volar tilt >0°, radial inclination >15°, radial height >10 mm, <2 mm articular step; Colles' fracture --- Bier's block reduction → back-slab POP; follow-up at 1 week for repeat X-ray\n• Distal radius --- surgical (ORIF with volar locking plate): indicated for irreducible/unstable fractures, intra-articular displacement >2 mm, elderly high-demand patients, polytrauma; superior outcomes to casting for certain fracture types (DRAFFT2 trial --- some controversy for elderly low-demand)\n• Fragility fracture: osteoporosis investigation and treatment (DXA, bisphosphonate)","Investigations":"• Scaphoid: X-ray (PA, lateral, oblique, scaphoid views) --- negative does not exclude fracture; if clinical suspicion with negative X-ray → immobilise in thumb spica and MRI wrist within 72 hours (or early CT) --- MRI most sensitive for occult fractures; bone scan at 72 hours if MRI unavailable\n• Distal radius: X-ray (PA and lateral); measure radial inclination (normal 22°), volar tilt (11°), radial height (12 mm); CT for intra-articular extension and displacement; NCS if nerve symptoms"}},{"name":"De Quervain's / Stenosing Tenosynovitis","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Wrist & Hand","sections":{"Cause / Aetiology":"---","Risk Factors":"• De Quervain's: new mothers (repetitive infant lifting with thumb extended --- 'washerwoman's thumb'), middle-aged women, repetitive pinch/grip activities; new parents\n• Trigger finger: diabetes mellitus, middle-aged women, RA","Symptoms (History)":"---","Treatment":"Conservative: thumb spica splint, NSAIDs; corticosteroid injection into first dorsal compartment (highly effective --- 70--80% success); surgical release of first dorsal compartment retinaculum if conservative fails (day procedure)","Investigations":"Clinical diagnosis; ultrasound confirms thickened retinaculum and tenosynovitis, guides injection"}},{"name":"Dupuytren's Contracture","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Wrist & Hand","sections":{"Cause / Aetiology":"---","Risk Factors":"• Northern European/Celtic ancestry ('Viking disease'); male sex (M:F = 7:1); age >50 years\n• Diabetes mellitus, alcohol excess, smoking, epilepsy (phenytoin), manual labour, HIV","Symptoms (History)":"---","Treatment":"Indications for treatment: MCP contracture >30° or any PIP contracture (functional impact); options --- collagenase clostridium histolyticum injection (Xiaflex --- PBS-listed; enzymatic cord disruption, office-based); needle aponeurotomy (percutaneous fasciotomy); open partial fasciectomy (gold standard, lower recurrence); dermofasciectomy + skin graft for recurrence","Investigations":"Clinical diagnosis; no investigations routinely required"}},{"name":"Mallet Finger","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Wrist & Hand","sections":{"Cause / Aetiology":"---","Risk Factors":"Ball sports; any sudden passive DIP flexion force; crushing injury to distal finger","Symptoms (History)":"---","Treatment":"• Soft tissue or small bony mallet: continuous mallet splint (Stack splint or aluminium) maintaining DIP in full extension for 6--8 weeks continuously, then 4 weeks night splinting --- patient must not let DIP flex at any point during treatment\n• Bony mallet with >50% articular involvement or subluxation of distal phalanx: ORIF with K-wire or screw (controversial --- surgery has high complication rate at DIP level)","Investigations":"X-ray lateral view of finger: bony mallet (avulsion fracture at dorsal base of distal phalanx) vs. soft tissue mallet; assess articular involvement (%)"}},{"name":"Avascular Necrosis (AVN) of the Hip","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Hip","sections":{"Cause / Aetiology":"---","Risk Factors":"• Corticosteroid use (dose and duration dependent; even short high-dose courses); organ transplant recipients\n• Alcohol excess (>400 mL ethanol/week); haemoglobinopathies (sickle cell --- bilateral multifocal AVN)\n• Trauma: femoral neck fracture (up to 30% risk), hip dislocation (10--25%); radiation therapy\n• HIV (both disease and antiretroviral therapy); SLE; hyperlipidaemia; hypercoagulable states","Symptoms (History)":"---","Treatment":"• Stage I--II (pre-collapse): conservative --- activity restriction, protected weight-bearing, treat underlying cause (reduce steroids, alcohol cessation); core decompression ± bone marrow concentrate injection or bone grafting --- reduces intraosseous pressure; may slow progression\n• Vascularised fibular graft (VFG): for young patients with large pre-collapse lesions --- brings new blood supply; technically demanding\n• Stage III (subchondral collapse): rotational osteotomy (Sugioka --- moves necrotic segment away from weight-bearing zone) in carefully selected young patients; success rate declining\n• Stage IV (articular collapse and OA): total hip arthroplasty (THR) --- definitive treatment; younger patients (often <50 years) at risk of implant revision over lifetime; manage expectations regarding longevity","Investigations":"• X-ray (AP and frog-leg lateral): normal in early stages; 'crescent sign' (subchondral lucency --- pathognomonic of subchondral collapse); femoral head flattening and articular collapse (late); secondary OA changes\n• MRI (investigation of choice for early AVN): sensitivity >90% for Stage I--II; characteristic double-line sign (inner bright, outer dark on T2 --- representing interface of reactive bone and necrotic zone); determines extent of necrosis (necrotic angle/arc)\n• CT: characterises extent of collapse and articular congruency; staging\n• Ficat and ARCO staging systems used clinically; bone scan (hot-cold lesion pattern)"}},{"name":"Hip Osteoarthritis / Hip Replacement","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Hip","sections":{"Cause / Aetiology":"---","Risk Factors":"• Age, obesity, positive family history; previous hip disease in childhood (DDH, Perthes', SUFE)\n• Femoroacetabular impingement (FAI) --- increasingly recognised cause of early-onset OA in athletic young adults\n• Occupational: farming (farmers 4× increased risk); heavy manual labour","Symptoms (History)":"---","Treatment":"• Conservative: weight reduction, physiotherapy, hydrotherapy, walking aids; NSAIDs; intra-articular steroid injection (diagnostic and therapeutic); glucosamine --- limited evidence\n• FAI: arthroscopic debridement and femoral osteoplasty (cam correction) ± labral repair for pre-arthritic FAI in young patients\n• Total Hip Replacement (THR/THA): gold standard for end-stage hip OA --- most effective and cost-effective elective surgical procedure in medicine; >90% survival at 15 years (Australian Orthopaedic Association National Joint Replacement Registry --- AOANJRR); approaches --- posterior (most common), lateral (Hardinge), anterolateral, direct anterior (DAA --- rapidly growing)\n• Bearing surfaces: ceramic on ceramic or ceramic on highly cross-linked polyethylene (preferred for young active patients --- AOANJRR data); cobalt-chrome on polyethylene (older design); metal-on-metal phased out (ALVAL/pseudotumour --- MHRA/TGA guidance)\n• Post-operative: VTE prophylaxis (LMWH/aspirin --- EPCAT II trial supports aspirin); hip precautions (posterior approach); physiotherapy; most return home day 1--3; rapid recovery programmes","Investigations":"• X-ray (weight-bearing AP pelvis and lateral of affected hip): JOSS findings; Tonnis grading (0--III) for OA severity; assess acetabular coverage (centre-edge angle), cam deformity (alpha angle >55° on Dunn view)\n• MRI arthrogram: labral tears, chondral delamination, FAI morphology in younger patients\n• CT: acetabular version, FAI planning, pre-arthroplasty templating"}},{"name":"Neck of Femur Fracture","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Hip","sections":{"Cause / Aetiology":"---","Risk Factors":"• Osteoporosis (T-score ≤−2.5); age >75; female sex; prior fragility fracture; corticosteroid use; cognitive impairment (fall risk); polypharmacy\n• Falls risk factors: muscle weakness, poor vision, postural hypotension, home hazards; alcohol\n• Second most common cause of death in elderly Australians from injury after traumatic brain injury","Symptoms (History)":"---","Treatment":"• Medical optimisation and surgery within 48 hours of admission (ASA/ACSQHC hip fracture guidelines --- reduces mortality); address coagulation (hold anticoagulants; DOAC --- wait 12--24 hours; warfarin --- reverse with Vitamin K ± PCC)\n• Undisplaced intracapsular (Garden I/II): cannulated screws or sliding hip screw ± derotation screw (preserve femoral head --- risk of late displacement and AVN \\~10--15%); hemiarthroplasty increasingly preferred in elderly\n• Displaced intracapsular (Garden III/IV): hemiarthroplasty (Austin Moore or Thompson --- monopolar/bipolar) for low-demand elderly; total hip replacement (THR) for physiologically fit patients with good pre-injury mobility and no cognitive impairment (Cochrane and HEALTH trial support THR over hemi for active patients)\n• Extracapsular intertrochanteric: sliding hip screw (SHS) for stable patterns; intramedullary nail (cephalomedullary nail --- e.g.\n• Proximal Femoral Nail Anti-rotation, PFNA) for unstable patterns and subtrochanteric fractures\n• Post-operative: immediate full weight-bearing (WBAT) regardless of fixation; VTE prophylaxis (LMWH for 35 days --- NOF); pressure area nursing; delirium prevention bundle; falls prevention; multidisciplinary geriatric orthopaedic liaison (GOL) service; osteoporosis treatment before discharge (DXA + bisphosphonate/denosumab); liaison with rehabilitation and social work","Investigations":"• X-ray (AP pelvis and lateral of affected hip): identifies fracture in 80--90%; Shenton's line disruption (intracapsular)\n• MRI (if X-ray negative with high clinical suspicion): identifies occult NOF fracture within 24 hours; bone scan alternative if MRI unavailable (takes 72 hours)\n• Pre-operative bloods: FBC, EUC, LFTs, coagulation, group and hold, CRP; ECG; chest X-ray; 12-hour troponin if cardiac event suspected\n• CT head if head injury or anticoagulated"}},{"name":"Ligament Tears (Knee)","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Knee","sections":{"Cause / Aetiology":"---","Risk Factors":"• Female sex (ACL --- hormonal influences on ligament laxity, Q-angle, narrower intercondylar notch, quadriceps-dominant movement patterns)\n• Contact and pivoting sports (AFL, netball, soccer, basketball, skiing --- all high prevalence in Australia)\n• Prior ACL injury (ipsilateral re-tear 15%; contralateral tear 15--20%); landing mechanics (valgus collapse); poor neuromuscular control; artificial turf","Symptoms (History)":"---","Treatment":"• ACL --- conservative: appropriate for low-demand elderly patients, partial tears, or those accepting activity modification; physiotherapy (quadriceps, hamstring strengthening, proprioception --- 'prehab'); functional bracing\n• ACL --- reconstruction (ACLR): indicated for young active patients, athletes, combined injuries, persistent instability; autograft (bone-patellar tendon-bone --- BPTB, hamstring tendons --- most popular in Australia) or allograft; tunnels placed anatomically (single or double bundle); return to sport 9--12 months post-op; prevention programmes (FIFA 11+, JUMP program)\n• MCL: grade I--II --- conservative (hinged brace, physio, early ROM); grade III isolated --- conservative 8--12 weeks; grade III with combined injury --- may require surgical repair\n• PCL: most isolated PCL tears managed conservatively; surgical reconstruction for grade III or combined ligament injuries (multi-ligament knee)\n• Multi-ligament knee injury/dislocation: orthopaedic emergency --- check vascular status (popliteal artery); staged ligament reconstruction; referral to specialist knee surgeon","Investigations":"• X-ray (AP, lateral, skyline): acute injury --- exclude fracture; Segond fracture (lateral tibial avulsion --- pathognomonic of ACL tear); reverse Segond (PCL/meniscus); tibial spine avulsion (ACL equivalent in children)\n• MRI: confirms ligament injury, grading (partial vs. complete), associated meniscal and chondral injuries, bone bruise pattern; gold standard pre-operatively\n• KT-1000/GNRB arthrometer: objective measurement of anterior tibial translation (research and medico-legal)"}},{"name":"Meniscal Injury","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Knee","sections":{"Cause / Aetiology":"---","Risk Factors":"• Pivoting sports (AFL, soccer, rugby --- high prevalence in Australia); associated ACL tear (ACL-deficient knee --- medial meniscus becomes secondary stabiliser, high wear rate)\n• Age >40 years (degenerative tears); obesity (load); varus/valgus deformity increases compartmental loading","Symptoms (History)":"---","Treatment":"• Conservative: appropriate for degenerative tears (positive METEOR and FIDELITY trials --- arthroscopic partial meniscectomy no better than sham or physiotherapy for degenerative tears in middle-aged patients); physiotherapy, NSAIDs, activity modification\n• Arthroscopic partial meniscectomy (APM): indicated for traumatic tears causing mechanical symptoms (locking, significant clicking with effusion) that fail conservative management; preserves as much meniscal tissue as possible\n• Meniscal repair: preferred for acute peripheral zone tears (vascular --- 'red zone') in young patients, bucket-handle tears, tears associated with ACL reconstruction; requires 4--6 weeks non-weight-bearing post-repair; higher reoperation rate than meniscectomy but protects joint long-term\n• Meniscal allograft transplantation: for young patients with previous total meniscectomy and early compartmental OA --- niche procedure; specialist centres","Investigations":"• X-ray (weight-bearing AP, lateral, skyline): usually normal in isolated tear; assess for OA (joint space narrowing --- medial compartment), Pellegrini-Stieda lesion (MCL calcification), loose bodies\n• MRI (gold standard): identifies tear site, pattern, and size; grading (I--III --- grade III = complete tear communicating with articular surface); assesses chondral damage and associated ligament injuries; critical for preoperative planning"}},{"name":"Knee Osteoarthritis","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Knee","sections":{"Cause / Aetiology":"---","Risk Factors":"• Age >50; female sex; obesity (1 kg weight loss = 4 kg load reduction on knee); prior meniscectomy (highest modifiable risk); ACL-deficient knee\n• Varus/valgus malalignment; manual work (kneeling --- significant independent risk); heredity","Symptoms (History)":"---","Treatment":"• Conservative (first-line): weight loss, physiotherapy (quadriceps strengthening, aquatic therapy), activity modification, walking aids; NSAIDs (topical or oral); bracing (unloader brace for medial compartment OA --- offloads medial compartment)\n• Intra-articular corticosteroid injection: PBS-listed; effective short-term relief; avoid frequent injections (potential cartilage toxicity, infection risk, hyperglycaemia in diabetics)\n• High tibial osteotomy (HTO): valgus-producing HTO for medial compartment OA in younger patients (<60 years) with varus deformity --- realigns mechanical axis to unload medial compartment; preserves joint for 5--10 years\n• Total Knee Replacement (TKR): gold standard for end-stage knee OA; 95% satisfaction; 15-year survival >90% (AOANJRR); age, BMI, and activity thresholds less absolute than historically; unicompartmental knee replacement (UKR) for isolated medial compartment disease in appropriate patients --- faster recovery, better proprioception but higher reoperation rate\n• Post-TKR: VTE prophylaxis (aspirin or LMWH --- ASPIRE trial); aggressive physio from day 1; full weight-bearing immediately; aim for 0--120° ROM; return to low-impact activities at 3--6 months","Investigations":"• X-ray (weight-bearing bilateral AP --- Rosenberg view in 45° flexion is more sensitive; lateral; skyline): LOSS changes; assess compartmental involvement and alignment (hip-knee-ankle axis --- alignment films if osteotomy considered)\n• MRI if diagnosis uncertain, younger patient, or surgical planning required (assess cartilage, menisci, ligaments)"}},{"name":"Knee Fractures","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Knee","sections":{"Cause / Aetiology":"---","Risk Factors":"• High-energy trauma (young adults); low-energy fragility (elderly --- osteoporotic distal femur increasing in frequency)\n• Osteoporosis; periprosthetic fracture (occurs around existing TKR implant --- increasing incidence as arthroplasty volumes increase)","Symptoms (History)":"---","Treatment":"• Tibial plateau --- non-operative: Schatzker I--II with <2 mm articular depression and stable ligaments --- hinged brace, non-weight-bearing 6--8 weeks\n• Tibial plateau --- operative (ORIF ± bone graft): Schatzker III--VI, depression >2 mm, instability; plate and screw fixation; external fixator for temporary spanning in open or high-energy fractures\n• Patella displaced: ORIF (tension band wiring, anterior plate); partial patellectomy for comminuted polar fragments; total patellectomy rarely required\n• Patella undisplaced: cylinder cast or functional brace 4--6 weeks with early straight-leg raises; serial X-ray to exclude late displacement","Investigations":"• X-ray (AP, lateral, oblique): identify fracture; lipohemarthrosis on lateral view (fat-fluid level --- fracture entering joint); Ottawa Knee Rules guide X-ray need\n• CT: essential for all tibial plateau and distal femur fractures --- defines articular depression, comminution, and fracture lines; surgical planning"}},{"name":"Patellofemoral Disorders","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Knee","sections":{"Cause / Aetiology":"---","Risk Factors":"• Female sex; hypermobility; Q-angle >20° (female --- wider pelvis); rapid increase in physical activity (adolescents, new runners)\n• Trochlear dysplasia, patella alta, increased TT-TG distance (structural risks for instability); prior patellar dislocation (recurrence risk 15--40%)","Symptoms (History)":"---","Treatment":"• PFPS: physiotherapy (VMO strengthening, hip abductor and external rotator strengthening, patellar taping --- McConnell technique); activity modification; foot orthotics if hyperpronation\n• Patellar instability: first dislocation --- conservative (physiotherapy, medial patellar taping, hinged brace); MPFL reconstruction for recurrent instability or first-time dislocation with significant anatomical risk factors (trochlear dysplasia, TT-TG >20 mm)\n• Tibial tubercle osteotomy (medialization, anteriorization --- Fulkerson): for elevated TT-TG and patellofemoral OA with patellar maltracking; anteromedialisation reduces PF contact pressures\n• Trochleoplasty: for severe trochlear dysplasia --- technically demanding; specialist patellofemoral surgeons","Investigations":"• X-ray (AP, lateral, skyline/Merchant view): patella alta (Insall-Salvati ratio >1.2), trochlear dysplasia (crossing sign), lateral tilt/subluxation, OA changes\n• CT or MRI: TT-TG distance measurement (MRI preferred --- soft tissue landmarks); trochlear morphology; chondral damage; MPFL integrity post-dislocation"}},{"name":"Ankle Ligament Injuries","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Foot & Ankle","sections":{"Cause / Aetiology":"---","Risk Factors":"• Prior ankle sprain (most significant risk --- proprioceptive deficit); high-heeled footwear; uneven terrain\n• Sporting activity (particularly court sports, AFL, soccer); hindfoot varus alignment predisposes to lateral instability\n• Syndesmotic injury: high-energy mechanism, contact sports, ice hockey, ski boots","Symptoms (History)":"---","Treatment":"• Acute lateral sprain: RICE/PRICE (Protection, Rest, Ice, Compression, Elevation) --- ice for 20 minutes every 2--4 hours in first 48--72 hours; functional rehabilitation (early ROM exercises, balance/proprioception training) superior to immobilisation; short period in air-stirrup brace\n• Physiotherapy: ankle strengthening (peroneal muscles), proprioceptive training, lace-up brace for return to sport --- significantly reduces re-injury rate\n• Surgical (chronic instability): Broström-Gould procedure (anatomical ATFL and CFL repair with extensor retinaculum reinforcement) --- gold standard for lateral instability; arthroscopic Broström increasingly popular\n• Syndesmotic injury --- stable (no diastasis): boot for 6 weeks, non-weight-bearing; physiotherapy\n• Syndesmotic --- unstable/diastasis: surgical stabilisation (syndesmotic screw or suture-button TightRope device --- allows physiological motion)","Investigations":"• X-ray (Ottawa Ankle Rules guide --- reduces unnecessary X-rays by 30--40%): AP, mortise, lateral; assess medial clear space (>4 mm on mortise view = deltoid disruption and syndesmotic injury --- unstable)\n• Stress X-ray (gravity or manual): for chronic instability assessment\n• MRI: ligament integrity, associated chondral lesions (osteochondral defect of talus --- present in 50% of ankle sprains), tendon pathology, syndesmotic extent\n• CT: assessment of talar dome osteochondral lesions, bony avulsion fragments; pre-op planning"}},{"name":"Achilles Tendon Injuries","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Foot & Ankle","sections":{"Cause / Aetiology":"---","Risk Factors":"• Tendinopathy: rapid training load increase ('too much, too soon, too fast'), inadequate footwear, training on hard surfaces, hyperpronation, male sex, age 30--50 years, metabolic disease (diabetes, hypercholesterolaemia, gout)\n• Rupture: middle-aged male recreational athletes ('weekend warrior'); fluoroquinolones (ciprofloxacin --- impair tenocyte function); oral corticosteroids; prior intratendinous steroid injection","Symptoms (History)":"---","Treatment":"• Tendinopathy: load management (reduce aggravating activity but maintain relative activity); progressive loading programme (eccentric calf raises --- Alfredson protocol; heavy slow resistance training --- Silbernagel protocol); heel lifts short-term; shock wave therapy (extracorporeal --- ESWT) for refractory cases; PRP injection (emerging evidence); avoid corticosteroid injection into tendon body (rupture risk)\n• Insertional tendinopathy: eccentric exercises in neutral (not over step edge); retrocalcaneal bursitis --- steroid injection (peritedinous, not intratendinous); Haglund's deformity --- endoscopic calcaneal plasty and retrocalcaneal bursectomy\n• Achilles rupture --- operative repair: primary end-to-end repair (open or mini-open/percutaneous); lower re-rupture rate (3--5%) vs. conservative; higher wound complication rate; preferred for young active patients, high-demand athletes\n• Achilles rupture --- conservative: functional bracing in equinus (gravity equinus boot with heel wedges --- progressive dorsiflexion over 8 weeks); re-rupture rate 6--12%; avoids surgical complications; UKSTAR trial --- no significant difference in re-rupture or Achilles tendon rupture score at 9 months vs. surgery; preferred in older patients, comorbidities\n• Rehabilitation (both): early ROM and partial weight-bearing in boot; progressive strengthening; return to sport 6--9 months; single-leg heel rise testing for clearance","Investigations":"• Tendinopathy: ultrasound (dynamic assessment --- hypoechoic tendon, neovascularisation on Doppler, tendon thickening --- characteristic fusiform swelling); MRI for surgical planning or atypical presentation\n• Rupture: clinical diagnosis in most cases (Thompson's test has >95% sensitivity); ultrasound confirms complete rupture and assesses gap; MRI if diagnosis uncertain, partial tear, or pre-operative planning for delayed repair"}},{"name":"Ankle Fractures","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Foot & Ankle","sections":{"Cause / Aetiology":"---","Risk Factors":"• Rotational ankle injury, sports, alcohol, slips and falls; osteoporosis (fragility ankle fractures in elderly --- 'geriatric ankle fracture' increasing)\n• Maisonneuve: high energy external rotation --- examine proximal fibula in all unstable ankle injuries","Symptoms (History)":"---","Treatment":"• Stable lateral malleolus (Weber A/B with intact mortise): boot or below-knee plaster cast 4--6 weeks; weight-bearing as tolerated; physiotherapy\n• Unstable fractures (talar shift, disrupted mortise, bimalleolar/trimalleolar): surgical ORIF --- anatomical reduction of mortise critical for long-term function and prevention of OA; fibula: plate and lag screw; medial malleolus: lag screws or tension band wiring; posterior malleolus: screw or plate if >25% articular surface or 2 mm displacement\n• Syndesmotic fixation: screw (1 or 2 × syndesmotic screws --- removed or not per surgeon preference) or suture-button (TightRope --- does not require removal, allows physiological motion); must confirm reduction of mortise post-fixation\n• Fragility ankle fractures: close-knit MDT approach (geriatrics, orthopaedics); bone quality implications for fixation --- fibular locking plates, augmentation; VTE prophylaxis","Investigations":"• X-ray (AP, mortise, lateral): assess medial clear space (<4 mm normal on mortise view); talar shift; fibula fracture level; posterior malleolus size; fibula length\n• Full-length fibula X-ray if proximal tenderness (Maisonneuve)\n• CT: posterior malleolus fracture characterisation (>25--33% of articular surface = fixation required), complex pilon injuries, pre-op planning\n• MRI or stress X-ray: assess syndesmosis and deltoid integrity in equivocal cases"}},{"name":"Foot Pain Syndromes","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Foot & Ankle","sections":{"Cause / Aetiology":"---","Risk Factors":"• Plantar fasciitis: obesity (strongest modifiable RF), age 40--60 years, pes planus or pes cavus (both increase fascia load), tight Achilles/gastroc, prolonged standing on hard surfaces\n• Morton's neuroma: tight narrow footwear (high heels), age >40, female sex (F:M = 4:1), pes planus\n• Stress fractures: rapid load increase, female athlete triad, osteoporosis, vitamin D deficiency, low BMI","Symptoms (History)":"---","Treatment":"• Plantar fasciitis: stretching (calf/Achilles and plantar fascia --- towel stretches, particularly before first steps); heel cushion/cup; supportive footwear and orthotics; weight reduction; physio; night splint (maintains passive dorsiflexion stretch); ESWT (extracorporeal shock wave therapy) for recalcitrant cases --- PBS-listed; corticosteroid injection (short-term relief, risk of fat pad atrophy and fascia rupture); surgery (endoscopic plantar fascia release) --- last resort\n• Morton's neuroma: wide toe-box footwear, metatarsal pad; corticosteroid injection into interspace (70% response); surgical excision of neuroma (through dorsal incision --- avoids plantar scar); RF ablation alternative to surgery\n• Metatarsal stress fractures: relative rest, activity modification, protective footwear; navicular --- non-weight-bearing cast 6--8 weeks (or surgical ORIF for displaced/elite athletes); return to sport guided by clinical and MRI findings","Investigations":"• Plantar fasciitis: clinical diagnosis; X-ray (lateral foot): plantar calcaneal spur (present in 50% of normals --- not the cause of pain); ultrasound: thickened plantar fascia >4 mm, hypoechogenicity at insertion\n• Morton's neuroma: ultrasound (most cost-effective --- identifies echopoor neuroma >5 mm); MRI for complex cases or pre-surgical planning; diagnostic injection with LA ± steroid into interspace (also therapeutic)\n• Stress fractures: X-ray (insensitive early); MRI (gold standard --- early marrow oedema); bone scan; CT for navicular fractures (assess completeness)"}},{"name":"Hallux Valgus","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Foot & Ankle","sections":{"Cause / Aetiology":"---","Risk Factors":"Female sex (F:M = 10:1 --- footwear and hormonal joint laxity); family history; tight narrow footwear; RA (hallux valgus is characteristic); pes planus; hypermobility","Symptoms (History)":"---","Treatment":"• Conservative: wide toe-box footwear, toe spacer, orthotics for pes planus --- does not correct deformity but relieves symptoms\n• Surgical: indicated for pain refractory to conservative measures (not for cosmesis alone); distal osteotomy (chevron/Scarf) for mild-moderate deformity; proximal osteotomy (Lapidus --- 1st TMT arthrodesis) for severe deformity or hypermobile first ray; 1st MTP arthrodesis for concomitant arthritis","Investigations":"Weight-bearing X-ray (AP and lateral of foot): measure HVA and IMA; assess first MTP joint arthritis; sesamoid position"}},{"name":"Disc Prolapse","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Spine","sections":{"Cause / Aetiology":"---","Risk Factors":"• Age 30--50 years; male sex; occupational --- prolonged sitting, heavy lifting, twisting, vibration (truck drivers, machine operators); smoking (reduces disc vascularity and nutrition); obesity; sedentary lifestyle\n• Genetic predisposition to early disc degeneration; previous disc prolapse (recurrence risk)","Symptoms (History)":"---","Treatment":"• Conservative (90% of lumbar disc prolapse resolves within 6--12 weeks): analgesia (paracetamol, NSAIDs, short course oral steroids for severe radiculopathy); physiotherapy (McKenzie method --- centralisation of pain; core stabilisation); activity modification (avoid prolonged sitting, aggravating positions); avoid bed rest\n• Epidural steroid injection: for persistent radiculopathy --- short-term relief; guides conservative management; does not alter surgical outcomes\n• Surgical --- microdiscectomy (lumbar) or anterior cervical discectomy and fusion (ACDF): indicated for progressive neurological deficit, cauda equina syndrome (emergency), failure of conservative management at 6--12 weeks, or unbearable pain; high success rate (>80%) for radiculopathy; leg pain relief better than back pain relief","Investigations":"• MRI lumbar/cervical spine (investigation of choice): identifies disc level, direction of herniation, nerve root compression, spinal cord signal change (cervical myelopathy); do not image without red flags or clinical radiculopathy in first 6 weeks\n• CT myelogram: if MRI contraindicated; nerve conduction studies/EMG: to confirm root level, exclude peripheral nerve pathology\n• X-ray: limited value for disc prolapse; useful to assess alignment, spondylolisthesis, bony lesions"}},{"name":"Spinal Cord / Nerve Root Compression","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Spine","sections":{"Cause / Aetiology":"---","Risk Factors":"• Age >50; spondylosis (universal with ageing --- not all develop symptoms); congenitally narrow spinal canal (smaller reserve); rheumatoid arthritis (atlanto-axial instability --- C1/C2 subluxation --- myelopathy risk), ankylosing spondylitis\n• Diabetes (susceptibility to cord ischaemia); lumbar stenosis --- age, obesity, prior back surgery","Symptoms (History)":"---","Treatment":"• Cervical myelopathy: surgical decompression indicated for moderate-severe myelopathy or progression --- anterior cervical discectomy and fusion (ACDF, 1--2 levels) or posterior laminectomy ± fusion/laminoplasty (multilevel or ossification); natural history without surgery --- stepwise deterioration; surgery aims to prevent progression (recovery incomplete in established myelopathy)\n• Lumbar spinal stenosis: conservative --- physiotherapy (lumbar flexion exercises, core stabilisation), epidural steroid injection (moderate temporary relief); surgical (laminectomy --- decompression of neural elements) if significant functional limitation or neurological deterioration; SPORT trial --- surgical superior to conservative at 2 years for symptom relief; spondylolisthesis with stenosis may require fusion in addition to decompression","Investigations":"• MRI spine: investigation of choice --- demonstrates cord compression, signal change (T2 hyperintensity = myelopathic signal --- worse prognosis), disc level, canal diameter\n• CT myelogram: if MRI contraindicated; dynamic X-rays (flexion-extension) for instability\n• NCS/EMG: excludes peripheral neuropathy, confirms radiculopathy level\n• Vascular assessment (ABPI, Doppler) if vascular claudication cannot be excluded"}}];
var CM={"Cardiac & Vascular Conditions":{i:"\u2764\uFE0F",c:"#e05555"},"Respiratory Conditions":{i:"\uD83E\uDEC1",c:"#5b8dd9"},"Gastrointestinal Conditions":{i:"\uD83E\uDEC3",c:"#e8a838"},"Neurological & Renal/Genitourinary Conditions":{i:"\uD83E\uDDE0",c:"#9b6ddb"},"Endocrine & Infectious Disease Conditions":{i:"\uD83E\uDDA0",c:"#4cba7f"},"Haematology, Oncology, Rheumatology, Dermatology & ENT":{i:"\uD83E\uDE78",c:"#e0628a"},"Musculoskeletal / Orthopaedic Conditions":{i:"\uD83E\uDDB4",c:"#e07c3e"}};
var SM={"Cause / Aetiology":{i:"\u26A1",c:"#e07c3e",b:"rgba(224,124,62,.12)"},"Risk Factors":{i:"\u26A0\uFE0F",c:"#e8a838",b:"rgba(232,168,56,.12)"},"Symptoms (History)":{i:"\uD83D\uDCAC",c:"#5b8dd9",b:"rgba(91,141,217,.12)"},"Investigations":{i:"\uD83D\uDD2C",c:"#4cba7f",b:"rgba(76,186,127,.12)"},"Treatment":{i:"\uD83D\uDC8A",c:"#e0628a",b:"rgba(224,98,138,.12)"}};
var cats={};
DB.forEach(function(c){
  var cat=c.category,sc=c.subcategory;
  if(!cats[cat])cats[cat]={};
  if(!cats[cat][sc])cats[cat][sc]=[];
  cats[cat][sc].push(c);
});
var nav=["home"],curCat=null,curSub=null;

function g(id){return document.getElementById(id)}
function mk(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e}
function esc(s){var d=document.createElement("div");d.appendChild(document.createTextNode(s));return d.innerHTML}

function showScr(id,back){
  var old=document.querySelector(".screen.active");
  var nw=g("s-"+id);
  if(!nw)return;
  if(old&&old!==nw){
    old.classList.remove("active");
    old.classList.add(back?"sbO":"sO");
    (function(el){setTimeout(function(){el.classList.remove("sbO","sO")},280)})(old);
  }
  nw.classList.add("active",back?"sbI":"sI");
  setTimeout(function(){nw.classList.remove("sbI","sI")},280);
  nw.scrollTop=0;
}

function updHdr(){
  var cur=nav[nav.length-1];
  var hb=g("hb"),ht=g("ht"),hs=g("hs"),sw=g("sw");
  if(cur==="home"){hb.classList.remove("on");ht.textContent="Clinical Handbook";hs.textContent="HME931/HME932 · 2026";sw.classList.add("on")}
  else if(cur==="sub"){hb.classList.add("on");ht.textContent=curCat||"";hs.textContent="Select subcategory";sw.classList.remove("on")}
  else if(cur==="clist"){hb.classList.add("on");ht.textContent=curSub||"";hs.textContent="Select condition";sw.classList.remove("on")}
  else if(cur==="det"){hb.classList.add("on");sw.classList.remove("on")}
  else if(cur==="srch"){hb.classList.add("on");ht.textContent="Search";hs.textContent="All conditions";sw.classList.add("on")}
}

function goBack(){
  if(nav.length<=1)return;
  nav.pop();
  showScr(nav[nav.length-1],true);
  updHdr();
}

function goto(id){
  nav.push(id);
  showScr(id,false);
  updHdr();
}

function buildHome(){
  var cg=g("cg");cg.innerHTML="";
  Object.keys(cats).forEach(function(cat){
    var m=CM[cat]||{i:"\uD83D\uDCCB",c:"#4f9cf9"};
    var subs=cats[cat];
    var count=0;Object.keys(subs).forEach(function(k){count+=subs[k].length});
    var nsubs=Object.keys(subs).length;
    var card=mk("div","cc");
    card.style.setProperty("--cco",m.c);
    card.innerHTML='<div class="cico">'+m.i+'</div><div class="cinf"><h3>'+esc(cat)+'</h3><p>'+count+' conditions &middot; '+nsubs+' section'+(nsubs>1?'s':'')+'</p></div><span class="arr">&#8250;</span>';
    (function(c){card.onclick=function(){openCat(c)}})(cat);
    cg.appendChild(card);
  });
}

function openCat(cat){
  curCat=cat;
  var subs=cats[cat];
  var keys=Object.keys(subs);
  if(keys.length===1){openSub(cat,keys[0]);return}
  var m=CM[cat]||{i:"\uD83D\uDCCB"};
  g("shb").textContent=m.i;
  g("sht").textContent=cat;
  var tot=0;keys.forEach(function(k){tot+=subs[k].length});
  g("shc").textContent=tot+" conditions";
  var sl=g("scl-list");sl.innerHTML="";
  keys.forEach(function(sc){
    var items=subs[sc];
    var card=mk("div","scard");
    card.innerHTML='<div><h3>'+esc(sc)+'</h3><p>'+items.length+' condition'+(items.length>1?'s':'')+'</p></div><span class="arr">&#8250;</span>';
    (function(c,s){card.onclick=function(){openSub(c,s)}})(cat,sc);
    sl.appendChild(card);
  });
  goto("sub");
}

function openSub(cat,sc){
  curSub=sc;
  var items=cats[cat][sc];
  g("bc").textContent=cat+(sc!==cat?" › "+sc:"");
  g("clt").textContent=sc;
  var cl=g("cl");cl.innerHTML="";
  items.forEach(function(cond){
    var item=mk("div","ci");
    var s=cond.stars;
    var stars=s?"&#9733;".repeat(s):"";
    item.innerHTML='<span class="cn">'+esc(cond.name)+'</span>'+(s?'<span class="st st'+s+'">'+stars+'</span>':"")+'<span class="arr" style="font-size:14px">&#8250;</span>';
    (function(c){item.onclick=function(){openCond(c)}})(cond);
    cl.appendChild(item);
  });
  goto("clist");
}

function openCond(cond){
  var m=CM[cond.category]||{i:"\uD83D\uDCCB",c:"#4f9cf9"};
  g("ht").textContent=cond.name;
  g("hs").textContent=cond.subcategory;
  g("dtag").innerHTML=m.i+" "+esc(cond.subcategory);
  g("dttl").textContent=cond.name;
  var lv=["","Brief","Moderate","Detailed"],lc=["","#8890a8","#a0c8f0","#f0c040"];
  var s=cond.stars;
  g("dmeta").innerHTML=s?'<span class="dstar">'+"&#9733;".repeat(s)+(s<3?'<span style="color:var(--di)">'+"&#9733;".repeat(3-s)+"</span>":"")+'</span><span class="dlvl" style="background:'+lc[s]+'22;color:'+lc[s]+'">'+lv[s]+"</span>":"";
  var secs=g("secs");secs.innerHTML="";
  var order=["Cause / Aetiology","Risk Factors","Symptoms (History)","Investigations","Treatment"];
  var sections=cond.sections||{};
  var done=0;
  order.forEach(function(k){
    var val=sections[k];
    if(!val)return;
    renderSection(secs,k,val,done===0);
    done++;
  });
  Object.keys(sections).forEach(function(k){
    if(order.indexOf(k)<0&&sections[k]){renderSection(secs,k,sections[k],false);done++}
  });
  if(!done)secs.innerHTML='<div class="nosec">No detailed content available.</div>';
  goto("det");
}

function renderSection(container,k,val,open){
  var sm=SM[k]||{i:"\uD83D\uDCC4",c:"#4f9cf9",b:"rgba(79,156,249,.12)"};
  var blk=mk("div","sblk"+(open?" open":""));
  blk.style.setProperty("--sc",sm.c);
  blk.style.setProperty("--scb",sm.b);
  var raw=val.replace(/^\u2022\s*/,"");
  var bullets=raw.split(/\n\u2022\s*/);
  if(!bullets.length||(bullets.length===1&&!bullets[0].trim()))bullets=[val];
  var bHTML=bullets.filter(function(b){return b.trim()}).map(function(b){
    return'<div class="bi"><span class="bdot">\u2022</span><span>'+esc(b.trim())+'</span></div>'
  }).join("");
  if(!bHTML)bHTML='<div class="bi"><span>'+esc(val)+'</span></div>';
  blk.innerHTML='<button class="stb" onclick="tog(this.parentElement)"><div class="sico-box">'+sm.i+'</div><span class="stlbl">'+esc(k)+'</span><span class="chev">&#9660;</span></button><div class="sbody">'+bHTML+'</div>';
  container.appendChild(blk);
}

function tog(b){b.classList.toggle("open")}

var _st=null;
g("sq").addEventListener("input",function(){
  clearTimeout(_st);var v=this.value.trim();
  _st=setTimeout(function(){doSearch(v)},200);
});

function doSearch(q){
  var scl=g("scl");
  if(!q){scl.classList.remove("on");if(nav[nav.length-1]==="srch")goBack();return}
  scl.classList.add("on");
  var ql=q.toLowerCase();
  var res=DB.filter(function(c){return c.name.toLowerCase().indexOf(ql)>=0||(c.subcategory&&c.subcategory.toLowerCase().indexOf(ql)>=0)});
  var srl=g("srl");srl.innerHTML="";
  if(!res.length){
    srl.innerHTML='<div class="empty"><div class="ei">&#128269;</div><p>No results for <strong>'+esc(q)+'</strong></p></div>';
  } else {
    var lbl=mk("div","srllbl");lbl.textContent=res.length+" result"+(res.length>1?"s":"");srl.appendChild(lbl);
    res.forEach(function(cond){
      var item=mk("div","ci");
      var re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");
      var hl=esc(cond.name).replace(re,function(m){return"<mark>"+m+"</mark>"});
      var s=cond.stars,stars=s?"&#9733;".repeat(s):"";
      item.innerHTML='<span class="cn">'+hl+'</span>'+(s?'<span class="st st'+s+'">'+stars+'</span>':"")+'<span class="arr" style="font-size:14px">&#8250;</span>';
      (function(c){item.onclick=function(){curCat=c.category;curSub=c.subcategory;openCond(c)}})(cond);
      srl.appendChild(item);
    });
  }
  if(nav[nav.length-1]!=="srch")goto("srch");
}

function clearSrch(){g("sq").value="";g("scl").classList.remove("on");if(nav[nav.length-1]==="srch")goBack()}

g("sn").textContent=DB.length;
g("sc2").textContent=Object.keys(cats).length;
buildHome();
</script></body></html>
