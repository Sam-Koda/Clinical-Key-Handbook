lvis with contrast (triple phase): characterises renal mass (enhancement), staging (nodes, adrenal, renal vein, IVC involvement), detects metastases.\n\u2022 MRI abdomen: superior for IVC tumour thrombus characterisation.\n\u2022 FBC (polycythaemia --- paraneoplastic), UEC, LFTs, calcium (hypercalcaemia), LDH, urine cytology.\n\u2022 Bone scan/PET: if bone/systemic metastases suspected.\n\u2022 Percutaneous biopsy: for small renal masses (<3 cm) where active surveillance considered, or if metastatic disease (tissue diagnosis for systemic therapy); not needed before nephrectomy for classic enhancing masses.\n\u2022 TNM staging (Stage I--IV) + Fuhrman/ISUP grade."}},{"name":"Bladder Cancer","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Smoking (most important risk factor --- 50% of cases attributable; carcinogens excreted in urine).\n\u2022 Male sex (3:1), age >65 years.\n\u2022 Occupational exposure: aromatic amines, aniline dyes, benzidine (rubber, dye, textile, leather industries).\n\u2022 Cyclophosphamide (haemorrhagic cystitis \u2192 bladder cancer risk).\n\u2022 Chronic pelvic irradiation.\n\u2022 Chronic UTI, indwelling catheter (squamous cell carcinoma).\n\u2022 Lynch syndrome (MSI-H tumours --- urothelial cancer risk).","Symptoms (History)":"---","Treatment":"\u2022 NMIBC (low risk): TURBT alone (complete resection); surveillance cystoscopy.\n\u2022 NMIBC (intermediate/high risk): TURBT + intravesical chemotherapy (mitomycin C single dose perioperatively) or BCG (Bacillus Calmette-Gu\u00e9rin --- immunotherapy; 6-week induction course \u00b1 maintenance).\n\u2022 High-grade T1 or CIS refractory to BCG: consider radical cystectomy.\n\u2022 MIBC (T2--T4, N0, M0): neoadjuvant cisplatin-based chemotherapy (GC or MVAC) \u2192 radical cystectomy (gold standard --- ileal conduit or neobladder for urinary diversion).\n\u2022 Bladder-sparing trimodality therapy (TURBT + chemoradiation) for selected patients.\n\u2022 Metastatic disease: platinum-based chemotherapy (gemcitabine + cisplatin); maintenance avelumab (checkpoint inhibitor) after platinum response; pembrolizumab second-line; erdafitinib (FGFR-targeted --- FGFR2/3 alterations).\n\u2022 Cystoscopic surveillance (NMIBC): every 3 months \u00d7 2 years, then 6-monthly (high-risk).","Investigations":"\u2022 Urinalysis + urine cytology (3 samples): malignant cells --- high specificity for high-grade carcinoma/CIS.\n\u2022 Flexible cystoscopy: gold standard --- visualises lesion, guides biopsy; outpatient procedure.\n\u2022 Transurethral resection of bladder tumour (TURBT): diagnostic and therapeutic; provides histological staging (depth of invasion --- detrusor muscle must be included in specimen).\n\u2022 CT urogram (CTU): assess upper tracts (urothelial tumours can occur anywhere --- ureter, renal pelvis); staging.\n\u2022 CT chest/abdomen/pelvis: systemic staging for MIBC.\n\u2022 MRI pelvis (mpMRI): superior soft tissue staging for MIBC; assess perivesical extension.\n\u2022 Urine FGFR mutation testing: for targeted therapy eligibility (erdafitinib)."}},{"name":"Benign Prostatic Hyperplasia (BPH)","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Age >50 years (strongest risk factor).\n\u2022 Intact testes and testosterone production (eunuchs do not develop BPH).\n\u2022 Family history (genetic predisposition).\n\u2022 Obesity, metabolic syndrome, physical inactivity.\n\u2022 Exacerbating factors: anticholinergic medications, alpha-agonists (decongestants), alcohol, caffeine.","Symptoms (History)":"---","Treatment":"\u2022 Watchful waiting (mild symptoms/IPSS <7): lifestyle modification --- reduce evening fluid intake, avoid bladder irritants (caffeine, alcohol), bladder training, address medications.\n\u2022 Alpha-blockers (moderate-to-severe symptoms): tamsulosin 0.4 mg daily, alfuzosin, silodosin --- relax smooth muscle in prostate and bladder neck; onset hours to days; first-line pharmacotherapy.\n\u2022 Side effects: postural hypotension, retrograde ejaculation.\n\u2022 5-alpha reductase inhibitors (5-ARIs): finasteride 5 mg or dutasteride 0.5 mg daily --- reduce prostate volume (\\~25% reduction over 6--12 months); indicated if large prostate (>40 g) or elevated PSA; prevent AUR and surgical need; onset months.\n\u2022 Side effects: erectile dysfunction, reduced libido, gynaecomastia.\n\u2022 Combination therapy (alpha-blocker + 5-ARI): superior for men with large prostate; prevents progression and AUR better than monotherapy.\n\u2022 Acute urinary retention: immediate IDC insertion (urethral); trial without catheter (TWOC) after 48--72 hours with alpha-blocker; if retention recurs --- surgical intervention.\n\u2022 Surgical --- indications (refractory symptoms, AUR, complications): TURP (transurethral resection of prostate) --- gold standard; HoLEP (holmium laser enucleation --- large prostates); laser vaporisation (GreenLight); UroLift (mechanical opening --- preserves ejaculation); Rezum (steam therapy --- minimally invasive); open/robotic simple prostatectomy (very large prostates >80--100 g).\n\u2022 Phosphodiesterase-5 inhibitor (tadalafil 5 mg daily): approved for LUTS associated with BPH --- especially with coexistent ED.","Investigations":"\u2022 IPSS questionnaire: severity scoring (mild 0--7, moderate 8--19, severe 20--35) and QoL impact --- guides treatment decisions.\n\u2022 PSA (prostate-specific antigen): not diagnostic for BPH; elevated in BPH (enlarged gland), prostatitis, and prostate cancer; informed consent before testing; used to exclude/risk-stratify for prostate cancer.\n\u2022 Urinalysis + MSU: exclude UTI, haematuria.\n\u2022 Post-void residual (PVR) volume: bladder ultrasound --- >150--200 mL indicates significant retention.\n\u2022 Uroflowmetry: peak flow rate (Qmax) <10 mL/sec suggests significant obstruction.\n\u2022 UEC: if significant obstruction suspected (obstructive uropathy \u2192 hydronephrosis \u2192 renal impairment).\n\u2022 Renal and bladder ultrasound: upper tract dilation (hydronephrosis), bladder wall trabeculation, diverticula, stone.\n\u2022 Urodynamics/cystoscopy: reserved for complex cases --- distinguishes obstruction from impaired detrusor contractility."}},{"name":"Prostate Cancer","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Age >50 years (risk increases sharply after 50; median diagnosis age \\~67 years in Australia).\n\u2022 Family history: first-degree relative --- 2\u00d7 risk; BRCA2 mutation --- significant increase (aggressive disease).\n\u2022 African ancestry (higher incidence and mortality globally).\n\u2022 High-fat, low-fibre diet.\n\u2022 Obesity (associated with aggressive disease).","Symptoms (History)":"---","Treatment":"\u2022 Active surveillance (AS): low-risk (GG1) and selected low-volume intermediate-risk (GG2) --- serial PSA, mpMRI, repeat biopsies (Protocol: 3-monthly PSA, annual MRI, biopsy at 1--2 years, then 3--5 yearly); avoids/delays treatment toxicity.\n\u2022 Radical prostatectomy (RP): open, laparoscopic, or robotic-assisted (RARP --- dominant approach in Australia); treats localised disease; complications --- erectile dysfunction (\\~30--80%), urinary incontinence (\\~5--15%).\n\u2022 External beam radiotherapy (EBRT) \u00b1 brachytherapy: equivalent to RP for low--intermediate risk; typically combined with ADT for high-risk disease (6 months to 3 years).\n\u2022 Androgen deprivation therapy (ADT): GnRH agonists (leuprolide, goserelin) or GnRH antagonists (degarelix, relugolix --- fewer cardiovascular events); lowers testosterone to castrate levels.\n\u2022 Side effects: hot flushes, osteoporosis, metabolic syndrome, cardiovascular risk, fatigue, loss of libido.\n\u2022 Metastatic hormone-sensitive prostate cancer (mHSPC): ADT + docetaxel OR ADT + novel androgen receptor-signalling inhibitor (ARSI --- enzalutamide, abiraterone, apalutamide, darolutamide) --- combination superior to ADT alone.\n\u2022 Castration-resistant prostate cancer (CRPC): enzalutamide, abiraterone (+ prednisolone), docetaxel, cabazitaxel, Ra-223 (bone metastases), PARP inhibitors (olaparib --- BRCA2-mutated), lutetium PSMA-617 (177Lu-PSMA --- approved in Australia, PBS-listed for mCRPC).\n\u2022 Bone health: zoledronic acid or denosumab to reduce skeletal-related events; calcium + vitamin D supplementation with ADT.","Investigations":"\u2022 PSA (prostate-specific antigen): elevated PSA (age-adjusted); PSA density, PSA velocity, PSA kinetics used for risk stratification.\n\u2022 PSA not specific --- elevated in BPH, prostatitis, post-ejaculation.\n\u2022 mpMRI prostate (multiparametric MRI): PI-RADS scoring (1--5); PI-RADS \u22653 --- suspicious; guides targeted biopsy.\n\u2022 Reduces unnecessary biopsies (Australian guidelines --- PCFA 2025).\n\u2022 Prostate biopsy (transperineal preferred for infection safety over TRUS biopsy in Australia): histological diagnosis; Gleason/ISUP grade; extent of disease.\n\u2022 Staging (if intermediate/high-risk): CT chest/abdomen/pelvis; bone scan (for bone metastases); PSMA PET-CT (prostate-specific membrane antigen --- superior to conventional imaging for staging and biochemical recurrence --- now widely available in Australia, Medicare-funded).\n\u2022 Germline genetic testing: for BRCA1/2, ATM, PALB2 in men with metastatic/high-risk disease (family implications).\n\u2022 Risk stratification: low risk (PSA <10, GS \u22646, T1--T2a), intermediate risk, high risk (PSA >20 or GS 8--10 or T3a)."}},{"name":"Testicular Cancer","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Cryptorchidism (undescended testis) --- 3--5\u00d7 increased risk; bilateral in 25% of cases.\n\u2022 Prior testicular GCT (contralateral risk \\~2%).\n\u2022 Family history (first-degree relative).\n\u2022 Testicular dysgenesis syndrome.\n\u2022 White Caucasian ancestry.\n\u2022 Klinefelter syndrome (47,XXY) --- mediastinal GCT risk.","Symptoms (History)":"---","Treatment":"\u2022 Radical inguinal orchiectomy: all patients --- primary treatment, provides histological diagnosis.\n\u2022 Stage I Seminoma: surveillance (preferred --- \\~80% cured by orchiectomy alone, relapse treated effectively); OR adjuvant carboplatin (\u00d71 cycle) or radiotherapy (para-aortic) for high-risk features (>4 cm tumour, rete testis invasion).\n\u2022 Stage I NSGCT: surveillance (preferred for low-risk --- pT1, no LVI); OR BEP \u00d71 cycle; OR retroperitoneal lymph node dissection (RPLND) for high-risk (LVI positive --- pT2+).\n\u2022 Stage II--III Seminoma: BEP (bleomycin, etoposide, cisplatin) chemotherapy \u00d73--4 cycles based on IGCCCG risk (good/intermediate prognosis = 3 cycles; no poor prognosis category for seminoma).\n\u2022 Stage II--III NSGCT: BEP \u00d73--4 cycles; RPLND for residual retroperitoneal mass after chemotherapy (teratoma does not respond to further chemo --- excise).\n\u2022 Salvage chemotherapy (relapse): TIP (paclitaxel, ifosfamide, cisplatin) or VIP; high-dose chemotherapy with autologous stem cell rescue.\n\u2022 Overall cure rate: \\~95%; Stage I nearly 100%; Stage III good prognosis \\~90%; poor prognosis \\~50%.\n\u2022 Long-term follow-up: monitoring for relapse (tumour markers + CT imaging per surveillance protocol); cardiovascular risk (cisplatin/bleomycin late effects); secondary malignancy; hypogonadism; fertility.","Investigations":"\u2022 Scrotal ultrasound: first-line --- characterises lesion (solid intratesticular = GCT until proven otherwise); Doppler flow; \u00b1 contralateral testis.\n\u2022 Tumour markers (pre-operatively and post-operatively for staging):\n\u2022 AFP (alpha-fetoprotein): elevated in NSGCT (yolk sac, embryonal); NEVER elevated in pure seminoma --- if elevated with apparent seminoma, treat as NSGCT.\n\u2022 \u03b2-hCG (beta human chorionic gonadotrophin): elevated in choriocarcinoma; may be mildly elevated in seminoma.\n\u2022 LDH (lactate dehydrogenase): non-specific; correlates with tumour burden in seminoma.\n\u2022 Radical inguinal orchiectomy: definitive diagnostic AND initial therapeutic procedure --- do NOT perform trans-scrotal biopsy (disrupts lymphatic drainage \u2192 altered staging).\n\u2022 CT chest/abdomen/pelvis: staging --- retroperitoneal lymph nodes, lung metastases.\n\u2022 MRI brain: if high hCG, choriocarcinoma, or neurological symptoms.\n\u2022 Semen analysis + sperm banking: strongly recommended pre-treatment (chemotherapy/radiotherapy gonadotoxic)."}},{"name":"Testicular Torsion","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Age: bimodal --- neonates and pubertal males (12--18 years).\n\u2022 'Bell clapper' deformity (bilateral --- predisposes both testes).\n\u2022 Previous episode of torsion (intermittent torsion).\n\u2022 Trauma may precipitate but often occurs at rest or during sleep.\n\u2022 Cold temperature (cremasteric reflex --- may precipitate).","Symptoms (History)":"---","Treatment":"\u2022 URGENT SURGICAL EXPLORATION: bilateral scrotal exploration via midline or bilateral scrotal incision.\n\u2022 Detorsion: untwist the affected testis --- colour change (reperfusion) indicates viability.\n\u2022 If viable: bilateral orchidopexy (suture both testes to tunica albuginea/dartos with non-absorbable sutures --- 3-point fixation) --- contralateral side ALWAYS fixed.\n\u2022 If non-viable (necrotic): orchidectomy (orchiectomy) + contralateral orchidopexy.\n\u2022 Manual detorsion (bedside): can attempt while awaiting theatre --- rotate testis outward ('opening a book') --- may partially relieve torsion and improve viability.\n\u2022 Should NOT delay surgery.\n\u2022 Post-operative: analgesia, scrotal support, antibiotic prophylaxis per surgical protocol.\n\u2022 Counsel patient: risk of subfertility (antisperm antibodies, reduced contralateral function); prosthetic testicle offered after orchiectomy.","Investigations":"\u2022 DO NOT delay surgery to obtain imaging if clinical diagnosis is torsion --- time is testicle.\n\u2022 Scrotal Doppler ultrasound: reduced or absent blood flow to affected testis (sensitivity \\~88--96%); increased flow suggests epididymo-orchitis.\n\u2022 If unavailable or uncertain --- proceed to surgical exploration.\n\u2022 Urinalysis: typically normal in torsion (cf. epididymo-orchitis --- may show pyuria).\n\u2022 FBC, CRP: may be normal early.\n\u2022 Time window for salvage: <6 hours --- \\~100% salvage rate; 6--12 hours --- \\~70%; 12--24 hours --- \\~20%; >24 hours --- <10%."}},{"name":"Epididymo-orchitis","stars":0,"category":"Neurological & Renal/Genitourinary Conditions","subcategory":"Renal / Genitourinary Conditions","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Sexual activity with new/multiple partners (STI-related).\n\u2022 Urological instrumentation or surgery.\n\u2022 BPH (urinary stasis \u2192 enteric organisms).\n\u2022 Unvaccinated for mumps.\n\u2022 Structural urinary tract abnormality.","Symptoms (History)":"---","Treatment":"\u2022 STI-related (age <35 years or STI risk): ceftriaxone 500 mg IM stat (gonococcal) + doxycycline 100 mg BD \u00d7 10--14 days (chlamydial) --- per Australian STI guidelines (ASHM/STIGMA).\n\u2022 Enteric/UTI-related (age >35 years): cefalexin 500 mg QID \u00d7 10--14 days OR ciprofloxacin 500 mg BD \u00d7 10 days (if Gram-negative, guided by culture).\n\u2022 Supportive: scrotal elevation (jockstrap/athletic support), NSAIDs (ibuprofen), ice packs, analgesia.\n\u2022 Mumps orchitis: supportive only (no antiviral); analgesia, scrotal support.\n\u2022 Contact tracing and treatment of sexual partners (STI-related).\n\u2022 Complications: abscess (incision and drainage), testicular infarction (very rare), chronic epididymitis, subfertility, testicular atrophy (mumps).\n\u2022 If diagnosis uncertain --- surgical exploration to exclude torsion (never delay if torsion cannot be confidently excluded clinically).","Investigations":"\u2022 Scrotal Doppler ultrasound: increased blood flow to epididymis/testis (hypervascular --- cf. decreased in torsion); confirms epididymo-orchitis, excludes torsion.\n\u2022 Urinalysis + MSU MC&S: pyuria and bacteriuria (enteric cause).\n\u2022 Urethral swab or first-void urine NAAT (nucleic acid amplification test): for C. trachomatis and N. gonorrhoeae --- mandatory in sexually active males <35 years.\n\u2022 FBC, CRP: inflammatory markers elevated.\n\u2022 Consider: mumps serology (IgM/IgG), scrotal ultrasound to exclude abscess (complication).\n\u2022 STI screen: HIV, syphilis, hepatitis B/C in sexually active patients."}},{"name":"Pituitary and Adrenal Disorders","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Endocrine Conditions","sections":{}},{"name":"Diabetes Mellitus","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Endocrine Conditions","sections":{}},{"name":"Thyroid Disorders (Hyperthyroidism / Hypothyroidism)","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Endocrine Conditions","sections":{}},{"name":"Obesity","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Endocrine Conditions","sections":{}},{"name":"Osteoporosis","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Endocrine Conditions","sections":{}},{"name":"Calcium Disorders (Hypercalcaemia / Hypocalcaemia)","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Endocrine Conditions","sections":{}},{"name":"Hyperlipidaemia","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Endocrine Conditions","sections":{}},{"name":"Thyroid Cancer","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Endocrine Conditions","sections":{}},{"name":"Benign Thyroid Masses (Goitre, Nodules)","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Endocrine Conditions","sections":{}},{"name":"Pyrexia of Unknown Origin (PUO)","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Infectious Diseases","sections":{}},{"name":"Returned Traveller Illness","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Infectious Diseases","sections":{}},{"name":"Sexually Transmitted Infections (STIs)","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Infectious Diseases","sections":{}},{"name":"Infective Endocarditis","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Infectious Diseases","sections":{}},{"name":"Bone and Joint Infections (Osteomyelitis / Septic Arthritis)","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Infectious Diseases","sections":{}},{"name":"Gastroenteritis (including C. difficile)","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Infectious Diseases","sections":{}},{"name":"Urinary Tract Infection (UTI)","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Infectious Diseases","sections":{}},{"name":"Human Immunodeficiency Virus (HIV)","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Infectious Diseases","sections":{}},{"name":"Zoonotic Infections","stars":0,"category":"Endocrine & Infectious Disease Conditions","subcategory":"Infectious Diseases","sections":{}},{"name":"Transfusion Reactions","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Prior transfusions or pregnancies (alloimmunisation)\n\u2022 IgA deficiency (anaphylaxis risk)\n\u2022 Cardiac/renal impairment (TACO risk)\n\u2022 Immunocompromise (TTBI risk)\n\u2022 Clerical errors in patient identification (AHTR risk)","Symptoms (History)":"---","Treatment":"\u2022 STOP transfusion immediately for all moderate--severe reactions\n\u2022 FNHTR: paracetamol; may cautiously recommence if symptoms settle\n\u2022 AHTR: aggressive IV fluids, maintain urine output >1 mL/kg/hr, ICU support\n\u2022 TRALI: supportive O2/ventilation; avoid diuretics\n\u2022 TACO: sit upright, O2, IV frusemide\n\u2022 Anaphylaxis: adrenaline IMI; allergic reaction: antihistamine \u00b1 corticosteroid\n\u2022 TTBI: broad-spectrum IV antibiotics, haemodynamic support","Investigations":"\u2022 STOP transfusion immediately; maintain IV access with new line\n\u2022 Repeat blood group and crossmatch on pre- and post-transfusion samples\n\u2022 FBC, haemolysis screen (LDH, bilirubin, haptoglobin), urinalysis\n\u2022 Blood cultures (patient and pack) for TTBI\n\u2022 CXR for TRALI/TACO; DIC screen (aPTT, PT, fibrinogen, D-dimer) if severe\n\u2022 Serial tryptase, IgA \u00b1 IgA antibodies for anaphylaxis"}},{"name":"Oncologic Emergencies","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Haematological malignancies (TLS, febrile neutropenia)\n\u2022 Lung, breast, renal, prostate, myeloma (spinal/hypercalcaemia)\n\u2022 Lymphoma, lung cancer, thymoma (SVC syndrome)\n\u2022 Bulky disease before or during treatment (TLS)","Symptoms (History)":"---","Treatment":"\u2022 Spinal cord compression: dexamethasone 16mg IV immediately; urgent neurosurgery/radiotherapy referral\n\u2022 SVC syndrome: elevate head, corticosteroids, oncology/stenting referral; thrombosis \u2192 anticoagulation\n\u2022 Hypercalcaemia: aggressive IV Normal Saline, IV bisphosphonate (pamidronate or zoledronic acid)\n\u2022 TLS: aggressive IV hydration, allopurinol (or rasburicase for high risk), treat hyperkalaemia\n\u2022 Febrile neutropenia: IV piperacillin-tazobactam 4.5g 6-hourly within 1 hour (or cefepime); add gentamicin if septic shock","Investigations":"\u2022 Spinal cord compression: urgent MRI whole spine\n\u2022 SVC syndrome: CT chest with contrast\n\u2022 Hypercalcaemia: serum calcium (corrected for albumin), PTHrP, FBC, renal function\n\u2022 TLS: electrolytes (K+, PO4, Ca2+), uric acid, creatinine, LDH, FBC\n\u2022 Febrile neutropenia: FBC, blood cultures (peripheral + central), CXR, midstream urine"}},{"name":"Cytopaenias (Anaemia, Neutropenia, Thrombocytopenia)","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Chemotherapy or immunosuppressive therapy (all three)\n\u2022 Nutritional deficiency --- vegetarian/vegan diet, malabsorption (anaemia)\n\u2022 Autoimmune conditions (ITP, haemolytic anaemia)\n\u2022 Haematological malignancy, hypersplenism\n\u2022 Heparin use (HIT)","Symptoms (History)":"---","Treatment":"\u2022 Anaemia: treat underlying cause; oral iron (ferrous sulphate 300mg BD--TDS) for IDA; IM/IV hydroxocobalamin for B12 deficiency; RBC transfusion for severe/symptomatic anaemia\n\u2022 Neutropenia: G-CSF (filgrastim) post-chemotherapy; treat febrile neutropenia with prompt IV antibiotics\n\u2022 ITP: prednisolone 1mg/kg/day; IVIG for rapid platelet increase; TPO-receptor agonists (eltrombopag) second-line; splenectomy third-line\n\u2022 HIT: cease all heparin immediately; anticoagulate with argatroban or fondaparinux\n\u2022 Platelet transfusion: <10\u00d710\u2079/L (prophylactic), <50\u00d710\u2079/L (pre-procedure/active bleeding)","Investigations":"\u2022 FBC with differential and reticulocyte count (all three)\n\u2022 Anaemia: iron studies (serum ferritin, transferrin saturation), B12/folate, blood film, LDH, haptoglobin (haemolysis)\n\u2022 Neutropenia: blood cultures if febrile; bone marrow biopsy if unexplained\n\u2022 Thrombocytopaenia: blood film (exclude pseudothrombocytopenia), coagulation screen (DIC), HIT antibodies if on heparin\n\u2022 Bone marrow biopsy if pancytopaenia or malignancy suspected"}},{"name":"Coagulation Disorders","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Family history (haemophilia, vWD)\n\u2022 Male sex (haemophilia)\n\u2022 Sepsis, massive trauma, obstetric complications, advanced malignancy (DIC)\n\u2022 Liver disease, malnutrition, anticoagulant use\n\u2022 Asian descent: HLA-B\\*5801 allele increases allopurinol hypersensitivity (unrelated but common exam context)","Symptoms (History)":"---","Treatment":"\u2022 Haemophilia A: recombinant Factor VIII concentrate; desmopressin (DDAVP) for mild-moderate\n\u2022 Haemophilia B: recombinant Factor IX concentrate\n\u2022 vWD: DDAVP (type 1); vWF/Factor VIII concentrate; tranexamic acid for mucosal bleeding\n\u2022 DIC: treat underlying cause (antibiotics for sepsis, deliver fetus); replace with FFP, cryoprecipitate, platelets as guided by labs\n\u2022 Warfarin reversal: vitamin K IV; 4-factor PCC (Beriplex) for urgent reversal; FFP if PCC unavailable","Investigations":"\u2022 FBC (thrombocytopenia in DIC), blood film\n\u2022 Coagulation screen: PT, aPTT, fibrinogen, D-dimer\n\u2022 Haemophilia: prolonged aPTT, reduced Factor VIII or IX level\n\u2022 vWD: vWF antigen, vWF activity (ristocetin cofactor), Factor VIII level, PFA-100\n\u2022 DIC: elevated PT/aPTT, low fibrinogen, elevated D-dimer, thrombocytopenia"}},{"name":"Chemotherapy Complications","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Intensity of chemotherapy regimen and cumulative dose\n\u2022 Age >65 years, poor performance status\n\u2022 Pre-existing comorbidities (renal/cardiac impairment)\n\u2022 Prior chemotherapy or radiotherapy\n\u2022 Mucositis risk: methotrexate, 5-FU, anthracyclines","Symptoms (History)":"---","Treatment":"\u2022 Febrile neutropenia: IV piperacillin-tazobactam 4.5g 6-hourly within 1 hour (add gentamicin for septic shock); G-CSF prophylaxis in high-risk regimens\n\u2022 Nausea/vomiting: ondansetron + dexamethasone + aprepitant (NK1 antagonist) for highly emetogenic regimens\n\u2022 Mucositis: oral hygiene, chlorhexidine rinses, topical analgesics (lignocaine gel), palifermin for high-risk\n\u2022 Peripheral neuropathy: dose reduction or cessation; duloxetine for pain management\n\u2022 Cyclophosphamide cystitis prevention: MESNA (uroprotective), aggressive hydration","Investigations":"\u2022 FBC, differential and CRP urgently for all febrile post-chemotherapy patients\n\u2022 Blood cultures: \u00d72 peripheral, \u00d71 per CVC lumen before antibiotics\n\u2022 CXR, urinalysis, midstream urine culture\n\u2022 Echocardiogram (anthracycline-related cardiomyopathy)\n\u2022 LFTs, renal function, electrolytes"}},{"name":"Common Solid Tumours","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Smoking (lung, CRC, bladder, pancreas)\n\u2022 Family history and genetic mutations (BRCA, Lynch, FAP)\n\u2022 Obesity, red/processed meat, low fibre diet (CRC)\n\u2022 Age, male sex, African descent (prostate cancer)\n\u2022 Alcohol, HRT use (breast cancer)","Symptoms (History)":"---","Treatment":"\u2022 Breast: surgery (lumpectomy/mastectomy \u00b1 sentinel lymph node biopsy) + radiotherapy; hormonal therapy (tamoxifen, aromatase inhibitors); trastuzumab (HER2+); chemotherapy for triple-negative\n\u2022 CRC: surgical resection (hemicolectomy/anterior resection); adjuvant FOLFOX chemotherapy for Stage III; bevacizumab/cetuximab for metastatic disease\n\u2022 Lung: NSCLC: surgical resection if operable; targeted therapy (erlotinib for EGFR+, crizotinib for ALK+); immunotherapy (pembrolizumab for high PD-L1); SCLC: cisplatin/etoposide + radiotherapy\n\u2022 Prostate: active surveillance (low-risk); radical prostatectomy or external beam RT \u00b1 brachytherapy; androgen deprivation therapy (ADT) for advanced disease\n\u2022 Pancreas: Whipple's procedure (pancreaticoduodenectomy) if resectable; gemcitabine/nab-paclitaxel; majority palliative at diagnosis","Investigations":"\u2022 Breast: bilateral mammogram + USS; core biopsy; receptor status (ER, PR, HER2); staging CT/bone scan\n\u2022 CRC: colonoscopy with biopsy; CEA; staging CT chest/abdomen/pelvis\n\u2022 Lung: CT chest; PET scan; bronchoscopy \u00b1 CT-guided biopsy; EGFR/ALK/PD-L1 mutation testing\n\u2022 Prostate: PSA; MRI prostate; TRUS-guided biopsy; Gleason score; bone scan if PSA >20\n\u2022 Pancreas: CT pancreas protocol; CA 19-9; MRCP/EUS; staging"}},{"name":"Haematological Malignancy","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Prior chemotherapy or radiotherapy (secondary AML)\n\u2022 Down syndrome, Fanconi anaemia (ALL/AML)\n\u2022 EBV infection (HL, Burkitt lymphoma)\n\u2022 Immunosuppression, HIV (NHL)\n\u2022 Age >60 (AML, CLL, MM), age 20s (HL)","Symptoms (History)":"---","Treatment":"\u2022 AML: induction chemotherapy (cytarabine + anthracycline '7+3'); allogeneic stem cell transplant for high-risk\n\u2022 ALL: multi-agent induction \u2192 consolidation \u2192 maintenance (2--3 years); TKI (imatinib) for Ph+ ALL; CNS prophylaxis (intrathecal methotrexate)\n\u2022 CLL: watch and wait for early stage; ibrutinib (BTK inhibitor) or venetoclax + obinutuzumab for treatment-requiring disease\n\u2022 HL: ABVD (doxorubicin, bleomycin, vinblastine, dacarbazine) + radiotherapy; excellent prognosis\n\u2022 NHL: DLBCL: R-CHOP (rituximab + cyclophosphamide, doxorubicin, vincristine, prednisolone)\n\u2022 MM: proteasome inhibitors (bortezomib) + immunomodulatory agents (lenalidomide) + dexamethasone; autologous stem cell transplant; bisphosphonates for bone disease","Investigations":"\u2022 FBC, blood film (blast cells, atypical lymphocytes), LDH, uric acid\n\u2022 Bone marrow biopsy with immunophenotyping, cytogenetics (FISH) and molecular studies\n\u2022 Immunoglobulins, serum protein electrophoresis (paraprotein/M-band), urine Bence-Jones protein (MM)\n\u2022 CT chest/abdomen/pelvis for staging; PET scan (HL, DLBCL)\n\u2022 Lymph node biopsy for histological diagnosis of lymphoma"}},{"name":"Venous Thromboembolism (DVT / PE)","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Recent surgery (especially orthopaedic hip/knee, abdominal/pelvic)\n\u2022 Prolonged immobility, hospitalisation, long-haul flight\n\u2022 Active malignancy (4--7\u00d7 increased risk)\n\u2022 Pregnancy and puerperium; combined oral contraceptive pill; HRT\n\u2022 Personal/family history of VTE; thrombophilia\n\u2022 Obesity (BMI >30), age >60, dehydration","Symptoms (History)":"---","Treatment":"\u2022 Anticoagulation: DOACs (rivaroxaban or apixaban) first-line for most patients --- no INR monitoring required; therapeutic anticoagulation for minimum 3 months\n\u2022 Provoked VTE (reversible risk factor): 3 months anticoagulation; unprovoked: consider indefinite anticoagulation after risk/benefit discussion\n\u2022 Active cancer-associated VTE: LMWH (enoxaparin) or DOACs (rivaroxaban/apixaban) preferred\n\u2022 Massive PE with haemodynamic compromise: systemic thrombolysis (alteplase) if no contraindication; surgical embolectomy or catheter-directed thrombolysis if thrombolysis contraindicated\n\u2022 Inpatient VTE prophylaxis: risk assessment for all admissions per ACSQHC guidelines; pharmacological (enoxaparin) + mechanical (TED stockings/pneumatic compression devices)\n\u2022 Pregnancy: LMWH (enoxaparin) --- warfarin and DOACs contraindicated","Investigations":"\u2022 Wells score to stratify pre-test probability for DVT and PE\n\u2022 D-dimer: high sensitivity, low specificity; useful to rule out VTE if Wells score low; not useful if pre-test probability high\n\u2022 Doppler ultrasound: first-line imaging for DVT\n\u2022 CT Pulmonary Angiography (CTPA): gold standard for PE diagnosis\n\u2022 ECG: sinus tachycardia most common; S1Q3T3 pattern and right bundle branch block in large PE\n\u2022 ABG: hypoxaemia, hypocapnia; troponin + BNP for risk stratification of PE\n\u2022 Echocardiogram: right ventricular strain in massive PE; bedside TTE if haemodynamically unstable"}},{"name":"Hospital-Acquired Infections","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Invasive devices (IDC, CVC, ventilator, surgical drains)\n\u2022 Immunosuppression (chemotherapy, corticosteroids, diabetes)\n\u2022 Prolonged hospitalisation and antibiotic exposure\n\u2022 Recent surgery (SSI); prior antibiotic use (C. diff)\n\u2022 Elderly patients, poor hand hygiene compliance by staff\n\u2022 Overcrowding, shared bays","Symptoms (History)":"---","Treatment":"\u2022 CAUTI: remove or replace catheter; oral trimethoprim or nitrofurantoin (uncomplicated); IV antibiotics (piperacillin-tazobactam or ceftriaxone) if systemic sepsis\n\u2022 CLABSI: remove CVC if possible; empirical IV antibiotics (vancomycin to cover MRSA + antipseudomonal cover); target based on cultures\n\u2022 SSI: superficial: wound opening + dressing; moderate: oral flucloxacillin (MSSA); MRSA: trimethoprim/sulfamethoxazole or vancomycin; deep: surgical debridement\n\u2022 C. diff: cease precipitating antibiotic; oral vancomycin 125mg QID for 10 days (first-line); fidaxomicin for recurrence; metronidazole alternative in mild disease; faecal microbiota transplant (FMT) for recurrent C. diff\n\u2022 Prevention: hand hygiene (5 moments --- NHMRC standard); ANTT for IDC/CVC insertion; antibiotic stewardship; contact precautions (C. diff/MRSA); daily review of device necessity","Investigations":"\u2022 FBC (leucocytosis), CRP, blood cultures (before antibiotics) for all suspected HAI\n\u2022 CAUTI: urinalysis + MC&S from catheter sample; treat only if symptomatic\n\u2022 CLABSI: paired peripheral and CVC blood cultures; CVC site swab\n\u2022 SSI: wound swab; CT if deep space infection suspected\n\u2022 C. diff: stool PCR for C. difficile toxin A/B (preferred over EIA)\n\u2022 CXR and sputum cultures for VAP; BAL if ventilated"}},{"name":"Anaemia","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Menstruating women, pregnancy (IDA)\n\u2022 Vegan/vegetarian diet, strict or elderly (B12/folate deficiency)\n\u2022 Coeliac disease, inflammatory bowel disease, bariatric surgery (IDA, B12)\n\u2022 Alcohol use disorder (folate, iron, B12)\n\u2022 Chronic kidney disease, heart failure, rheumatoid arthritis (ACD)\n\u2022 Family history (thalassaemia, sickle cell, spherocytosis)","Symptoms (History)":"---","Treatment":"\u2022 IDA: iron replacement --- ferrous sulphate 300mg BD--TDS (with vitamin C for absorption); IV iron (ferric carboxymaltose) if oral intolerant, malabsorption, or urgent; identify and treat underlying source (colonoscopy if GI blood loss in adults \u226550)\n\u2022 B12 deficiency: IM hydroxocobalamin 1mg alternate days \u00d7 6 doses, then every 3 months lifelong (pernicious anaemia); oral high-dose cyanocobalamin 1000mcg/day if dietary cause\n\u2022 Folate deficiency: folic acid 5mg/day orally; ensure B12 not deficient first (risk of precipitating subacute combined degeneration)\n\u2022 ACD: treat underlying disease; erythropoiesis-stimulating agents (EPO) in CKD; IV iron in heart failure/IBD\n\u2022 AIHA (warm): prednisolone 1mg/kg/day; rituximab or splenectomy second-line\n\u2022 RBC transfusion: Hb <70g/L in stable patients (restrictive transfusion threshold, AABB/ANZSBT guidelines); <80g/L with cardiac disease; single unit, then reassess","Investigations":"\u2022 FBC: Hb level; MCV (microcytic <80fL, normocytic 80--100fL, macrocytic >100fL), reticulocyte count\n\u2022 Blood film: target cells (liver disease, thalassaemia), spherocytes (AIHA, hereditary spherocytosis), hypersegmented neutrophils (megaloblastic), sickle cells\n\u2022 Iron studies: serum ferritin (low in IDA, high in ACD/haemochromatosis), transferrin saturation, serum iron\n\u2022 B12 and folate levels; homocysteine and methylmalonic acid if borderline\n\u2022 Haemolysis screen: LDH (elevated), bilirubin (elevated unconjugated), haptoglobin (low), urinary haemosiderin, DAT (Coombs test)\n\u2022 Bone marrow biopsy: for unexplained anaemia, suspected aplasia, or haematological malignancy"}},{"name":"Radiation Oncology (Complications of Radiotherapy)","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Haematology & Oncology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 High total dose and large fraction size\n\u2022 Concurrent chemotherapy (radiosensitisation)\n\u2022 Prior radiotherapy to same region\n\u2022 Smoking, diabetes, vascular disease (impaired healing)\n\u2022 Age extremes; genetic radiosensitivity syndromes (ataxia-telangiectasia)","Symptoms (History)":"---","Treatment":"\u2022 Radiation dermatitis: aqueous cream, barrier dressings; silver sulfadiazine for moist desquamation\n\u2022 Mucositis: frequent oral rinses, topical lignocaine gel, adequate analgesia, nutritional support\n\u2022 Xerostomia: pilocarpine, saliva substitutes, meticulous dental care with fluoride varnish\n\u2022 Radiation pneumonitis: oral prednisolone 1mg/kg/day, tapering over 4--6 weeks\n\u2022 Radiation proctitis: sucralfate enemas, metronidazole, topical budesonide; refractory: hyperbaric oxygen or argon plasma coagulation\n\u2022 Osteoradionecrosis: conservative (antibiotics, chlorhexidine rinse, pentoxifylline + vitamin E); severe: hyperbaric oxygen, surgical debridement","Investigations":"\u2022 Radiation pneumonitis: CXR (ground-glass opacity), HRCT, PFTs\n\u2022 Osteoradionecrosis: OPG or CT mandible; rule out recurrent malignancy\n\u2022 Bowel/bladder complications: cystoscopy, colonoscopy, cross-sectional imaging\n\u2022 Hypothyroidism (post-neck RT): TFTs 6-monthly"}},{"name":"Spondyloarthropathies","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Rheumatology & Immunology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 HLA-B27 positivity (present in \\~90% AS, \\~70% reactive arthritis)\n\u2022 Male sex and age 20--40 (AS)\n\u2022 Prior GI/STI infection (reactive arthritis)\n\u2022 Personal or family history of psoriasis (PsA)\n\u2022 IBD history","Symptoms (History)":"---","Treatment":"\u2022 NSAIDs (naproxen, diclofenac) first-line for axial disease; physiotherapy essential\n\u2022 DMARDs (methotrexate, sulfasalazine) for peripheral arthritis\n\u2022 Biologic agents: TNF-alpha inhibitors (adalimumab, etanercept) for NSAID-refractory axial disease; IL-17 inhibitors (secukinumab) as alternative\n\u2022 Reactive arthritis: treat underlying infection; NSAIDs; most self-limiting","Investigations":"\u2022 FBC, ESR, CRP (elevated in active disease)\n\u2022 HLA-B27 (positive in AS, reactive arthritis); RF and ANA negative\n\u2022 X-ray pelvis: sacroiliitis (bilateral in AS, asymmetric in reactive/PsA); spine: 'bamboo spine' (late AS)\n\u2022 MRI sacroiliac joints: more sensitive than X-ray for early disease"}},{"name":"Connective Tissue Diseases","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Rheumatology & Immunology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Female sex, reproductive age (SLE predominantly affects women 9:1 F:M)\n\u2022 Indigenous Australian, Asian, African Caribbean descent (SLE)\n\u2022 UV light exposure (SLE flares)\n\u2022 Drug-induced lupus: hydralazine, procainamide, isoniazid\n\u2022 Malignancy association with dermatomyositis (especially ovarian, lung, breast cancer)","Symptoms (History)":"---","Treatment":"\u2022 SLE: hydroxychloroquine (baseline --- all patients); NSAIDs/corticosteroids for mild-moderate disease; azathioprine/mycophenolate for steroid-sparing; cyclophosphamide/belimumab for severe/renal lupus; sun protection\n\u2022 Sj\u00f6gren's: artificial tears, saliva substitutes, regular dental review; pilocarpine for severe sicca; hydroxychloroquine for systemic features\n\u2022 Systemic sclerosis: Raynaud's --- CCBs (nifedipine), sildenafil; ILD --- mycophenolate or nintedanib; PAH --- endothelin antagonists (bosentan), sildenafil; scleroderma renal crisis --- ACE inhibitor urgently\n\u2022 Dermatomyositis: high-dose prednisolone; methotrexate/azathioprine steroid-sparing; IVIG for refractory; screen for underlying malignancy","Investigations":"\u2022 ANA: positive in SLE (95%), Sj\u00f6gren's, systemic sclerosis, MCTD --- sensitive but not specific\n\u2022 SLE-specific: anti-dsDNA (disease activity), anti-Sm; complement C3/C4 (low in active disease); urinalysis (casts, proteinuria)\n\u2022 Sj\u00f6gren's: anti-Ro/SSA, anti-La/SSB; Schirmer's test; lip biopsy (focal lymphocytic sialadenitis)\n\u2022 Systemic sclerosis: anti-centromere (limited), anti-Scl-70 (diffuse); PFTs, HRCT (ILD), echocardiogram (PAH), ECG\n\u2022 Myositis: CK (elevated), anti-Jo-1, EMG, MRI muscles, muscle biopsy"}},{"name":"Gout","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Rheumatology & Immunology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Male sex >40 years, post-menopausal women (oestrogen is uricosuric)\n\u2022 Purine-rich diet: red meat, offal, shellfish, beer\n\u2022 Fructose-containing drinks (soft drinks, fruit juice)\n\u2022 Diuretics (thiazide, frusemide), ciclosporin, low-dose aspirin\n\u2022 CKD, dehydration, metabolic syndrome (hypertension, dyslipidaemia, obesity, diabetes)","Symptoms (History)":"---","Treatment":"\u2022 Acute flare: NSAIDs (indomethacin 50mg TDS or naproxen 500mg BD) first-line if no contraindications; alternatively colchicine 1mg then 0.5mg 1 hour later; or oral prednisolone 30--40mg/day \u00d7 5 days if NSAIDs/colchicine contraindicated\n\u2022 Do NOT start or stop allopurinol during acute attack (can prolong flare); if already on allopurinol, continue\n\u2022 Urate-lowering therapy (ULT) indication: \u22652 flares/year, tophi, urate nephrolithiasis, CKD stage \u22652\n\u2022 Allopurinol: start low (100mg/day) and slowly titrate to target serum urate <0.36mmol/L (no tophi) or <0.30mmol/L (tophi); test HLA-B\\*5801 in patients of Asian descent before starting\n\u2022 Prophylactic anti-inflammatory co-therapy when initiating ULT: colchicine 0.5mg daily or low-dose naproxen for minimum 6 months to prevent flares\n\u2022 Lifestyle: reduce alcohol (especially beer), reduce purine-rich foods, increase fluid intake, treat metabolic syndrome; switch thiazides to alternative antihypertensive","Investigations":"\u2022 Serum urate: may be normal or low during acute flare (inflammatory response lowers urate); check 2--4 weeks after resolution\n\u2022 Synovial fluid aspiration: definitive diagnosis --- polarised light microscopy shows negatively birefringent needle-shaped MSU crystals\n\u2022 FBC, CRP, ESR (elevated in acute flare); renal function, eGFR, LFTs\n\u2022 X-ray: 'punched-out' erosions with overhanging edges (late, tophaceous disease); USS or dual-energy CT for crystal deposits\n\u2022 Exclude septic arthritis if fever + monoarthritis (joint aspirate: WBC >50,000 suggests septic arthritis)"}},{"name":"Anaphylaxis","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Rheumatology & Immunology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Personal or family history of atopy (asthma, eczema, allergic rhinitis)\n\u2022 Prior anaphylaxis (increased reaction severity on re-exposure)\n\u2022 Asthma (risk factor for fatal anaphylaxis)\n\u2022 Mastocytosis\n\u2022 Beta-blocker use (may mask adrenaline response and worsen reaction)\n\u2022 Age: children --- food-triggered; adults --- insect sting and medication-triggered","Symptoms (History)":"---","Treatment":"\u2022 1st line: adrenaline (epinephrine) 0.01mg/kg IM (max 0.5mg adult) of 1:1000 concentration into outer mid-thigh; repeat every 5 minutes if inadequate response (ASCIA guidelines 2024)\n\u2022 Position: lie flat with legs elevated (if hypotensive); sitting up if respiratory compromise; left lateral if pregnant\n\u2022 Call for help; activate emergency response; O2 high-flow, IV access\n\u2022 IV fluid bolus (Normal Saline 20mL/kg) for hypotension/shock\n\u2022 Antihistamine (promethazine or chlorpheniramine) and corticosteroid (hydrocortisone 200mg IV or prednisolone 50mg oral) as adjuncts --- NOT first line, do not delay adrenaline\n\u2022 Salbutamol 8 puffs via spacer or nebulised 5mg for persistent bronchospasm\n\u2022 Observe minimum 4 hours post-resolution (6--8 hours if biphasic risk); prescribe adrenaline autoinjector (EpiPen 0.3mg adult; Anapen; Jext) on discharge with ASCIA Action Plan","Investigations":"\u2022 Anaphylaxis is a CLINICAL diagnosis --- do not delay treatment for investigations\n\u2022 Serum tryptase: collect at 1--2 hours and 24 hours post-reaction; elevated confirms mast cell degranulation (>11.4mcg/L or >2x baseline + 1.2mcg/L)\n\u2022 Full allergen workup (outpatient): skin prick testing, specific IgE RAST testing after 4--6 weeks\n\u2022 ECG if cardiovascular compromise; FBC, UEC if required"}},{"name":"Osteoarthritis","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Rheumatology & Immunology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Age >45 years (strongest risk factor); female sex (especially knee and hand OA post-menopause)\n\u2022 Obesity (knee OA: 4--5\u00d7 increased risk per BMI unit above normal)\n\u2022 Prior joint injury or surgery (meniscectomy, ACL injury)\n\u2022 Repetitive occupational stress (kneeling, squatting, heavy lifting)\n\u2022 Genetic predisposition (family history); muscle weakness; malalignment (varus/valgus knee)","Symptoms (History)":"---","Treatment":"\u2022 Non-pharmacological (first-line, most effective): therapeutic exercise (quadriceps strengthening, aerobic exercise) --- strongest evidence; weight loss (5--10% body weight significantly reduces symptoms); patient education and self-management; physiotherapy; walking aids if appropriate\n\u2022 Pharmacological: topical NSAIDs (first-line for knee --- diclofenac gel, good evidence, fewer GI side effects); oral NSAIDs (add PPI if >65 years or high GI risk) --- ibuprofen or naproxen\n\u2022 Paracetamol: modest benefit for mild-moderate pain; limited long-term evidence\n\u2022 Intra-articular corticosteroid injection: short-term relief for knee with effusion; not for hip without imaging guidance\n\u2022 Duloxetine: for patients with moderate-severe knee pain when NSAIDs insufficient or contraindicated\n\u2022 Surgical referral: total knee/hip arthroplasty for severe symptoms with failed non-surgical management; realistic expectations counselling; BMI optimisation pre-surgery","Investigations":"\u2022 OA is a CLINICAL diagnosis --- diagnosis can be made on history and examination alone (ACSQHC 2024 guideline)\n\u2022 X-ray: not required for diagnosis but may assist if atypical features; shows joint space narrowing, subchondral sclerosis, osteophytes, cysts\n\u2022 MRI: not routinely indicated; use only if diagnosis uncertain or to plan surgery\n\u2022 Bloods (FBC, ESR, CRP, RF, urate): normal in OA --- order only to exclude inflammatory arthritis\n\u2022 Aspiration of effusion: if septic arthritis or crystal arthropathy suspected"}},{"name":"Rheumatoid Arthritis","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Rheumatology & Immunology","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Female sex (3:1 F:M in reproductive years); sex difference narrows after menopause\n\u2022 Age 40--60 years peak onset\n\u2022 Smoking (strongest modifiable risk factor; doubles risk)\n\u2022 Family history\n\u2022 Periodontal disease; obesity; hormonal factors","Symptoms (History)":"---","Treatment":"\u2022 Target: clinical remission or low disease activity (DAS28 score); treat-to-target strategy --- assess every 1--3 months, adjust if target not achieved\n\u2022 Start DMARD within 4 weeks of diagnosis (RACGP/Rheumatology Australia RA Clinical Care Standard 2024)\n\u2022 First-line DMARD: methotrexate (7.5--25mg/week) --- gold standard; add folic acid 5mg/week to reduce side effects; monitor FBC, LFTs, renal function\n\u2022 Combination DMARDs: methotrexate + hydroxychloroquine + sulfasalazine (triple therapy) if inadequate response\n\u2022 Biologic and targeted synthetic DMARDs (for DMARD-inadequate response): TNF-inhibitors (adalimumab, etanercept, certolizumab --- all PBS-listed); IL-6 inhibitors (tocilizumab); JAK inhibitors (baricitinib, upadacitinib)\n\u2022 Bridging therapy: low-dose prednisolone or IM methylprednisolone during DMARD initiation; minimise long-term corticosteroids\n\u2022 Non-pharmacological: physiotherapy, hand therapy, occupational therapy, smoking cessation; screen for cardiovascular risk (CVD risk 2\u00d7 higher in RA)","Investigations":"\u2022 RF: positive in 70--80% of RA; also positive in Sj\u00f6gren's, other CTDs, healthy elderly\n\u2022 Anti-CCP (anti-cyclic citrullinated peptide): >95% specific for RA; predicts erosive disease\n\u2022 CRP, ESR, FBC: elevated CRP/ESR; anaemia of chronic disease; thrombocytosis\n\u2022 X-rays hands and feet: erosions (periarticular osteopenia, marginal erosions), joint space narrowing --- may be normal early; serial X-rays every 1--2 years\n\u2022 MRI or USS: more sensitive for early synovitis and erosions than X-ray; USS can guide aspiration\n\u2022 Baseline: UEC, LFTs, FBC, hepatitis B/C serology (before DMARD), lipid profile, AusCVDRisk"}},{"name":"Skin Cancers (Melanoma, SCC, BCC)","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Dermatology / Skin","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Fair skin, red/blonde hair, blue eyes; tendency to burn, inability to tan\n\u2022 High cumulative sun exposure (outdoor workers); history of sunburn, especially childhood blistering burns\n\u2022 Multiple atypical naevi (>50 naevi, or dysplastic naevi --- melanoma risk)\n\u2022 Personal or family history of skin cancer\n\u2022 Immunosuppression: organ transplant recipients (40\u00d7 increased SCC risk), HIV, haematological malignancy\n\u2022 Fitzpatrick skin type I-II","Symptoms (History)":"---","Treatment":"\u2022 Melanoma: surgical excision with wide margins (1cm for in situ; 1cm for \u22641mm Breslow; 1--2cm for 1--2mm; 2cm for >2mm); SLNB for \u22650.8mm; adjuvant targeted therapy (BRAF+MEK inhibitors: dabrafenib/trametinib) or immunotherapy (pembrolizumab) for resected high-risk disease; advanced disease: pembrolizumab or nivolumab (PD-1 inhibitors), or BRAF+MEK inhibitors\n\u2022 SCC: surgical excision with 4--6mm margins (standard risk) to 6--10mm (high risk --- perineural invasion, poorly differentiated, immunosuppressed); Mohs micrographic surgery for high-risk facial sites; radiotherapy if surgery not possible\n\u2022 BCC: excision with 3--5mm margins first-line; curettage and electrodesiccation for superficial BCC; photodynamic therapy for superficial BCC; imiquimod/5-FU topical for superficial BCC; vismodegib (hedgehog pathway inhibitor) for locally advanced/metastatic BCC\n\u2022 Follow-up: melanoma --- 3--6 monthly for 5 years; SCC/BCC --- 6--12 monthly; sun protection education (SPF50+, protective clothing, avoid peak UV 10am--2pm)","Investigations":"\u2022 Dermoscopy: enhances clinical diagnosis; reduces unnecessary biopsies\n\u2022 Biopsy: excision biopsy (narrow margin) preferred for suspected melanoma --- histological diagnosis is mandatory; punch biopsy acceptable for large lesions or anatomically difficult sites\n\u2022 Melanoma staging (AJCC): Breslow thickness (mm) most important prognostic factor; Clark level, ulceration, mitotic rate, sentinel lymph node biopsy (SLNB) for \u22650.8mm Breslow or <0.8mm with high-risk features\n\u2022 Staging CT (chest/abdomen/pelvis) \u00b1 PET for stage III/IV melanoma\n\u2022 BRAF V600E mutation testing for advanced melanoma (guides targeted therapy)"}},{"name":"Skin Lumps (Benign Lesions)","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Dermatology / Skin","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Lipoma: obesity, trauma, familial multiple lipomatosis (AD)\n\u2022 Epidermal cyst: acne, trauma, Gardner's syndrome (multiple epidermoid cysts + FAP)\n\u2022 Ganglion: repetitive wrist/joint use; female sex; age 20--40 years\n\u2022 Dermatofibroma: prior insect bite or minor trauma; lower legs predominantly in women","Symptoms (History)":"---","Treatment":"\u2022 Lipoma: no treatment if small, asymptomatic, clearly benign; excision for cosmetic concern, discomfort, or diagnostic uncertainty; liposuction for small superficial lipomas\n\u2022 Epidermal cyst: no treatment if asymptomatic; if infected --- incision and drainage (I&D) of acute abscess, antibiotics (flucloxacillin); excision of intact cyst when non-inflamed (remove whole cyst wall + punctum to prevent recurrence)\n\u2022 Ganglion: many resolve spontaneously; aspiration possible (high recurrence \\~50%); surgical excision for persistent symptoms (lower recurrence \\~10--30%)\n\u2022 Dermatofibroma: reassurance; excision if diagnostic uncertainty or symptomatic\n\u2022 Any excised specimen: send for histopathology --- never discard tissue without examination","Investigations":"\u2022 Clinical diagnosis sufficient for typical benign lesions (lipoma, epidermal cyst, ganglion)\n\u2022 USS: useful to confirm lipoma vs liposarcoma (internal septae, increased vascularity suspicious), confirm ganglion, assess depth\n\u2022 MRI: for deep or subfascial lesions to characterise and plan surgical approach\n\u2022 Histopathology: mandatory for all excised specimens; required if any doubt about diagnosis\n\u2022 FNA or core biopsy: if malignant soft tissue tumour suspected before definitive surgery"}},{"name":"Cellulitis","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Dermatology / Skin","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Skin breaks: wounds, tinea pedis, eczema, psoriasis, leg ulcers, IV cannulae\n\u2022 Lymphoedema, chronic venous insufficiency, obesity\n\u2022 Diabetes mellitus (impaired immunity and vascular supply), immunosuppression\n\u2022 Prior cellulitis (recurrence rate \\~20%/year)\n\u2022 Peripheral vascular disease, oedema","Symptoms (History)":"---","Treatment":"\u2022 Mark borders with skin marker and reassess daily --- cellulitis frequently worsens 24--48h despite appropriate antibiotics (expected progression initially)\n\u2022 Mild (no systemic features): outpatient oral cefalexin 500mg QID for 5--10 days; flucloxacillin 500mg QID alternative\n\u2022 Moderate (systemic features, facial, rapidly progressive, failed oral): admit; IV flucloxacillin 2g QID (preferred for MSSA); change to oral when improving (step-down therapy)\n\u2022 Penicillin allergy: doxycycline or clindamycin; or discuss with ID/clinical microbiology\n\u2022 MRSA: trimethoprim/sulfamethoxazole (cotrimoxazole) oral; vancomycin IV for severe\n\u2022 Elevation of affected limb; analgesia; treat predisposing factors (tinea pedis --- antifungal; lymphoedema --- compression)\n\u2022 Recurrent cellulitis (\u22652 episodes/year): consider prophylactic penicillin V or benzathine penicillin","Investigations":"\u2022 Clinical diagnosis --- blood tests/imaging not routinely required for uncomplicated cellulitis\n\u2022 FBC (leucocytosis), CRP, blood cultures: if systemic infection/sepsis suspected; admission required\n\u2022 Wound swab: only if open wound or discharge present; skin surface swabs unreliable\n\u2022 Blood cultures: positive in <4% of non-purulent cellulitis; low yield but indicated if systemically unwell\n\u2022 X-ray or USS: if suspected underlying osteomyelitis, joint involvement, or foreign body\n\u2022 CT: if NSTI suspected (may show subcutaneous gas/fascial plane oedema)"}},{"name":"Superficial Abscess","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Dermatology / Skin","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 IV drug use (injection sites)\n\u2022 Diabetes mellitus, obesity, immunosuppression\n\u2022 MRSA carrier status (nasal carriage)\n\u2022 Poor hygiene, skin trauma, recurrent folliculitis\n\u2022 Hidradenitis suppurativa: obesity, smoking, familial","Symptoms (History)":"---","Treatment":"\u2022 Incision and Drainage (I&D): definitive treatment --- should be performed as soon as abscess is fluctuant; local anaesthetic (\u00b1procedural sedation for large/deep abscesses); incision over point of maximum fluctuance\n\u2022 Technique: make adequate incision; break down loculations with finger or hemostat; thorough washout with saline; loose packing (iodine or saline-soaked wick) for 24--48 hours; review and repack\n\u2022 Antibiotics: not routinely required after I&D of uncomplicated abscess in immunocompetent patient; indicated if: surrounding cellulitis >2cm, systemic features/sepsis, immunosuppressed, extremes of age, deep-seated\n\u2022 If antibiotics required: oral cefalexin or flucloxacillin (MSSA); cotrimoxazole if MRSA suspected\n\u2022 Wound care post-I&D: daily to every-second-day dressing changes until healed; advise on keep wound open until healed from inside out\n\u2022 Recurrent abscesses: MC&S, consider MRSA nasal/groin/axillary swab; decolonisation if MRSA positive (mupirocin nasal ointment, chlorhexidine body wash)","Investigations":"\u2022 Clinical diagnosis --- imaging generally not required for superficial abscess\n\u2022 USS: if uncertain fluctuance, overlying significant oedema, deep abscess suspected, or failed drainage\n\u2022 Wound swab: for MC&S after I&D --- mandatory if MRSA suspected, recurrent, or immunocompromised\n\u2022 FBC, CRP, blood cultures: if systemic sepsis features present\n\u2022 Blood glucose: if recurrent abscess (exclude undiagnosed diabetes)"}},{"name":"Skin Wounds (Acute and Chronic)","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Dermatology / Skin","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Diabetes mellitus: neuropathy + vascular disease + immune dysfunction (diabetic foot ulcer)\n\u2022 Peripheral arterial disease or venous insufficiency (leg ulcers)\n\u2022 Malnutrition, obesity\n\u2022 Immunosuppression (corticosteroids, chemotherapy)\n\u2022 Pressure and shear forces (pressure injuries --- immobility, ICU, aged care)\n\u2022 Smoking, prior radiotherapy","Symptoms (History)":"---","Treatment":"\u2022 Acute wound: wound toilet (copious saline irrigation); remove foreign bodies; debridement of devitalised tissue; closure: primary (within 8--12 hours for clean wounds) or delayed primary/secondary (contaminated wounds); tetanus prophylaxis; antibiotics if contaminated/infected\n\u2022 VLU: graduated compression bandaging (4-layer or multi-layer --- ABI must be >0.8); wound dressings (moist wound healing); pentoxifylline; venous surgery for correctable reflux\n\u2022 Arterial ulcer: vascular surgery referral for revascularisation; wound protection; surgical or enzymatic debridement; NO compression\n\u2022 Diabetic foot ulcer: multidisciplinary team (diabetes physician, podiatrist, vascular surgeon, infectious diseases); offloading (TCC total contact casting); debridement of callus; antibiotics if infected (IWGDF guidelines); glycaemic control; vascular assessment\n\u2022 Wound dressing selection by wound bed (moist healing principles): granulating --- foam/hydrofibre; sloughy --- alginate/hydrogel; infected --- antimicrobial silver/cadexomer iodine; necrotic --- enzymatic debrider","Investigations":"\u2022 Wound swab for MC&S: if clinically infected\n\u2022 ABI (Ankle-Brachial Index): mandatory before compression therapy for leg ulcers; ABI <0.8 suggests arterial disease --- caution with compression\n\u2022 Duplex USS: venous insufficiency, arterial occlusion\n\u2022 X-ray: underlying osteomyelitis in diabetic foot ulcer (periosteal reaction, bone destruction)\n\u2022 HbA1c, albumin, FBC: metabolic optimisation for chronic wounds"}},{"name":"Necrotising Soft Tissue Infection (NSTI)","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"Dermatology / Skin","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Diabetes mellitus (most common predisposing factor)\n\u2022 Immunosuppression, malignancy, renal failure, cirrhosis\n\u2022 IV drug use, obesity, peripheral vascular disease\n\u2022 Recent surgery, penetrating trauma, insect bite","Symptoms (History)":"---","Treatment":"\u2022 Urgent surgical debridement: ONLY definitive treatment --- wide excision of all necrotic tissue until healthy bleeding margins; reassess at 24--48h (planned relook)\n\u2022 Empirical IV antibiotics: meropenem 1g 8-hourly + vancomycin + clindamycin (anti-toxin effect); tailor to cultures\n\u2022 ICU admission: haemodynamic support, ventilation\n\u2022 Hyperbaric oxygen therapy: adjunct --- limited evidence\n\u2022 Mortality 20--40%; delay in surgical debridement is the key prognostic determinant","Investigations":"\u2022 Clinical diagnosis --- do NOT delay surgery for investigations\n\u2022 CT imaging: may show gas in fascial planes, fascial thickening --- sensitivity \\~90%; does not exclude diagnosis\n\u2022 FBC, CRP, UEC, LFTs, blood cultures, coagulation (DIC)"}},{"name":"Otitis Media","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"ENT (Ear, Nose & Throat)","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Age 6 months--2 years (peak incidence --- immature immune system, horizontal Eustachian tube)\n\u2022 Daycare/preschool attendance; Indigenous Australian children (high burden of disease and complications)\n\u2022 Breastfeeding not sustained; use of dummies/pacifiers; passive smoking\n\u2022 Cleft palate, Down syndrome, craniofacial abnormalities\n\u2022 Winter season, upper respiratory tract infections","Symptoms (History)":"---","Treatment":"\u2022 AOM: analgesia first-line (paracetamol \u00b1 ibuprofen); watchful waiting 48--72 hours in most children \u22652 years with non-severe AOM (spontaneous resolution \\~80%)\n\u2022 Antibiotics for AOM: indicated if --- age <6 months (all), bilateral AOM <2 years, TM perforation with otorrhoea, systemic features, Aboriginal/Torres Strait Islander child (lower threshold per SA Health AOM CPG)\n\u2022 First-line antibiotic: amoxicillin 90mg/kg/day in 3 divided doses for 5--7 days; augmentin (amoxicillin-clavulanate) if no improvement after 48--72h\n\u2022 OME: watchful waiting 3 months (most resolve); if persistent >3 months with bilateral hearing loss: ENT referral for ventilation tubes (grommets); adenoidectomy may reduce recurrence\n\u2022 Recurrent AOM: ENT referral; grommets reduce frequency; adenoidectomy if adenoid hypertrophy present\n\u2022 CSOM: regular dry mopping; topical antibiotic eardrops (ciprofloxacin --- safe with TM perforation); tympanoplasty for persistent perforation","Investigations":"\u2022 AOM is a clinical diagnosis --- investigations not routinely required\n\u2022 Tympanometry: flat (Type B) trace confirms middle ear effusion (OME); abnormal in AOM\n\u2022 Pure tone audiogram: indicated for persistent OME (>3 months) to assess hearing loss\n\u2022 Ear swab for MC&S: if CSOM with discharge; guide antibiotic selection\n\u2022 CT temporal bones: if mastoiditis, cholesteatoma, or intracranial complications suspected"}},{"name":"Otitis Externa","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"ENT (Ear, Nose & Throat)","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Water/moisture exposure: swimming, bathing, humid climate --- breaks down cerumen\n\u2022 Mechanical trauma: cotton buds, hearing aids, ear plugs, ear syringing\n\u2022 Diabetes mellitus (necrotising OE risk) and immunosuppression\n\u2022 Skin conditions: eczema, psoriasis affecting EAC\n\u2022 Canal anatomy: exostoses, stenosis, excessive hair","Symptoms (History)":"---","Treatment":"\u2022 Ear toilet: atraumatic removal of debris via microsuction (preferred) or tissue spear --- mandatory for effective topical drug delivery; irrigation contraindicated (risk of NOE in diabetics; may cause AOM if TM perforated)\n\u2022 Topical antibiotic/steroid eardrops: first-line --- ciprofloxacin 0.3% (or ciprofloxacin-hydrocortisone) for TM perforation or unknown integrity; non-quinolone drops (Sofradex --- framycetin/dexamethasone, Kenacomb) if TM intact; 7--14 days\n\u2022 Ear wick (Pope wick): insert 15mm if EAC oedema obstructs drop penetration; remove and reassess at 48--72 hours\n\u2022 Analgesia: regular paracetamol + NSAIDs; opioids rarely required as most improve within 72 hours\n\u2022 Keep ear dry: soft wax earplugs in shower; no swimming until resolved\n\u2022 Systemic antibiotics: NOT for uncomplicated OE; indicated only if periauricular cellulitis, lymphadenopathy, fever, or diabetic/immunocompromised\n\u2022 Necrotising OE: hospital admission; ENT/ID consultation; IV anti-pseudomonal antibiotics \u22654--6 weeks (ciprofloxacin-based); surgical debridement if bone erosion; strict glycaemic control","Investigations":"\u2022 Clinical diagnosis --- investigations not routinely required for uncomplicated AOE\n\u2022 Ear swab for MC&S: if refractory to first-line treatment or suspecting non-pseudomonal/fungal cause\n\u2022 Fasting glucose or HbA1c: if diabetes suspected or unrecognised\n\u2022 CT temporal bones: if necrotising OE suspected (bone erosion)\n\u2022 Technetium bone scan or gallium scan: for necrotising OE staging/monitoring"}},{"name":"Rhinosinusitis","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"ENT (Ear, Nose & Throat)","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Viral upper respiratory tract infection (precedes acute rhinosinusitis)\n\u2022 Allergic rhinitis; nasal polyps (CRS risk)\n\u2022 Anatomical obstruction: deviated nasal septum, concha bullosa, narrow ostiomeatal complex\n\u2022 Dental disease (maxillary sinusitis from upper molar roots)\n\u2022 Immunosuppression, cystic fibrosis, ciliary dyskinesia\n\u2022 Smoking, air pollution","Symptoms (History)":"---","Treatment":"\u2022 Viral (\u226410 days): symptomatic management --- nasal saline irrigation (hypertonic or isotonic), topical intranasal corticosteroids (mometasone, fluticasone), analgesics (paracetamol, ibuprofen); no antibiotics\n\u2022 Bacterial (>10 days or double-sickening): amoxicillin 500mg TDS for 5--7 days (Australian Therapeutic Guidelines); add clavulanate (amoxicillin-clavulanate 875/125mg BD) if no improvement after 48--72h or severe symptoms\n\u2022 Topical intranasal corticosteroids: key treatment for both acute and chronic rhinosinusitis; reduce inflammation and oedema of ostia\n\u2022 Decongestants: pseudoephedrine or topical oxymetazoline (<5 days --- risk of rhinitis medicamentosa with prolonged use)\n\u2022 CRS with polyps: high-dose intranasal steroids; short oral corticosteroid course for polyposis; dupilumab (biologic --- anti-IL-4/IL-13) for severe CRSwNP refractory to topicals\n\u2022 Surgical: Functional Endoscopic Sinus Surgery (FESS) for CRS refractory to medical therapy; complications (orbital, intracranial): urgent hospital admission, IV antibiotics, ENT and ophthalmology/neurosurgery involvement","Investigations":"\u2022 Clinical diagnosis for uncomplicated acute rhinosinusitis --- no investigations routinely required\n\u2022 CXR or X-ray of sinuses: not recommended (poor sensitivity/specificity)\n\u2022 CT sinuses: indicated for recurrent/chronic rhinosinusitis, pre-surgical planning (FESS), suspected complications; shows opacification, mucosal thickening, air-fluid levels\n\u2022 Nasal swab: limited clinical utility; nasal endoscopy and middle meatus swab (by ENT) if cultures needed\n\u2022 MRI: suspected intracranial complications (meningitis, abscess, cavernous sinus thrombosis)"}},{"name":"Cervical Lymphadenopathy","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"ENT (Ear, Nose & Throat)","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Age <40: benign/reactive/haematological causes more likely\n\u2022 Age >40: increased malignancy risk (metastatic > primary haematological)\n\u2022 Smoking and alcohol: increased risk of head and neck SCC metastasis\n\u2022 Prior malignancy, immunosuppression\n\u2022 TB exposure (overseas travel, Indigenous community, incarcerated)\n\u2022 Cat scratch/animal contact","Symptoms (History)":"---","Treatment":"\u2022 Reactive lymphadenopathy: reassurance; treat underlying infection (antibiotics if bacterial cause identified); review in 4--6 weeks\n\u2022 Bacterial lymphadenitis: flucloxacillin or amoxicillin-clavulanate; if fluctuant --- aspiration or I&D\n\u2022 Mycobacterial: specialist infectious disease/respiratory referral; anti-TB therapy (RHEZ for TB); surgical excision for NTM (responds poorly to antibiotics)\n\u2022 EBV (glandular fever): supportive; avoid contact sports for 4--6 weeks (splenomegaly); avoid amoxicillin/ampicillin (causes florid rash in EBV)\n\u2022 Haematological malignancy: urgent haematology referral; treatment per disease (ABVD for HL; R-CHOP for DLBCL)\n\u2022 Metastatic malignancy: identify primary site; multidisciplinary team; treatment per primary (surgery, radiotherapy, systemic therapy)","Investigations":"\u2022 FBC with differential: atypical lymphocytes (EBV/CMV); lymphocytosis (CLL); thrombocytopenia/anaemia (bone marrow involvement); leucocytosis (infection)\n\u2022 LDH, ESR, CRP, LFTs, \u03b22-microglobulin (lymphoma staging)\n\u2022 Monospot test or EBV VCA IgM/IgG: if glandular fever suspected; CMV serology\n\u2022 Neck ultrasound: first-line imaging --- characterises nodes (size, echogenicity, vascularity, necrosis); identifies suppuration (abscess vs reactive); guides FNA\n\u2022 CT chest/abdomen/pelvis with contrast: if lymphoma or systemic malignancy suspected\n\u2022 Fine Needle Aspiration Cytology (FNAC): for persistent unexplained lymphadenopathy >4 weeks; if lymphoma suspected --- inadequate for architectural diagnosis\n\u2022 Excision biopsy: preferred for definitive lymphoma diagnosis (histology + immunohistochemistry required)\n\u2022 Tuberculin skin test (Mantoux) or IGRA; sputum AFB if TB suspected"}},{"name":"Facial Nerve Palsy (Bell's Palsy)","stars":0,"category":"Haematology, Oncology, Rheumatology, Dermatology & ENT","subcategory":"ENT (Ear, Nose & Throat)","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 No strong identifiable risk factors for Bell's palsy\n\u2022 Diabetes mellitus (increased incidence and severity)\n\u2022 Pregnancy, particularly third trimester\n\u2022 Recent viral URTI (potential HSV reactivation trigger)\n\u2022 Immunosuppression","Symptoms (History)":"---","Treatment":"\u2022 Corticosteroids: prednisolone 50mg daily for 10 days (or 1mg/kg/day up to 80mg); start within 72 hours of onset --- increases complete recovery from 71% to 83% (NNT \\~11); Australian Prescriber recommendation\n\u2022 Antivirals: valaciclovir 1000mg TDS or aciclovir 800mg 5 times/day for 7 days as adjunct to prednisolone --- small additional benefit possible (not proven in RCTs; shared decision-making with patient); NOT effective as monotherapy\n\u2022 Eye care (critical --- corneal protection): artificial tear drops QID during day (hypromellose/polyvinyl alcohol); lubricating eye ointment at night; moisture chamber or taping eye closed at night if lagophthalmos; refer ophthalmology if corneal involvement\n\u2022 Physiotherapy: facial exercises may assist moderate/chronic cases --- evidence limited\n\u2022 Prognosis: 70--75% full spontaneous recovery without treatment; with prednisolone \\~83% full recovery\n\u2022 Referral: neurologist or otolaryngologist if --- other cranial nerve involvement, bilateral palsy, no improvement at 3 months, trauma or parotid pathology suspected","Investigations":"\u2022 Clinical diagnosis for classic Bell's palsy --- no investigations required acutely\n\u2022 MRI brain with gadolinium: if atypical features, slow onset, recurrent, bilateral, other cranial nerve involvement, or failure to recover --- exclude central pathology, parotid tumour, or demyelination\n\u2022 Blood glucose/HbA1c: exclude diabetes\n\u2022 VZV serology or PCR: if Ramsay Hunt suspected\n\u2022 Lyme serology (ELISA): if tick exposure history or endemic area (rare in Australia)\n\u2022 Audiogram: if hearing loss present"}},{"name":"Osteoarthritis","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Musculoskeletal - General","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Age >50 years (strongest independent risk factor)\n\u2022 Female sex (especially post-menopausal for hand/knee OA)\n\u2022 Obesity --- increases load on weight-bearing joints; also systemic inflammatory effect\n\u2022 Prior joint injury, meniscectomy, or malalignment (varus/valgus deformity)\n\u2022 Occupational repetitive loading (e.g. kneeling --- knee OA; overhead work --- shoulder OA)\n\u2022 Family history / genetic variants (GDF5, ALDH1A2)","Symptoms (History)":"---","Treatment":"\u2022 Non-pharmacological (first-line): weight reduction, physiotherapy, hydrotherapy, exercise programme, walking aids; patient education\n\u2022 Pharmacological: regular paracetamol \u00b1 topical NSAIDs (knee/hand); oral NSAIDs with PPI cover for moderate--severe pain; avoid long-term opioids\n\u2022 Intra-articular corticosteroid injection: short-term relief (weeks to months); limit to 3--4/year per joint\n\u2022 Intra-articular hyaluronic acid: modest benefit; PBS-listed for knee OA\n\u2022 Surgical: arthroscopic washout (limited evidence); osteotomy for malalignment in younger patients; total joint arthroplasty (TJA) for end-stage disease --- gold standard for hip and knee","Investigations":"\u2022 X-ray (weight-bearing for hip/knee): LOSS mnemonic --- joint space Loss, subchondral sclerOsis, subchondral cySts, osteophyte formation\n\u2022 Bloods generally normal; order FBC, ESR, CRP, RF, anti-CCP only to exclude inflammatory arthropathy\n\u2022 Synovial fluid (if aspirated): viscous, WBC <2000 cells/\u00b5L, no crystals (rules out gout/pseudogout)\n\u2022 MRI if surgery planned or to assess menisci/cartilage; CT for pre-operative templating"}},{"name":"Rheumatoid Arthritis","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Musculoskeletal - General","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Female sex (F:M = 3:1); peak onset 40--60 years\n\u2022 Smoking --- doubles risk and worsens severity; associated with seropositive disease\n\u2022 Family history of RA or other autoimmune disease\n\u2022 Periodontal disease (Porphyromonas gingivalis --- citrullination link)\n\u2022 Environmental exposures: silica dust, certain infections (EBV, Parvovirus B19)","Symptoms (History)":"---","Treatment":"\u2022 Treat-to-target: aim for remission or low disease activity (DAS28 <2.6 or <3.2) using structured escalation\n\u2022 First-line DMARD: methotrexate (MTX) \u00b1 hydroxychloroquine \u00b1 sulfasalazine (triple therapy); regular LFTs and FBC monitoring; folic acid supplementation\n\u2022 Bridging: NSAIDs and/or short-course oral corticosteroids during DMARD initiation; intra-articular steroids for single active joints\n\u2022 Biologic DMARDs (if inadequate MTX response): TNF-\u03b1 inhibitors (adalimumab, etanercept --- PBS-listed after \u22652 DMARD failure); IL-6 inhibitors (tocilizumab); abatacept; rituximab\n\u2022 JAK inhibitors (baricitinib, tofacitinib, upadacitinib): oral targeted synthetic DMARDs; PBS-listed; monitor lipids, VTE risk, infection\n\u2022 Surgery: synovectomy, tendon reconstruction, arthroplasty for end-stage joint destruction; anaesthetic precautions re: cervical instability","Investigations":"\u2022 Bloods: RF positive in \\~70% (seropositive); anti-CCP (anti-citrullinated protein antibody) more specific (\\~95%) and can be positive years before symptoms\n\u2022 Raised ESR and CRP (correlate with disease activity); normocytic normochromic anaemia; thrombocytosis in active disease\n\u2022 X-ray hands and feet: periarticular osteopenia, marginal erosions, joint space narrowing (Larsen score); baseline then annually\n\u2022 Ultrasound: detects subclinical synovitis and erosions more sensitively than X-ray; guides aspiration\n\u2022 MRI: most sensitive for early erosions and synovitis; used when diagnosis uncertain"}},{"name":"Septic Arthritis","stars":0,"category":"Musculoskeletal / Orthopaedic Conditions","subcategory":"Musculoskeletal - General","sections":{"Cause / Aetiology":"---","Risk Factors":"\u2022 Pre-existing joint disease (RA, OA, prosthetic joint --- 1--2% infection rate post-TKR/THR)\n\u2022 Immunosuppression: diabetes mellitus, chronic renal failure, malignancy, HIV, corticosteroids\n\u2022 Skin breach: IV drug use, penetrating trauma, recent joint injection/arthroscopy\n\u2022 Bacteraemia from any source: endocarditis, urinary tract infection, dental procedures","Symptoms (History)":"---","Treatment":"\u2022 Surgical emergency: immediate orthopaedic review; joint washout --- arthroscopic lavage or open arthrotomy (especially hip which is difficult to aspirate adequately); daily aspiration acceptable for some peripheral joints\n\u2022 IV antibiotics empirically after blood cultures and joint aspiration: flucloxacillin 2g QID IV (S. aureus cover); vancomycin if MRSA risk or penicillin allergy; ceftriaxone if gonococcal suspected\n\u2022 Definitive antibiotics guided by culture sensitivities; typically 2--4 weeks IV then oral completion (total 4--6 weeks)\n\u2022 Analgesia and splinting in functional position; physiotherapy commencing once infection controlled\n\u2022 Prosthetic joint infection: debridement and implant retention (DAIR) if early; one- or two-stage revision if late or chronic","Investigations":"\u2022 Joint aspiration (URGENT --- do not delay for imaging): synovial fluid WBC >50,000 cells/\u00b5L (>75% PMNs) highly suggestive; Gram stain (50--70% sensitivity) and culture (send before antibiotics if possible)\n\u2022 Blood cultures (\u00d72): positive in \\~50%; FBC, CRP, ESR, renal/liver function, glucose, blood glucose\n\u2022 X-ray of affected joint (baseline): usually normal early; may show effusion; excludes fracture\n\u2022 Ultrasound: confirms effusion, guides aspiration especially hip/shoulder\n\u2022 MRI: best for associated osteomyelitis or difficult joints (hip, sacroiliac)\n\u2022 STI screen (NAAT swabs: genital/throat/rectal) if gonococcal suspected"}},{"name":"Other Inflammatory Arthropathies","stars":0,"category"
