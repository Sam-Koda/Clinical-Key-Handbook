.hb{display:none;width:36px;height:36px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:22px;cursor:pointer;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;flex-shrink:0}
.hb.on{display:-webkit-flex;display:flex}.hb:active{background:var(--sf3)}
.hi{-webkit-flex:1;flex:1;min-width:0}

.scl{display:none;background:var(--sf3);border:none;color:var(--mu);width:22px;height:22px;border-radius:50%;font-size:11px;cursor:pointer;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;flex-shrink:0}

@-webkit-keyframes sI{from{-webkit-transform:translateX(100%)}to{-webkit-transform:translateX(0)}}

@-webkit-keyframes sO{from{-webkit-transform:translateX(0)}to{-webkit-transform:translateX(-25%);opacity:0}}

@keyframes sbI{from{transform:translateX(-25%);opacity:0}to{transform:translateX(0)}}
@-webkit-keyframes sbO{from{-webkit-transform:translateX(0)}to{-webkit-transform:translateX(100%)}}
@keyframes sbO{from{transform:translateX(0)}to{transform:translateX(100%)}}

.sbI{-webkit-animation:sbI .25s ease forwards;animation:sbI .25s ease forwards}

.sblk{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.sblk.open{border-color:var(--sc,var(--bd))}

.sico-box{width:32px;height:32px;border-radius:9px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--scb,var(--sf2));text-align:center}

.bi{display:-webkit-flex;display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13.5px;line-height:1.55;color:#cdd2e0}

.bdot{color:var(--sc,var(--ac));font-size:16px;margin-top:1px;flex-shrink:0;line-height:1.4}
.srl{padding:8px 14px;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:6px}

mark{background:rgba(79,156,249,.25);color:var(--tx);border-radius:3px;padding:0 2px}

<script>
try{
var DB=[{"name":"Ischaemic Heart Disease","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiac Conditions","sections":{"Cause / Aetiology":"\u2022 Atherosclerotic plaque formation in coronary arteries causing luminal narrowing \u2192 reduced myocardial oxygen supply\n\u2022 Plaque rupture or erosion \u2192 thrombus \u2192 acute coronary syndrome (ACS): STEMI, NSTEMI, or unstable angina\n\u2022 Less common: vasospasm (Prinzmetal's), spontaneous coronary artery dissection (SCAD), embolic occlusion\n\u2022 Chronic stable angina: supply-demand mismatch with fixed stenosis (typically >70% luminal narrowing)\n\u2022 Pathophysiology: endothelial dysfunction \u2192 lipid deposition \u2192 foam cells \u2192 fibrous cap \u2192 vulnerable plaque","Risk Factors":"\u2022 Non-modifiable: age (\u2642 >45, \u2640 >55), male sex, family history of premature CVD (1st-degree relative <55M/<65F)\n\u2022 Modifiable: hypertension, dyslipidaemia (\u2191LDL, \u2193HDL), diabetes mellitus, smoking, obesity, sedentary lifestyle\n\u2022 Australian CVD risk calculator (2023 guidelines): \u226510% 5-year risk = high risk \u2192 initiate pharmacotherapy\n\u2022 Additional: chronic kidney disease, inflammatory conditions (RA, SLE), obstructive sleep apnoea, psychosocial stress\n\u2022 Indigenous Australians: 2--3\u00d7 higher burden of IHD, earlier onset","Symptoms (History)":"\u2022 Stable angina: central/left-sided chest tightness or pressure, radiating to jaw/left arm, precipitated by exertion/cold/stress, relieved by rest or GTN within 5 min\n\u2022 ACS: same character but at rest, more severe, prolonged (>20 min), not fully relieved by GTN; may be associated with diaphoresis, nausea, dyspnoea\n\u2022 Atypical presentations (especially women, elderly, diabetics): epigastric pain, dyspnoea alone, fatigue, jaw pain --- often misdiagnosed\n\u2022 Silent ischaemia: particularly in diabetics; incidental ECG/stress test finding\n\u2022 Acute MI: can present with sudden cardiac death, pulmonary oedema, or cardiogenic shock","Treatment":"\u2022 STEMI: dual antiplatelet (aspirin 300mg + ticagrelor or prasugrel) + anticoagulation (UFH or bivalirudin) \u2192 primary PCI within 90 min of first medical contact; fibrinolysis if PCI unavailable within 120 min\n\u2022 NSTEMI/UA: aspirin + ticagrelor/clopidogrel; anticoagulation (enoxaparin); early invasive strategy within 24h for high/very-high risk (per 2025 Heart Foundation guideline)\n\u2022 Post-ACS secondary prevention: DAPT for 6--12 months, long-term P2Y12 inhibitor > aspirin; high-intensity statin (LDL-C target <1.4 mmol/L); ACE inhibitor/ARB if LVEF \u226440% or HF/DM/HTN; beta-blocker if LVEF \u226440%; MRA if LVEF \u226440% + HF; consider colchicine 0.5 mg/day\n\u2022 Stable IHD: sublingual GTN PRN; aspirin; statin; ACEI; beta-blocker or calcium channel blocker for symptom control; PCSK9 inhibitors if LDL-C not at target on max statin + ezetimibe\n\u2022 Non-pharmacological: cardiac rehabilitation, smoking cessation, diet, structured exercise, weight management, psychosocial support\n\u2022 Revascularisation for stable disease: PCI or CABG based on coronary anatomy, SYNTAX score, and patient factors","Investigations":"\u2022 ECG: ST elevation (STEMI), ST depression/T-wave inversion (NSTEMI/UA), new LBBB; serial ECGs essential\n\u2022 High-sensitivity troponin (hs-cTnI/T): at presentation and 1--2h (0h/1h or 0h/2h rapid rule-out pathway per 2025 ACS guideline)\n\u2022 FBC, UEC, LFTs, glucose, HbA1c, lipid profile, coagulation studies\n\u2022 CXR: pulmonary oedema, cardiomegaly\n\u2022 Echocardiography: regional wall motion abnormalities, LVEF assessment\n\u2022 Coronary angiography \u00b1 PCI: definitive for stenosis; urgent for STEMI/high-risk NSTEMI; stress testing (exercise, dobutamine echo, nuclear) for stable disease\n\u2022 CTCA: useful for low-intermediate probability chest pain if investigations inconclusive"}},{"name":"Cardiac Failure","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiac Conditions","sections":{"Cause / Aetiology":"\u2022 HFrEF (LVEF <40%): ischaemic cardiomyopathy (most common), dilated cardiomyopathy, myocarditis, alcohol-related, peripartum, chemotherapy-induced (e.g. doxorubicin)\n\u2022 HFpEF (LVEF \u226550%): hypertension, diabetes, obesity, atrial fibrillation, infiltrative diseases (amyloid, sarcoid)\n\u2022 HFmrEF (LVEF 40--49%): overlap phenotype, often ischaemic or recovering HFrEF\n\u2022 Common precipitants of acute decompensation: non-adherence to medications/fluids, infection, arrhythmia (especially AF), myocardial ischaemia, anaemia, renal failure, NSAID use\n\u2022 Pathophysiology: reduced cardiac output \u2192 neurohormonal activation (RAAS, SNS, ADH) \u2192 maladaptive remodelling, sodium/water retention, vasoconstriction","Risk Factors":"\u2022 Ischaemic heart disease, hypertension, diabetes mellitus, obesity\n\u2022 Valvular heart disease (especially aortic stenosis, mitral regurgitation)\n\u2022 Arrhythmias (tachycardia-induced cardiomyopathy from persistent AF)\n\u2022 Cardiotoxic exposures: alcohol, cocaine, chemotherapy, radiation\n\u2022 Family history of dilated cardiomyopathy (25% familial)\n\u2022 Age: incidence doubles each decade after 45; affects \\~1% Australians overall","Symptoms (History)":"\u2022 Dyspnoea (exertional \u2192 orthopnoea \u2192 paroxysmal nocturnal dyspnoea \u2192 rest)\n\u2022 Fatigue, reduced exercise tolerance; NYHA functional classification (I--IV) guides management\n\u2022 Peripheral oedema (bilateral, gravitational), abdominal bloating (ascites, hepatic congestion)\n\u2022 Nocturia, weight gain (fluid retention)\n\u2022 Acute pulmonary oedema: sudden severe dyspnoea, pink frothy sputum, orthopnoea","Treatment":"\u2022 HFrEF (four pillars --- mortality benefit):\n\u2022 ACE inhibitor/ARB or ARNI (sacubitril/valsartan --- superior to ACEI in symptomatic HFrEF NYHA II--IV)\n\u2022 Beta-blocker (carvedilol, metoprolol succinate, bisoprolol --- start low, titrate up)\n\u2022 Mineralocorticoid receptor antagonist/MRA (spironolactone, eplerenone)\n\u2022 SGLT2 inhibitor (dapagliflozin, empagliflozin --- reduce hospitalisation and CV death)\n\u2022 HFpEF: primarily treat comorbidities (HTN, AF, obesity, DM); SGLT2 inhibitors reduce HF hospitalisations; diuretics for congestion symptom relief\n\u2022 Diuretics (frusemide) for fluid overload --- symptom relief only, no mortality benefit\n\u2022 Device therapy: ICD if LVEF \u226435% despite 3 months optimal therapy; CRT if LBBB + QRS \u2265130 ms + LVEF \u226435%\n\u2022 Acute decompensated HF: IV frusemide, position upright, oxygen (target SpO2 94--98%), CPAP for pulmonary oedema, vasodilators (GTN) if normotensive/hypertensive\n\u2022 Multidisciplinary HF program: HF nurse, GP, cardiologist; self-monitoring (daily weights, fluid restriction, diuretic action plan); cardiac rehabilitation; palliative care for end-stage","Investigations":"\u2022 ECG: look for AF, LBBB (CRT candidate), ischaemic changes, LVH\n\u2022 CXR: cardiomegaly (CTR >0.5), upper lobe diversion, Kerley B lines, bat-wing pulmonary oedema, pleural effusions\n\u2022 BNP/NT-proBNP: elevated (rules out HF if normal; guides response to treatment); BNP <35 pg/mL or NT-proBNP <125 pg/mL makes HF unlikely\n\u2022 Echocardiography: cornerstone --- LVEF, diastolic function, wall motion, valve assessment, filling pressures\n\u2022 FBC, UEC, LFTs, TFTs, HbA1c, iron studies, fasting glucose; urinalysis\n\u2022 Coronary angiography/CTCA if ischaemic aetiology suspected"}},{"name":"Arrhythmias","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiac Conditions","sections":{"Cause / Aetiology":"\u2022 Atrial Fibrillation (AF): most common sustained arrhythmia; multiple re-entrant wavelets in atria; triggers often from pulmonary vein foci\n\u2022 SVT (AVNRT, AVRT): re-entry circuits involving AV node \u00b1 accessory pathway (WPW); usually structurally normal heart\n\u2022 Ventricular tachycardia (VT): re-entry around scar (post-MI), channelopathies (long QT, Brugada), cardiomyopathy\n\u2022 Bradyarrhythmias: sinus node dysfunction, AV block (1st/2nd/3rd degree); causes include ischaemia, drugs (beta-blockers, digoxin, CCBs), hypothyroidism, infiltrative disease\n\u2022 Mechanism: abnormal automaticity, triggered activity, or re-entry","Risk Factors":"\u2022 AF: age, hypertension (most common modifiable RF), obesity, OSA, alcohol, heart failure, valvular disease, thyrotoxicosis, diabetes, post-cardiac surgery\n\u2022 VT/VF: structural heart disease (post-MI scar, cardiomyopathy), electrolyte abnormalities (\u2193K+, \u2193Mg2+), QT-prolonging drugs, channelopathies\n\u2022 SVT: congenital accessory pathways; stimulants (caffeine, sympathomimetics)\n\u2022 Family history of sudden cardiac death (channelopathies, ARVC)","Symptoms (History)":"\u2022 AF: palpitations (irregularly irregular), dyspnoea, fatigue, reduced exercise tolerance, dizziness; may be asymptomatic (incidental finding)\n\u2022 SVT: sudden onset/offset paroxysmal palpitations, chest tightness, near-syncope; terminated by Valsalva\n\u2022 VT: palpitations, syncope, presyncope, haemodynamic collapse; can present as cardiac arrest\n\u2022 Bradycardia: fatigue, exertional dyspnoea, dizziness, presyncope/syncope (Stokes-Adams attacks), heart failure\n\u2022 Ask about: triggers, duration, frequency, haemodynamic compromise, family history of sudden death","Treatment":"\u2022 AF --- AF-CARE framework (2024 Heart Foundation guideline):\n\u2022 C: Comorbidities (treat OSA, obesity, HTN, alcohol)\n\u2022 A: Anticoagulation --- NOAC preferred (apixaban, rivaroxaban) over warfarin; antiplatelet not recommended for stroke prevention\n\u2022 R: Rate control (beta-blocker, diltiazem/verapamil, digoxin) or Rhythm control (flecainide, amiodarone, sotalol; cardioversion; catheter ablation --- first-line option for paroxysmal AF or symptomatic persistent AF)\n\u2022 E: Evaluation and reassessment\n\u2022 SVT acute: Valsalva manoeuvre/carotid sinus massage \u2192 IV adenosine 6--12 mg \u2192 DC cardioversion if haemodynamically unstable; long-term: catheter ablation (curative) or rate/rhythm drugs\n\u2022 Haemodynamically unstable tachyarrhythmia: synchronised DC cardioversion (biphasic 120--200 J)\n\u2022 VF/pulseless VT: unsynchronised defibrillation (200 J biphasic); follow ALS algorithm; IV amiodarone 300 mg\n\u2022 Bradycardia with compromise: IV atropine 0.5 mg (repeat up to 3 mg); transcutaneous pacing; transvenous pacing; consider permanent pacemaker for chronic symptomatic bradycardia/high-degree AV block","Investigations":"\u2022 12-lead ECG: essential --- narrow vs wide complex, regular vs irregular\n\u2022 Ambulatory monitoring: 24h Holter (frequent symptoms), 7-day Holter, implantable loop recorder (infrequent syncope)\n\u2022 Echocardiogram: assess structural heart disease, LVEF, valve pathology, LA size (in AF)\n\u2022 FBC, UEC, TFTs, LFTs, Mg2+, Ca2+; digoxin level if on digoxin\n\u2022 EP study: for diagnostic/ablation workup of SVT, VT, WPW\n\u2022 AF specifically: CHA2DS2-VA score for stroke risk stratification (OAC if score \u22652 in \u2642, \u22653 in \u2640 per 2024 Australian Heart Foundation AF guideline)"}},{"name":"Valvular Heart Disease","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiac Conditions","sections":{"Cause / Aetiology":"\u2022 Aortic Stenosis (AS): calcific degeneration (most common in elderly); bicuspid aortic valve (congenital, presents 50--60s); rheumatic disease (co-existing MV disease)\n\u2022 Aortic Regurgitation (AR): bicuspid AV, rheumatic, infective endocarditis, aortic root dilatation (Marfan's, hypertension, aortic dissection)\n\u2022 Mitral Regurgitation (MR): degenerative (MVP --- most common in developed nations), ischaemic (papillary muscle dysfunction), rheumatic, endocarditis, dilated cardiomyopathy\n\u2022 Mitral Stenosis (MS): predominantly rheumatic heart disease; prevalent in Indigenous Australians and those from endemic regions\n\u2022 Tricuspid Regurgitation (TR): usually functional (secondary to RV dilatation from pulmonary hypertension or left-sided HF)","Risk Factors":"\u2022 Age (degenerative calcific disease), bicuspid aortic valve (AS, AR)\n\u2022 Rheumatic fever: group A streptococcal pharyngitis \u2192 cross-reactive immune-mediated valve damage; higher prevalence in Indigenous Australians, Pacific Islander, and migrant populations\n\u2022 Risk factors for endocarditis: IV drug use, poor dentition, prosthetic valves, congenital heart disease, indwelling vascular devices\n\u2022 Connective tissue disorders: Marfan's, Ehlers-Danlos (AR, MVP)\n\u2022 Radiation-induced valve disease (post-mediastinal radiotherapy)","Symptoms (History)":"\u2022 Severe AS: classic triad --- angina (average survival 5 years without intervention), syncope (3 years), heart failure/dyspnoea (1--2 years); symptoms late in natural history\n\u2022 AR: chronic --- exertional dyspnoea, palpitations (bounding pulse); acute --- flash pulmonary oedema, haemodynamic collapse (endocarditis, dissection)\n\u2022 MR: exertional dyspnoea, fatigue, palpitations; may be asymptomatic for years\n\u2022 MS: exertional dyspnoea, haemoptysis, AF, stroke (LA thrombus), right heart failure\n\u2022 All valve lesions: ask about rheumatic fever history, fevers/rigors (endocarditis), progression of symptoms","Treatment":"\u2022 Severe symptomatic AS: aortic valve replacement (AVR) --- surgical (SAVR) or transcatheter (TAVI); TAVI preferred for high-surgical-risk or inoperable patients; expanding to intermediate risk; no medical therapy delays progression\n\u2022 Severe AR: AVR or aortic root repair when symptomatic OR LVEF \u226450% OR LV dimensions exceed thresholds; medical: vasodilators (nifedipine, ACEI) temporising only\n\u2022 Severe MR: mitral valve repair preferred over replacement when feasible; surgery when symptomatic OR LVEF \u226460% OR LVESD \u226540 mm; transcatheter MitraClip for high-surgical-risk\n\u2022 MS: percutaneous mitral balloon commissurotomy (PMBC) if anatomy suitable; MVR if unsuitable; anticoagulate all patients with MS + AF (warfarin preferred for rheumatic MS with mechanical prosthesis)\n\u2022 Infective endocarditis prophylaxis: amoxicillin 2 g oral 30--60 min pre-dental procedure for high-risk patients (prosthetic valves, prior endocarditis, specific CHD)\n\u2022 Rheumatic fever secondary prophylaxis: monthly IM benzathine penicillin G (Bicillin LA) for 10 years or until age 25 (per Australian RHD guidelines)","Investigations":"\u2022 Echocardiography (TTE \u00b1 TOE): gold standard --- valve morphology, area, gradient, regurgitant fraction, LVEF, chamber dimensions; TOE for MS, endocarditis, prosthetic valves\n\u2022 ECG: LVH (AS, AR, MR), AF (MS, MR), right heart strain (MS)\n\u2022 CXR: cardiomegaly, pulmonary oedema, calcified valve, dilated aortic root\n\u2022 Exercise stress testing: assess functional capacity and symptom threshold in 'asymptomatic' severe AS\n\u2022 Cardiac catheterisation: coronary angiography pre-operatively (if risk factors present); haemodynamic confirmation if echo discordant\n\u2022 CTCA/cardiac MRI: aortic root anatomy for TAVI planning; MRI for MR quantification"}},{"name":"Hypertension","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiac Conditions","sections":{"Cause / Aetiology":"\u2022 Primary (essential) hypertension: \\~95% of cases; polygenic predisposition + environmental factors; mechanisms include RAAS overactivation, sympathetic overdrive, sodium sensitivity, endothelial dysfunction, vascular stiffness\n\u2022 Secondary hypertension (\\~5%): renovascular disease (renal artery stenosis), primary hyperaldosteronism (most common secondary cause --- screen all hypertensives per 2024 ESC), phaeochromocytoma, Cushing's syndrome, coarctation of aorta, hypothyroidism, OSA, drug-induced (NSAIDs, OCP, sympathomimetics, corticosteroids)\n\u2022 Australian 2016 guideline definition: SBP \u2265140 mmHg and/or DBP \u226590 mmHg on \u22652 separate occasions; 2023 CVD risk guideline recommends treat if SBP \u2265160 mmHg regardless of CVD risk\n\u2022 Hypertensive emergency: BP \u2265180/120 mmHg with end-organ damage (aortic dissection, acute MI, hypertensive encephalopathy, eclampsia)","Risk Factors":"\u2022 Age, male sex, family history\n\u2022 High sodium/low potassium diet, excessive alcohol, obesity, physical inactivity\n\u2022 Diabetes mellitus, chronic kidney disease, dyslipidaemia\n\u2022 Psychological stress, low SES, Indigenous Australian background\n\u2022 Medications: NSAIDs, OCP (especially if smoker), decongestants, licorice\n\u2022 Australian National Hypertension Taskforce (2024): target 90--90--90 model (awareness, treatment, control)","Symptoms (History)":"\u2022 Usually asymptomatic ('silent killer') --- picked up on routine screening\n\u2022 Headache (typically occipital, morning), epistaxis, visual disturbance (fundal changes)\n\u2022 Hypertensive urgency/emergency: severe headache, visual changes (blurred/loss), chest pain, dyspnoea, haematuria, neurological symptoms, nausea/vomiting\n\u2022 Secondary HTN clues: sweating/palpitations (phaeochromocytoma), muscle weakness/cramps (hyperaldosteronism), snoring/daytime somnolence (OSA)","Treatment":"\u2022 Lifestyle: sodium restriction (<2 g/day), DASH diet, weight loss (target BMI <25), aerobic exercise (30 min, 5\u00d7 per week), alcohol reduction (\u22642 standard drinks/day), smoking cessation\n\u2022 Target BP: <130/80 mmHg for most patients (per National Hypertension Taskforce 2024 and international guidelines); 2023 CVD guidelines support this target\n\u2022 Pharmacotherapy first-line (standard therapies): ACE inhibitor or ARB; calcium channel blocker (amlodipine); thiazide/thiazide-like diuretic (chlorthalidone, indapamide); prefer single-pill combinations for adherence\n\u2022 Add-on: spironolactone for resistant HTN (most effective 4th agent); consider beta-blocker if IHD, HF, or AF\n\u2022 Step-wise escalation: monotherapy \u2192 dual (ACEI/ARB + CCB or diuretic) \u2192 triple \u2192 specialist referral\n\u2022 Hypertensive emergency: IV labetalol, IV hydralazine, or IV glyceryl trinitrate; aim to reduce MAP by no more than 25% in first hour; avoid rapid reduction (risk of ischaemia)\n\u2022 Monitor for treatment-related hyperkalaemia (ACE inhibitor + MRA + CKD) and renal function decline","Investigations":"\u2022 Urinalysis + ACR (microalbuminuria); UEC, creatinine, eGFR; fasting glucose, HbA1c; lipid profile; TFTs\n\u2022 ECG: LVH (Sokolow-Lyon criteria), ischaemic changes\n\u2022 Echocardiography if LVH, systolic/diastolic dysfunction suspected\n\u2022 Renal ultrasound if CKD or suspected renovascular disease; renal artery Doppler\n\u2022 Secondary screen if indicated: plasma aldosterone:renin ratio, 24h urine catecholamines/metanephrines, cortisol suppression test, sleep study (OSA)\n\u2022 2023 Australian CVD risk guideline: use Australian CVD risk calculator for all adults aged 45+ (or 30+ for Aboriginal/Torres Strait Islander) to guide treatment decisions"}},{"name":"Peripheral Vascular Disease / Atherosclerosis","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiovascular (Vascular)","sections":{"Cause / Aetiology":"\u2022 Atherosclerosis: lipid deposition \u2192 foam cell formation \u2192 fibrous plaque \u2192 calcification \u2192 progressive luminal stenosis in peripheral arteries\n\u2022 Most commonly affects infrainguinal arteries (superficial femoral artery most common), aortoiliac segment, tibial arteries (especially in diabetics)\n\u2022 Reduced distal perfusion \u2192 ischaemia at rest or with exercise (supply-demand mismatch)\n\u2022 Acute-on-chronic: plaque rupture or thrombosis can convert chronic PAD to acute limb ischaemia\n\u2022 Pathophysiology shared with IHD and cerebrovascular disease --- PAD is a marker of systemic atherosclerosis","Risk Factors":"\u2022 Smoking (strongest modifiable RF --- OR \\~3--4); diabetes mellitus (especially tibial disease and neuropathy)\n\u2022 Hypertension, dyslipidaemia, age (>50), male sex, positive family history\n\u2022 Chronic kidney disease, obesity, hyperhomocysteinaemia\n\u2022 Diabetes and smoking combined \u2192 very high risk of critical limb-threatening ischaemia (CLTI) and amputation\n\u2022 ABI \u22640.9 indicates PAD; \u22640.5 indicates severe PAD","Symptoms (History)":"\u2022 Intermittent claudication: reproducible calf/thigh/buttock pain with exercise, relieves with rest (2--5 min); Fontaine classification (I--IV); Edinburgh Claudication Questionnaire\n\u2022 Rest pain: ischaemic pain in forefoot, relieved by hanging leg dependent (gravity-assisted flow), worse at night --- indicates critical limb-threatening ischaemia (CLTI)\n\u2022 Tissue loss: non-healing ulcers (typically over pressure points, toes, heel), gangrene --- Rutherford category 5--6\n\u2022 Fontaine I: asymptomatic; II: claudication; III: rest pain; IV: tissue loss","Treatment":"\u2022 Cardiovascular risk reduction (all patients): antiplatelet therapy (aspirin 100 mg/day or clopidogrel 75 mg/day --- clopidogrel superior per CAPRIE); high-dose statin; antihypertensive (ACE inhibitor preferred); smoking cessation (most impactful); strict glycaemic control\n\u2022 Low-dose rivaroxaban 2.5 mg BD + aspirin 100 mg: reduces MACE and MALE in symptomatic PAD (COMPASS trial); consider in high-risk patients\n\u2022 Claudication: supervised exercise program first-line (30 min, 3\u00d7/week, minimum 12 weeks --- superior to endovascular in some trials); cilostazol (if not available on PBS) improves walking distance\n\u2022 CLTI: urgent revascularisation to prevent limb loss --- endovascular (angioplasty \u00b1 stenting) preferred for aortoiliac and favourable femoropopliteal disease; bypass surgery (autologous vein preferred) for infrapopliteal disease or failed endovascular\n\u2022 Wound care: debridement, offloading, infection control (antibiotics for infected wounds)\n\u2022 Multidisciplinary limb salvage team: vascular surgeon, endocrinologist/podiatrist (diabetic foot), wound nurse, rehabilitation\n\u2022 Amputation: last resort when limb non-viable or revascularisation not feasible","Investigations":"\u2022 ABI (with Doppler): first-line non-invasive assessment; exercise ABI if resting ABI normal but symptoms suspicious\n\u2022 Duplex ultrasound: anatomical mapping of stenoses/occlusions; assess suitability for intervention\n\u2022 CT angiography (CTA): pre-operative planning; arterial anatomy from aorta to feet\n\u2022 MR angiography: alternative if contrast allergy or CKD (gadolinium with caution)\n\u2022 Conventional angiography (DSA): gold standard for intervention planning; used at time of endovascular procedure\n\u2022 FBC, UEC, glucose, HbA1c, lipids, coagulation studies; wound swab/culture if ulceration"}},{"name":"Acute Arterial Occlusion","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiovascular (Vascular)","sections":{"Cause / Aetiology":"\u2022 Embolism (most common): cardiac source --- AF with LA thrombus, post-MI mural thrombus, prosthetic valve, IE; lodges at arterial bifurcations (femoral bifurcation most common --- 'saddle embolus')\n\u2022 Thrombosis in situ: acute-on-chronic PAD --- plaque rupture or progressive narrowing; less abrupt onset than embolism\n\u2022 Trauma: arterial injury (penetrating, blunt, iatrogenic --- post-catheterisation)\n\u2022 Aortic dissection: propagation into iliac arteries\n\u2022 Rare: hypercoagulable states (antiphospholipid syndrome, malignancy), arteritis, popliteal artery entrapment","Risk Factors":"\u2022 AF (most important --- 70--80% of embolic events), recent MI, prosthetic heart valves\n\u2022 Pre-existing PAD (thrombosis in situ), aortic aneurysm (thrombus)\n\u2022 Hypercoagulable states, malignancy, prolonged immobility\n\u2022 Post-procedure: post-cardiac catheterisation, post-IABP","Symptoms (History)":"\u2022 Classic 6 Ps: Pain (acute severe), Pallor, Pulselessness, Paraesthesia, Paralysis, Poikilothermia (perishingly cold)\n\u2022 Embolic: abrupt onset; no prior claudication history; contralateral limb normal\n\u2022 Thrombotic: subacute onset; prior history of claudication; may have collateral circulation\n\u2022 Paraesthesia and paralysis indicate advanced ischaemia (nerve and muscle involvement) --- time-critical finding\n\u2022 Upper limb: less common; brachial artery most frequently affected; suspect cardiac source","Treatment":"\u2022 Immediate: IV heparin (5000 U bolus then infusion) to prevent propagation; analgesia; keep limb horizontal (not elevated)\n\u2022 Surgical embolectomy: Fogarty balloon catheter via arteriotomy --- standard treatment for embolic occlusion; rapid restoration of flow\n\u2022 Catheter-directed thrombolysis (CDT): viable for Rutherford I--IIa; slower onset (12--24h); contraindicated in IIb (too slow) and III (futile)\n\u2022 Urgent revascularisation (PCI or bypass) for thrombotic occlusion\n\u2022 Post-reperfusion monitoring: compartment syndrome risk --- measure compartment pressures; fasciotomy if >30 mmHg or clinical features\n\u2022 Reperfusion injury: hyperkalaemia, myoglobinuria (risk of acute kidney injury) --- IV fluids, urinary alkalinisation, monitor electrolytes\n\u2022 Treat underlying cause: anticoagulation for AF; echocardiogram to identify cardiac source; long-term anticoagulation for embolic aetiology\n\u2022 Amputation: Rutherford III with no viable tissue; also if revascularisation fails","Investigations":"\u2022 Urgent: FBC, UEC, coagulation, group and hold, ECG (AF?), 12-lead ECG, CXR\n\u2022 Duplex Doppler ultrasound: rapid bedside assessment of arterial flow\n\u2022 CT angiography: anatomical localisation if time permits (Rutherford IIa--IIb)\n\u2022 Echocardiography: identify cardiac source of embolism (LV thrombus, LA/LAA thrombus)\n\u2022 Arterial blood gas: lactate elevation suggests limb ischaemia; monitor for compartment syndrome post-reperfusion\n\u2022 Do not delay treatment for investigations in Rutherford IIb --- immediate theatre"}},{"name":"Aortic Aneurysm","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiovascular (Vascular)","sections":{"Cause / Aetiology":"\u2022 Abdominal Aortic Aneurysm (AAA): localised dilation >3.0 cm diameter (normal aorta <2.0 cm); >95% infrarenal; majority due to degenerative atherosclerotic disease \u2192 medial degeneration, \u2193elastin/collagen \u2192 progressive dilatation\n\u2022 Risk of rupture increases exponentially with size: <4 cm \\~0.5%/year; 5--6 cm \\~3--4%/year; >6 cm >10%/year\n\u2022 Thoracic Aortic Aneurysm (TAA): ascending (Marfan's, bicuspid AV, HTN, giant cell arteritis); descending (atherosclerosis, HTN)\n\u2022 Mycotic aneurysm: rare --- infected aortic wall (Salmonella, Staph); rapidly enlarging, irregular; fever\n\u2022 Inflammatory aneurysm (\\~5%): periaortic inflammation/fibrosis; associated with IgG4 disease","Risk Factors":"\u2022 AAA: male sex (6\u00d7 more common), age >65, smoking (strongest RF --- risk proportional to pack-years), family history (1st-degree relative with AAA), hypertension, atherosclerosis, dyslipidaemia\n\u2022 Screening (Australia/ESVS 2024): ultrasound for men \u226565 with smoking history; men \u226575 regardless of smoking; 1st-degree relatives \u226550 years if index family member has AAA\n\u2022 TAA: Marfan's syndrome, bicuspid AV, Turner syndrome, Loeys-Dietz syndrome, HTN\n\u2022 Protective: female sex, diabetes (paradoxically --- uncertain mechanism)","Symptoms (History)":"\u2022 Majority asymptomatic --- found on incidental imaging or screening ultrasound\n\u2022 Symptomatic (expanding/impending rupture): new-onset back/flank/abdominal pain; abdominal/pulsatile mass tenderness\n\u2022 Ruptured AAA: sudden severe abdominal/back/flank pain \u2192 haemodynamic collapse (classic triad: pain + pulsatile mass + hypotension); high mortality; may be temporarily sealed by retroperitoneal haematoma\n\u2022 Complications: distal embolisation (blue toe syndrome, livedo reticularis), thrombosis, fistula (aorto-enteric or aorto-caval)\n\u2022 TAA: often asymptomatic; large ascending aneurysm \u2192 AR murmur, dysphagia, hoarseness (RLN compression)","Treatment":"\u2022 Cardiovascular risk reduction for all: smoking cessation (slows growth), statin, antiplatelet, antihypertensive (target SBP <130 mmHg)\n\u2022 Elective repair thresholds: men \u22655.5 cm; women \u22655.0 cm; rapid growth >1 cm/year; symptomatic AAA regardless of size\n\u2022 Endovascular repair (EVAR): preferred modality for suitable anatomy; lower 30-day mortality than open repair; same long-term mortality at 15 years; requires lifelong surveillance with CTA/duplex\n\u2022 Open surgical repair (OSR): indicated if anatomy unsuitable for EVAR; more durable; preferred in young low-risk patients; high perioperative mortality risk in elderly/comorbid\n\u2022 Ruptured AAA: activate massive transfusion protocol; permissive hypotension (SBP \\~70--90 mmHg) until vascular control; EVAR if anatomy suitable (haemodynamically stable); emergency open repair if unstable or EVAR unsuitable; high mortality (40--50% overall)\n\u2022 TAA: ascending repair at \u226555 mm (Class I per 2024 ESC); descending TEVAR for complicated type B (vs medical for uncomplicated)","Investigations":"\u2022 Ultrasound: first-line for screening and surveillance (antero-posterior diameter); sensitive for AAA but poor for rupture\n\u2022 CT angiography (CTA): gold standard for preoperative planning --- size, morphology, neck length/angle, iliac arteries, access vessels; also identifies rupture, thrombus, inflammatory changes\n\u2022 Plain AXR: may show calcified aortic wall ('egg-shell' appearance) --- not sensitive; historical\n\u2022 Surveillance intervals (per RACGP/ESVS): <3.0 cm: 5-yearly; 3.0--3.9 cm: 3-yearly; 4.0--4.9 cm: 12-monthly; 5.0--5.4 cm: 6-monthly; \u22655.5 cm in men / \u22655.0 cm in women \u2192 refer for repair\n\u2022 FBC, UEC, coagulation, group and crossmatch pre-operatively"}},{"name":"Aortic Dissection","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiovascular (Vascular)","sections":{"Cause / Aetiology":"\u2022 Tear in aortic intima \u2192 blood tracks within the media creating a true and false lumen\n\u2022 Stanford Type A: involves ascending aorta \u00b1 arch \u00b1 descending (surgical emergency --- 1--2% per hour mortality untreated)\n\u2022 Stanford Type B: originates distal to left subclavian artery, does not involve ascending aorta (primarily medical management)\n\u2022 DeBakey: Type I (ascending + descending), Type II (ascending only), Type III (descending only)\n\u2022 Pathophysiology: medial degeneration (cystic medial necrosis) \u2192 intimal tear (often at high shear stress areas) \u2192 dissection propagates antegradely/retrogradely\n\u2022 Triggering events: severe hypertension, cocaine/amphetamine use, intense Valsalva manoeuvre, trauma","Risk Factors":"\u2022 Hypertension (most common RF --- present in 70--80% of type B)\n\u2022 Connective tissue disorders: Marfan's syndrome (FBN1 mutation), Loeys-Dietz, Ehlers-Danlos Type IV\n\u2022 Bicuspid aortic valve, coarctation of aorta, Turner syndrome\n\u2022 Aortitis: giant cell arteritis, Takayasu's arteritis, syphilitic aortitis\n\u2022 Iatrogenic: post-cardiac catheterisation, aortic valve surgery, IABP insertion\n\u2022 Male sex, age 50--70; pregnancy (third trimester/peripartum)","Symptoms (History)":"\u2022 Sudden onset ('thunderclap') tearing/ripping chest pain, maximal at onset --- may radiate to back (between scapulae), neck, jaw, abdomen, or legs depending on extent\n\u2022 Type A complications: aortic regurgitation (acute pulmonary oedema), coronary ostia involvement (inferior STEMI --- beware thrombolysis!), cerebral malperfusion (stroke), pericardial tamponade, cardiac failure\n\u2022 Type B complications: renal malperfusion (haematuria, AKI), mesenteric ischaemia (abdominal pain, peritonitis), limb ischaemia, spinal cord ischaemia (paraplegia)\n\u2022 May mimic ACS --- consider before giving antiplatelet/thrombolytic therapy\n\u2022 ADD-RS (Aortic Dissection Detection Risk Score) + D-dimer: used to risk-stratify in low-probability cases","Treatment":"\u2022 Immediate: pain control (IV opioids); anti-impulse therapy --- target HR 60--80 bpm and SBP 100--120 mmHg (right arm); IV beta-blocker first-line (labetalol, esmolol); add IV sodium nitroprusside or nitroglycerine if BP not controlled (do not use vasodilator alone without beta-blocker --- reflex tachycardia worsens dissection)\n\u2022 Type A: surgical emergency --- open repair of ascending aorta \u00b1 arch \u00b1 AVR \u00b1 coronary ostia repair; mortality 10--30% in high-volume centres\n\u2022 Uncomplicated Type B: medical management (anti-impulse therapy; optimise BP long-term); TEVAR not recommended routinely but superior outcomes over medical therapy in some series\n\u2022 Complicated Type B (malperfusion, rupture, refractory pain, rapid expansion): urgent TEVAR (thoracic endovascular aortic repair) to seal entry tear; open surgery if TEVAR not feasible\n\u2022 Avoid anticoagulation in dissection without clear indication (risk of haemorrhagic extension)\n\u2022 Long-term: lifelong anti-hypertensive therapy (target BP <130/80 mmHg); beta-blocker continued; serial CTA surveillance (6 weeks, 6 months, then annually); genetic counselling if connective tissue disorder suspected","Investigations":"\u2022 ECG: rule out ACS (can show inferior ST elevation if RCA involved --- do not thrombolyse!); usually non-specific changes\n\u2022 CXR: mediastinal widening (>8 cm at aortic knuckle), pleural effusion, displaced calcification; normal CXR does not exclude dissection\n\u2022 CT angiography (CTA): investigation of choice in haemodynamically stable --- defines type, extent, false lumen, malperfused branches (sensitivity \\~98%)\n\u2022 Transoesophageal echocardiography (TOE): use in haemodynamically unstable; identifies dissection flap, AR, tamponade, LV function; can be performed in theatre pre-operatively\n\u2022 D-dimer: <500 ng/mL rules out dissection in low-risk patients (ADD-RS 0); not reliable in high-risk\n\u2022 FBC, UEC, LFTs, coagulation, troponin (myocardial involvement), group and crossmatch"}},{"name":"Carotid Stenosis","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiovascular (Vascular)","sections":{"Cause / Aetiology":"\u2022 Atherosclerotic plaque at carotid bifurcation/internal carotid artery origin \u2192 luminal narrowing\n\u2022 Embolic stroke/TIA: plaque rupture \u2192 thrombus/cholesterol emboli \u2192 middle cerebral artery territory ischaemia\n\u2022 Haemodynamic ischaemia: severe stenosis (>70%) with hypoperfusion, particularly if poor collateral circulation\n\u2022 Artery-to-artery embolism is the predominant mechanism\n\u2022 Less common causes: carotid artery dissection (spontaneous or traumatic), radiation-induced arteritis, fibromuscular dysplasia","Risk Factors":"\u2022 Atherosclerotic risk factors: hypertension, dyslipidaemia, smoking, diabetes, age, male sex, family history\n\u2022 Prior stroke or TIA (symptomatic disease significantly increases recurrent stroke risk)\n\u2022 Established cardiovascular disease (IHD, PAD)\n\u2022 Carotid dissection: young age, connective tissue disorders, chiropractic manipulation, whiplash","Symptoms (History)":"\u2022 Asymptomatic: incidental finding (carotid bruit, neck imaging for other reasons)\n\u2022 Symptomatic: TIA or stroke in carotid territory --- contralateral arm/face weakness, aphasia (dominant hemisphere), amaurosis fugax (transient ipsilateral monocular blindness --- 'curtain coming down')\n\u2022 TIA: symptoms resolve completely within 24h (often minutes); do not dismiss --- high early stroke risk (ABCD2 score for risk stratification)\n\u2022 Crescendo TIAs: multiple recurrent TIAs --- very high imminent stroke risk","Treatment":"\u2022 Best medical therapy (BMT) --- all patients: antiplatelet (aspirin 100 mg/day; or clopidogrel 75 mg/day); high-intensity statin (target LDL-C <1.8 mmol/L for established CVD); antihypertensive; smoking cessation; diabetes management\n\u2022 Symptomatic carotid stenosis (50--99% NASCET): carotid endarterectomy (CEA) --- gold standard; benefit greatest for 70--99% stenosis; aim to perform within 2 weeks of index TIA/stroke (not immediately after major stroke); continue antiplatelet perioperatively (do not withhold)\n\u2022 CEA surgical technique: patch angioplasty preferred over primary closure; shunting based on surgeon preference/intraoperative monitoring\n\u2022 Carotid artery stenting (CAS): reserved for anatomically/medically unsuitable for CEA ('hostile neck', post-radiation, contralateral occlusion, cardiac co-morbidity); higher peri-procedural stroke risk than CEA (particularly in >70 years)\n\u2022 Asymptomatic stenosis \u226570% (<75 years): consider referral to vascular surgery for CEA discussion (modest benefit on NNT basis); BMT alone is reasonable option especially in older/higher-risk patients\n\u2022 Asymptomatic 50--69%: annual CDUS surveillance + BMT; no surgery evidence\n\u2022 Chronic total occlusion: BMT only; revascularisation not beneficial","Investigations":"\u2022 Carotid duplex ultrasound (CDUS): first-line --- degree of stenosis (NASCET criteria), plaque characteristics, flow velocities; serial surveillance for asymptomatic disease\n\u2022 CTA/MRA of carotid arteries: confirmatory imaging pre-operatively; defines anatomy, plaque calcification, aortic arch\n\u2022 CT brain (non-contrast): exclude haemorrhage; may show infarct\n\u2022 MRI brain (DWI): detects acute/subacute infarct; superior sensitivity to CT for posterior fossa\n\u2022 ECG + Holter: exclude AF as cardiac source\n\u2022 TTE/TOE: if cardiac source suspected\n\u2022 Fasting lipids, glucose, HbA1c, FBC, coagulation"}},{"name":"Varicose Veins","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiovascular (Vascular)","sections":{"Cause / Aetiology":"\u2022 Incompetence of venous valves \u2192 venous reflux (retrograde flow) \u2192 venous hypertension \u2192 progressive variceal dilatation\n\u2022 Primary (idiopathic): intrinsic valve and venous wall weakness; sapheno-femoral junction (SFJ) or sapheno-popliteal junction (SPJ) incompetence most common; great saphenous vein (GSV) most commonly involved\n\u2022 Secondary: post-DVT (post-thrombotic syndrome --- valve destruction), pelvic/ovarian vein reflux (pelvic congestion syndrome), external compression (pelvic mass, pregnancy, obesity)\n\u2022 CEAP classification: C0 (no visible disease) \u2192 C6 (active venous ulcer)\n\u2022 Chronic venous hypertension \u2192 leakage of red cells and fibrin \u2192 lipodermatosclerosis, haemosiderin deposition, venous eczema, ulceration","Risk Factors":"\u2022 Female sex (2--3\u00d7 more common), obesity, prolonged standing (occupational), multiparity (pregnancy increases venous pressure + progesterone-mediated vascular smooth muscle relaxation)\n\u2022 Family history of varicose veins (50% with bilateral disease have positive family history)\n\u2022 Previous DVT (post-thrombotic valve destruction)\n\u2022 Age (increasing prevalence), ethnicity (more common in Western populations)","Symptoms (History)":"\u2022 Cosmetic concerns: visible dilated, tortuous, superficial veins (GSV territory --- medial leg/thigh)\n\u2022 Aching, heaviness, throbbing, or fatigue in legs --- worse with prolonged standing/heat, better with elevation and walking\n\u2022 Pruritus over varicosities; dependent oedema (ankle)\n\u2022 Complications: superficial thrombophlebitis (painful, tender, indurated vein), bleeding (variceal rupture), skin changes (lipodermatosclerosis, atrophie blanche, venous eczema), venous ulceration (typically medial gaiter area)\n\u2022 Ask about DVT history, prior treatments, pregnancy, occupation","Treatment":"\u2022 Conservative: compression stockings (Class 2, 23--32 mmHg) --- reduce symptoms and oedema; leg elevation; weight loss; occupational advice; not curative\n\u2022 Endovenous thermal ablation (EVLA or RFA): preferred first-line for GSV/SSV trunk incompetence (per NICE UK, European guidelines, RACGP); performed under tumescent local anaesthesia; success rate 90--95% at 5 years; covered by Medicare (MBS item numbers available)\n\u2022 Ultrasound-guided foam sclerotherapy (UGFS): effective for SFJ/SPJ incompetence and recurrences; maximum 8 mL foam per session; can be combined with EVLA/RFA; not recommended as sole treatment for saphenous trunk incompetence\n\u2022 VenaSeal (cyanoacrylate glue): no compression stockings required post-procedure; emerging option\n\u2022 Surgical ligation and stripping: gold standard historically; now less preferred than endovenous techniques; used for very large varicosities, anatomic variants unsuitable for endovenous, or recurrence\n\u2022 Phlebectomies (stab avulsions): adjunct for symptomatic tributary varicosities\n\u2022 Venous ulcer management: four-layer compression bandaging; wound debridement; exclude arterial disease (ABI >0.8 needed for full compression); consider intervention on underlying superficial venous incompetence","Investigations":"\u2022 Duplex ultrasound (CDUS): gold standard --- identifies incompetent junctions and perforators, reflux duration >0.5s abnormal; distinguishes GSV from SSV incompetence; essential before any intervention\n\u2022 ABIs: measure if venous ulcer present to exclude arterial disease before compression therapy\n\u2022 Coagulation studies, FBC: if planning intervention\n\u2022 MRI/CT venography: if suspected pelvic source (pelvic congestion syndrome), IVC thrombosis, or recurrent disease after prior surgery"}},{"name":"Deep Vein Thrombosis / Pulmonary Embolism","stars":3,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiovascular (Vascular)","sections":{"Cause / Aetiology":"\u2022 Virchow's triad: venous stasis, hypercoagulability, endothelial injury\n\u2022 DVT: most commonly in deep veins of calf \u2192 propagates proximally to popliteal, femoral, iliac veins; proximal DVT has highest risk of PE\n\u2022 PE: thrombus embolises from deep veins \u2192 obstructs pulmonary artery \u2192 right heart strain \u2192 haemodynamic compromise; massive PE \u2192 obstructive shock \u2192 cardiac arrest\n\u2022 Provoked: identifiable risk factor (surgery, malignancy, immobility, OCP, pregnancy, hospitalisation)\n\u2022 Unprovoked: no identifiable trigger \u2192 higher recurrence risk; consider occult malignancy, thrombophilia\n\u2022 Pathophysiology: RV afterload increase \u2192 RV dilatation and failure \u2192 paradoxical septal shift \u2192 reduced LV preload \u2192 haemodynamic collapse","Risk Factors":"\u2022 Major: recent major surgery (especially orthopaedic --- total hip/knee replacement), trauma, immobility >3 days, active malignancy, pregnancy and postpartum period, previous DVT/PE\n\u2022 Moderate: OCP/HRT use, long-haul flights (>8 hours), prolonged hospitalisation, obesity, heart failure, IBD\n\u2022 Inherited thrombophilias: Factor V Leiden (most common), Prothrombin G20210A, Protein C/S deficiency, Antithrombin deficiency, antiphospholipid syndrome\n\u2022 Wells score for DVT and PE: pre-test probability assessment to guide investigation strategy","Symptoms (History)":"\u2022 DVT: unilateral leg swelling (>3 cm circumference difference), erythema, warmth, tenderness along deep venous system, distension of superficial veins; Homan's sign unreliable (poor sensitivity/specificity)\n\u2022 Upper limb DVT: arm swelling, may be effort-induced (Paget-Schroetter syndrome) or catheter-related\n\u2022 PE: dyspnoea (most common), pleuritic chest pain, haemoptysis, tachycardia; massive PE: syncope, haemodynamic collapse (SBP <90 mmHg), cardiac arrest\n\u2022 Submassive PE: RV dysfunction without haemodynamic compromise; subacute PE: gradual dyspnoea/exertional limitation\n\u2022 Consider PE in any unexplained tachycardia or hypoxia","Treatment":"\u2022 DVT/PE anticoagulation (THANZ/Australian Prescriber guidelines): direct oral anticoagulants (DOACs) preferred --- rivaroxaban (15 mg BD \u00d7 3 weeks then 20 mg daily) or apixaban (10 mg BD \u00d7 7 days then 5 mg BD); warfarin as alternative (INR 2--3) bridged with LMWH\n\u2022 Duration: 3 months for provoked VTE; extended/indefinite for unprovoked proximal DVT/PE (reassess benefits vs bleeding at 3 months); indefinite for antiphospholipid syndrome, active malignancy (LMWH or DOAC)\n\u2022 Massive PE (haemodynamically unstable): systemic thrombolysis (alteplase 100 mg IV over 2h) if SBP <90 mmHg or cardiac arrest with suspected PE; anticoagulate with UFH infusion around thrombolysis; surgical or catheter-directed embolectomy if thrombolysis contraindicated\n\u2022 Submassive PE (RV dysfunction + normotensive): UFH + monitor; consider thrombolysis if deteriorating\n\u2022 LMWH (enoxaparin) preferred in malignancy-associated VTE; also used in renal failure (with dose adjustment)\n\u2022 Inferior vena cava (IVC) filter: reserved for absolute anticoagulation contraindication + acute VTE; retrievable filters preferred\n\u2022 Compression stockings: may reduce post-thrombotic syndrome symptoms in proximal DVT\n\u2022 Thrombophilia screening: consider for unprovoked PE/DVT, family history, age <50, recurrent VTE --- after completing acute anticoagulation","Investigations":"\u2022 D-dimer: use with Wells pre-test probability; if low probability + normal D-dimer \u2192 PE excluded (very high NPV); D-dimer elevated in many conditions (not specific)\n\u2022 Compression duplex ultrasound (CDUS): first-line for suspected DVT --- sensitivity 95% for proximal DVT; repeat in 5--7 days if negative but high suspicion\n\u2022 CTPA (CT pulmonary angiogram): gold standard for PE --- high sensitivity and specificity; assess RV dilatation\n\u2022 V/Q scan: preferred in pregnancy (lower fetal radiation dose), contrast allergy, or CKD\n\u2022 ECG: sinus tachycardia (most common); S1Q3T3 pattern (25%); new RBBB, AF; right heart strain pattern\n\u2022 ECHO (transthoracic or bedside): RV dilatation/hypokinesis (McConnell's sign); assess for thrombus in transit; useful in massive PE if CTPA not immediately available\n\u2022 Troponin, BNP/NT-proBNP: prognostic markers in PE (elevated = higher risk)\n\u2022 FBC, UEC, coagulation, group and hold; thrombophilia screen (after completing anticoagulation)"}},{"name":"Cardiac Tamponade","stars":1,"category":"Cardiac & Vascular Conditions","subcategory":"Cardiovascular (Vascular)","sections":{"Cause / Aetiology":"\u2022 Pericardial effusion accumulates under pressure \u2192 impairs diastolic ventricular filling \u2192 reduced cardiac output \u2192 obstructive shock\n\u2022 Haemodynamic compromise depends on rate of accumulation (acute: as little as 100--200 mL; chronic: tolerated up to 2 L)\n\u2022 Causes: malignancy (most common in medical patients --- lung, breast, lymphoma), pericarditis (viral, bacterial, TB, uraemic), trauma (penetrating > blunt), iatrogenic (post-cardiac catheterisation, post-cardiac surgery, post-pacing), aortic dissection (Type A \u2192 haemopericardium), Dressler's syndrome","Risk Factors":"\u2022 Malignancy (pericardial metastases), active infection, renal failure (uraemic pericarditis), recent cardiac procedures/surgery\n\u2022 Anticoagulation (haemopericardium), autoimmune disease (SLE, RA), hypothyroidism\n\u2022 Penetrating chest trauma; consider in any trauma patient with haemodynamic instability","Symptoms (History)":"\u2022 Dyspnoea (most common), chest pain/pressure, fatigue, orthopnoea\n\u2022 Sense of impending doom; anxiety\n\u2022 Rapid decompensation to haemodynamic collapse (particularly in acute/traumatic tamponade)\n\u2022 DDx: tension pneumothorax, massive PE, acute MI with cardiogenic shock","Treatment":"\u2022 Pericardiocentesis: definitive treatment --- needle aspiration under ultrasound guidance (subxiphoid or parasternal approach); small initial drainage (50--100 mL) can dramatically improve haemodynamics; leave pigtail catheter for ongoing drainage\n\u2022 Resuscitation: IV fluid bolus (to augment preload); avoid vasodilators; inotropes if required; high-flow oxygen\n\u2022 Traumatic/haemopericardium: surgical pericardial window or sternotomy preferred over needle aspiration (risk of needle penetration of cardiac chamber, clot cannot be aspirated)\n\u2022 Surgical pericardiectomy: for recurrent or loculated effusions; malignant pericardial disease\n\u2022 Treat underlying cause: antibiotics for bacterial pericarditis; dialysis for uraemia; manage malignancy\n\u2022 Post-procedure: send fluid for cytology, culture, glucose, protein, LDH, adenosine deaminase (TB)","Investigations":"\u2022 Bedside POCUS/echocardiogram: urgent --- pericardial effusion with RV diastolic collapse; IVC dilatation; respirophasic variation in transvalvular flow\n\u2022 ECG: sinus tachycardia; low voltage QRS complexes; electrical alternans (alternating QRS axis --- classic but insensitive)\n\u2022 CXR: enlarged globular cardiac silhouette (water bottle heart) if effusion >200--300 mL; often normal in acute\n\u2022 Do not delay pericardiocentesis for extensive workup in haemodynamically unstable patient"}},{"name":"Asthma","stars":3,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"\u2022 Chronic inflammatory airway disease with reversible airflow obstruction; driven by Th2-mediated eosinophilic inflammation and airway hyperresponsiveness\n\u2022 Multifactorial: genetic predisposition (atopy, ORMDL3/17q21 loci) + environmental triggers (allergens, viral URTIs, pollutants, occupational sensitisers)\n\u2022 Pathophysiology: allergen/irritant exposure \u2192 mast cell and eosinophil activation \u2192 bronchoconstriction, mucus hypersecretion, airway wall oedema \u2192 airflow obstruction; chronic remodelling leads to fixed obstruction if undertreated\n\u2022 Epidemiology: affects \\~2.8 million Australians (\\~11% prevalence); one of the most common chronic conditions managed in Australian primary care","Risk Factors":"\u2022 Personal or family history of atopy (eczema, allergic rhinitis, food allergy)\n\u2022 Exposure to indoor allergens (house dust mite, pet dander, cockroach, mould) --- especially in early childhood\n\u2022 Tobacco smoke exposure (active or passive); air pollution\n\u2022 Occupational sensitisers (isocyanates, flour dust, latex)\n\u2022 Obesity; female sex (post-puberty); prematurity/low birthweight\n\u2022 NSAID/aspirin sensitivity (Samter's triad); beta-blocker use","Symptoms (History)":"\u2022 Episodic wheeze, chest tightness, shortness of breath, and cough (often nocturnal or early morning)\n\u2022 Symptoms triggered by exercise, cold air, allergens, viral URTIs, irritants, or emotional stress\n\u2022 Variable pattern: symptom-free between episodes; worsening at night/early morning is characteristic\n\u2022 Acute exacerbation: increasing dyspnoea, wheeze, inability to complete sentences (severe); silent chest (life-threatening)\n\u2022 Chronic cough variant asthma: persistent cough as sole/dominant symptom\n\u2022 Ask about SABA use frequency, ED visits, oral corticosteroid courses, and school/work absence","Treatment":"\u2022 Australian Asthma Handbook (2025): first-line for adults/adolescents --- as-needed low-dose budesonide-formoterol (anti-inflammatory reliever \\[AIR\\] therapy); SABA-only therapy is no longer recommended\n\u2022 Step-up to MART (maintenance-and-reliever therapy) with budesonide-formoterol if frequent symptoms, recent exacerbation, or exacerbation risk factors; all patients need a Written Asthma Action Plan\n\u2022 Preventer options: inhaled corticosteroids (ICS) \u00b1 long-acting beta-2 agonist (LABA); step up/down based on symptom control\n\u2022 Add-on therapies for severe/uncontrolled asthma: long-acting muscarinic antagonist (LAMA), leukotriene receptor antagonist (LTRA), biologics (dupilumab, mepolizumab, benralizumab --- PBS-listed for severe eosinophilic asthma)\n\u2022 Acute exacerbation: inhaled salbutamol (or budesonide-formoterol) + ipratropium, systemic corticosteroids (prednisolone 37.5--50 mg/day for 5--7 days), supplemental O\u2082 (SpO\u2082 93--95%), IV magnesium sulphate (severe), consider ICU/intubation if life-threatening\n\u2022 Non-pharmacological: allergen avoidance, smoking cessation, weight loss (obese), annual influenza vaccine, review inhaler technique at every visit","Investigations":"\u2022 Spirometry: obstructive pattern (FEV\u2081/FVC <0.70); reversibility with salbutamol (\u226512% and \u2265200 mL improvement in FEV\u2081) confirms diagnosis\n\u2022 Peak flow monitoring: diurnal variability >20% supports asthma; useful for monitoring control\n\u2022 Bronchial provocation (methacholine/mannitol challenge): used when spirometry normal; high sensitivity for diagnosis\n\u2022 Fractional exhaled nitric oxide (FeNO): elevated (\u226525 ppb) suggests eosinophilic airway inflammation; guides ICS dosing\n\u2022 Skin-prick testing / specific IgE: identifies allergic triggers\n\u2022 CXR: usually normal; hyperinflation in acute severe; exclude pneumothorax, infection"}},{"name":"Chronic Obstructive Pulmonary Disease (COPD)","stars":3,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"\u2022 Preventable and treatable disease characterised by persistent, progressive airflow limitation due to small airway disease (obstructive bronchiolitis) and/or emphysema (parenchymal destruction)\n\u2022 Primary cause: cigarette smoking (>90% of cases in Australia); results in chronic airway inflammation (neutrophilic/macrophage-mediated), oxidative stress, and protease-antiprotease imbalance leading to alveolar destruction\n\u2022 Other causes: occupational dusts/fumes (coal, silica, grain), biomass fuel smoke, indoor/outdoor air pollution; alpha-1 antitrypsin deficiency (panacinar emphysema, especially lower lobes)\n\u2022 Epidemiology: \\~1 in 13 Australians aged >40 years; leading cause of preventable hospitalisation in Australia","Risk Factors":"\u2022 Cigarette smoking (dose-dependent; >10 pack-year history); passive smoke exposure\n\u2022 Occupational exposures: dust, chemicals, fumes (miners, farmers, construction workers)\n\u2022 Alpha-1 antitrypsin deficiency (consider in young non-smokers with emphysema)\n\u2022 Recurrent childhood respiratory infections; low socioeconomic status; low birth weight\n\u2022 Indoor air pollution (biomass combustion); outdoor air pollution\n\u2022 Age >40 years; male sex (historically); Indigenous Australians have higher prevalence","Symptoms (History)":"\u2022 Progressive exertional dyspnoea --- the cardinal symptom; often initially dismissed as 'getting old'\n\u2022 Chronic productive cough (often morning); chronic bronchitis defined as productive cough \u22653 months/year for \u22652 consecutive years\n\u2022 Wheeze (variable); chest tightness\n\u2022 Exacerbations: acute worsening of dyspnoea, increased sputum volume/purulence (AECOPD); triggered by viral/bacterial URTI, air pollution, or non-adherence to medication\n\u2022 Advanced disease: weight loss, anorexia, ankle swelling (cor pulmonale), cyanosis, fatigue","Treatment":"\u2022 Smoking cessation is the single most effective intervention to slow disease progression (varenicline first-line in Australia)\n\u2022 Bronchodilators (first-line pharmacotherapy): short-acting beta-2 agonist (SABA) + short-acting muscarinic antagonist (SAMA) for rescue; long-acting bronchodilators (LABA and/or LAMA) as maintenance per COPD-X stepwise approach\n\u2022 ICS: only if frequent exacerbations + FEV\u2081 <50% + blood eosinophils \u2265300 cells/\u00b5L; avoid ICS monotherapy in COPD\n\u2022 Triple therapy (LABA/LAMA/ICS) for selected patients with exacerbation risk and eosinophilic inflammation\n\u2022 Pulmonary rehabilitation: improves exercise capacity and quality of life; recommended for all with functional limitation\n\u2022 AECOPD: short-acting bronchodilators, prednisolone 37.5 mg/day \u00d7 5 days, antibiotics only if purulent sputum + increased dyspnoea (amoxicillin-clavulanate or doxycycline per local guidelines); controlled O\u2082 to SpO\u2082 88--92%; NIV for hypercapnic respiratory failure\n\u2022 LTOT (>15 h/day): if PaO\u2082 \u226455 mmHg or \u226459 mmHg with polycythaemia/cor pulmonale; improves survival\n\u2022 Vaccinations: annual influenza, 5-yearly pneumococcal (23vPPV), COVID-19; referral for palliative care in end-stage disease; advance care planning","Investigations":"\u2022 Spirometry (mandatory for diagnosis): post-bronchodilator FEV\u2081/FVC <0.70; GOLD staging: GOLD 1 (FEV\u2081 \u226580%), GOLD 2 (50--79%), GOLD 3 (30--49%), GOLD 4 (<30%)\n\u2022 CXR: hyperinflation, flattened diaphragms, increased retrosternal airspace, bullae, attenuated vascular markings\n\u2022 CT chest (HRCT): quantifies emphysema distribution, detects bronchiectasis, screens for lung cancer\n\u2022 ABG: hypoxaemia and/or hypercapnia in advanced disease; guide for long-term oxygen therapy (LTOT)\n\u2022 FBC: polycythaemia (chronic hypoxaemia); ECG/echo: cor pulmonale, right ventricular hypertrophy\n\u2022 Alpha-1 antitrypsin level in younger patients (<45 years) or minimal smoking history"}},{"name":"Pneumonia","stars":3,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"\u2022 Acute infection of lung parenchyma (alveoli and interstitium) causing consolidation/inflammatory exudate\n\u2022 Community-acquired pneumonia (CAP): most common; Streptococcus pneumoniae (most common bacterial cause), Mycoplasma pneumoniae, Haemophilus influenzae, Legionella pneumophila, respiratory viruses (influenza, SARS-CoV-2, RSV)\n\u2022 Hospital-acquired pneumonia (HAP, \u226548 h after admission): Gram-negative organisms (Klebsiella, Pseudomonas), Staphylococcus aureus (including MRSA)\n\u2022 Aspiration pneumonia: anaerobes, Gram-negatives; risk in reduced consciousness, dysphagia\n\u2022 Atypical organisms (Mycoplasma, Chlamydophila, Legionella): less abrupt onset, extrapulmonary features","Risk Factors":"\u2022 Age extremes (<5 years, >65 years); institutionalised patients (RACF residents)\n\u2022 Immunocompromised: HIV, organ transplant, chemotherapy, long-term corticosteroids\n\u2022 Chronic comorbidities: COPD, heart failure, diabetes mellitus, chronic kidney disease, liver disease\n\u2022 Cigarette smoking and alcohol misuse\n\u2022 Aspiration risk: stroke, dementia, Parkinson's disease, dysphagia, reduced GCS\n\u2022 Prior influenza infection; lack of pneumococcal or influenza vaccination","Symptoms (History)":"\u2022 Acute fever, rigors, pleuritic chest pain (localised to consolidation site)\n\u2022 Productive cough: purulent sputum (yellow/green; 'rusty' sputum classic for S. pneumoniae); may be absent in elderly\n\u2022 Dyspnoea and tachypnoea; myalgia, malaise, anorexia\n\u2022 Atypical (Mycoplasma): gradual onset, dry cough, headache, rash (erythema multiforme), extrapulmonary features\n\u2022 Legionella: high fever, GI symptoms (diarrhoea, nausea), confusion, hyponatraemia\n\u2022 Elderly may present atypically: confusion (delirium), falls, functional decline without classic respiratory symptoms","Treatment":"\u2022 Low-severity CAP (outpatient): amoxicillin 1 g TDS \u00d7 5 days (Australian first-line); add doxycycline 100 mg BD if atypical suspected; azithromycin for penicillin allergy\n\u2022 Moderate-severity CAP (inpatient, general ward): IV benzylpenicillin + doxycycline (or azithromycin) per Australian Therapeutic Guidelines; switch to oral when clinically improving\n\u2022 High-severity CAP (ICU): IV ceftriaxone + azithromycin (or moxifloxacin if allergy); cover Legionella; consider anti-MRSA if risk factors\n\u2022 Supportive: O\u2082 to maintain SpO\u2082 93--95% (88--92% if COPD); IV fluids if septic; analgesia for pleuritic pain; early mobilisation\n\u2022 Aspiration pneumonia: add metronidazole or use amoxicillin-clavulanate to cover anaerobes\n\u2022 Influenza: oseltamivir within 48 hours if influenza-associated CAP\n\u2022 Prevention: pneumococcal vaccine (13vPCV + 23vPPV), annual influenza vaccine, smoking cessation","Investigations":"\u2022 CXR: lobar or segmental consolidation, air bronchograms; may be normal early or in dehydrated/neutropenic patients; repeat CXR at 6 weeks in all patients >40 years or smokers to exclude malignancy\n\u2022 FBC: leucocytosis (neutrophilia) or leucopenia (severe/viral); CRP elevated; procalcitonin (bacterial vs viral)\n\u2022 Sputum M/C/S, blood cultures (if hospitalised or moderate--severe disease): low yield but essential\n\u2022 Legionella and pneumococcal urinary antigen: recommended in moderate--high severity\n\u2022 Serology/nasopharyngeal PCR: influenza, COVID-19, Mycoplasma\n\u2022 ABG or VBG: assess respiratory failure; U&E, LFT, BSL (comorbidities and severity)"}},{"name":"Pleural Effusion","stars":3,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"\u2022 Abnormal accumulation of fluid in the pleural space (normally 10--15 mL)\n\u2022 Transudate (protein-poor, LDH-poor): impaired Starling forces --- heart failure (commonest cause overall), cirrhosis/hepatic hydrothorax, nephrotic syndrome, peritoneal dialysis\n\u2022 Exudate (protein-rich): pleural inflammation or lymphatic obstruction --- pneumonia (parapneumonic effusion), malignancy (lung, breast, lymphoma), pulmonary embolism, TB, autoimmune (RA, SLE), post-cardiac surgery, pancreatitis\n\u2022 Light's criteria (exudate): pleural:serum protein >0.5, pleural:serum LDH >0.6, or pleural LDH >2/3 upper limit normal serum LDH\n\u2022 Malignant effusions: commonest causes are lung, breast, ovarian cancer, lymphoma","Risk Factors":"\u2022 Heart failure, cirrhosis, renal failure (transudates)\n\u2022 Active malignancy, especially lung and breast cancer\n\u2022 Pneumonia or recent thoracic surgery/intervention\n\u2022 Autoimmune disease (SLE, rheumatoid arthritis)\n\u2022 History of asbestos exposure (mesothelioma)\n\u2022 PE/DVT; tuberculosis exposure or immunocompromise","Symptoms (History)":"\u2022 Dyspnoea (proportional to size; large effusions cause severe dyspnoea at rest)\n\u2022 Pleuritic chest pain: sharp, worse with inspiration and movement (indicates pleural inflammation --- suggests exudate)\n\u2022 Dry, non-productive cough (diaphragmatic irritation)\n\u2022 Orthopnoea if bilateral or large effusion\n\u2022 Symptoms of underlying cause: peripheral oedema (CCF), fever/productive cough (parapneumonic), weight loss/haemoptysis (malignancy), night sweats (TB)","Treatment":"\u2022 Treat underlying cause (diuretics for CCF, antibiotics for parapneumonic effusion)\n\u2022 Simple parapneumonic effusion: antibiotics alone; complicated/empyema: chest drain (ICD) + intrapleural tPA/DNase if loculated, VATS decortication if failing\n\u2022 Therapeutic thoracentesis: for symptomatic large effusions; drain maximum 1.5 L per session to avoid re-expansion pulmonary oedema\n\u2022 Malignant effusion: therapeutic thoracentesis; consider indwelling pleural catheter (IPC/PleurX) or pleurodesis (talc via VATS or bedside for recurrent effusions); pleurodesis \\~50% effective\n\u2022 Transudates: address underlying condition --- optimise heart failure/diuresis, treat liver/renal disease","Investigations":"\u2022 CXR PA: blunting of costophrenic angle (>300 mL); homogeneous opacity with meniscus sign; tracheal deviation with massive effusion\n\u2022 Bedside USS: detects effusions >20 mL; guides safe thoracentesis; identifies loculations\n\u2022 Thoracentesis (diagnostic and/or therapeutic): for new, unilateral, moderate--large unexplained effusion not attributable to CCF/cirrhosis/renal failure --- send for protein, LDH, glucose, pH, cell count/differential, M/C/S, cytology (3 samples improves yield)\n\u2022 CT chest (with contrast): characterises pleural disease, detects pleural thickening/nodularity (malignancy/mesothelioma), guides biopsy\n\u2022 Pleural biopsy: image-guided (CT or USS) for suspected TB or malignancy when cytology negative"}},{"name":"Pulmonary Embolism","stars":3,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"\u2022 Obstruction of pulmonary arterial system by thrombus (>95%), fat, air, amniotic fluid, or tumour embolus\n\u2022 Thrombus arises from DVT (lower limb >upper limb); Virchow's triad: venous stasis, endothelial injury, hypercoagulability\n\u2022 Haemodynamic consequence: increased right ventricular afterload \u2192 RV dilation \u2192 interventricular septal shift \u2192 LV underfilling \u2192 reduced cardiac output \u2192 cardiogenic shock (massive PE)\n\u2022 Massive PE: haemodynamic instability (SBP <90 mmHg); submassive PE: haemodynamically stable + RV dysfunction; low-risk PE: no RV dysfunction, low PESI score","Risk Factors":"\u2022 Major: recent surgery (especially orthopaedic hip/knee), prolonged immobilisation/hospitalisation, active malignancy, previous DVT/PE, inherited thrombophilia (Factor V Leiden, prothrombin mutation, antiphospholipid syndrome)\n\u2022 Moderate: pregnancy/postpartum, combined oral contraceptive pill, HRT, long-haul air travel, central venous catheters\n\u2022 Minor: obesity, immobility, inflammatory bowel disease, nephrotic syndrome, age >50 years","Symptoms (History)":"\u2022 Sudden onset dyspnoea (most common symptom; often disproportionate to clinical findings)\n\u2022 Pleuritic chest pain (infarction of peripheral pulmonary tissue --- associated haemoptysis)\n\u2022 Haemoptysis (pulmonary infarction); non-productive cough\n\u2022 Syncope or presyncope (massive PE with reduced cardiac output)\n\u2022 Leg pain/swelling (concurrent DVT present in \\~50%)\n\u2022 Massive PE: collapse, profound dyspnoea, cardiovascular shock","Treatment":"\u2022 Anticoagulation (cornerstone): DOACs preferred --- rivaroxaban (15 mg BD \u00d7 21 days then 20 mg daily) or apixaban (10 mg BD \u00d7 7 days then 5 mg BD); dabigatran and edoxaban after initial LMWH\n\u2022 LMWH (enoxaparin) \u2192 warfarin (INR 2.0--3.0) if DOAC contraindicated (renal failure, pregnancy, malignancy)\n\u2022 Duration: provoked (reversible risk factor) 3 months; unprovoked 6--12 months or indefinite; cancer-associated thrombosis: rivaroxaban or LMWH for \u22656 months (PBS-listed)\n\u2022 Massive PE (haemodynamically unstable): systemic thrombolysis (alteplase 100 mg over 2 h) or surgical embolectomy/catheter-directed thrombolysis if thrombolysis contraindicated; immediate IV unfractionated heparin prior to definitive therapy\n\u2022 Low-risk PE (simplified PESI = 0): consider outpatient treatment or early discharge\n\u2022 Graduated compression stockings for DVT; IVC filter only if anticoagulation absolutely contraindicated\n\u2022 Long-term: reassess for CTEPH (investigate if dyspnoea/fatigue persists 3--6 months post-PE with V/Q scan + echo)","Investigations":"\u2022 Risk stratification: Wells score (PE likely \u22655; PE unlikely \u22644) or simplified Wells score (likely \u22652; unlikely \u22641)\n\u2022 PERC rule: if Wells 'unlikely' and low pre-test probability --- all 8 PERC criteria negative rules out PE without D-dimer\n\u2022 D-dimer (high-sensitivity ELISA): use if Wells score 'unlikely'; negative result effectively rules out PE (NPV >99.7%); age-adjusted cut-off (age \u00d7 10 \u00b5g/L if >50 years)\n\u2022 CTPA: investigation of choice when Wells 'likely' or D-dimer positive; definitive diagnosis; also assess RV:LV ratio for risk stratification\n\u2022 V/Q scan: preferred if CTPA contraindicated (contrast allergy, renal impairment, pregnancy, age <55 with normal CXR)\n\u2022 Echo (bedside TTE): RV dilation/dysfunction, septal shift, McConnell sign --- critical in haemodynamically unstable patient; ABG: type 1 respiratory failure, hypocapnia"}},{"name":"Lung Cancer","stars":3,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"\u2022 Most common cancer-related death in Australia; \\~14,000 new cases/year\n\u2022 Non-small cell lung cancer (NSCLC): \\~85% of cases --- adenocarcinoma (commonest, often peripheral, EGFR/ALK mutations), squamous cell carcinoma (central, cavitating, associated with smoking), large cell carcinoma\n\u2022 Small cell lung cancer (SCLC): \\~15%; highly aggressive, neuroendocrine origin, strongly smoking-related, rapid doubling time, early metastasis; paraneoplastic syndromes common\n\u2022 Smoking is the dominant cause; carcinogens cause DNA damage (p53, KRAS, EGFR mutations); radon gas second leading cause\n\u2022 Oncogenic driver mutations (EGFR, ALK, ROS1, BRAF, MET exon 14) targetable with tyrosine kinase inhibitors","Risk Factors":"\u2022 Cigarette smoking (accounts for \\~85% of cases; risk proportional to pack-year history)\n\u2022 Passive/secondhand smoke exposure\n\u2022 Occupational exposures: asbestos (synergistic with smoking), arsenic, chromium, radon (underground miners), silica, diesel exhaust\n\u2022 Family history of lung cancer; prior lung cancer or head/neck cancer\n\u2022 Existing lung disease: COPD, pulmonary fibrosis, bronchiectasis\n\u2022 Radon exposure in poorly ventilated spaces","Symptoms (History)":"\u2022 Central tumour (squamous/SCLC): persistent cough, haemoptysis, stridor, obstructive pneumonia (recurrent lobar pneumonia), wheeze (endobronchial obstruction)\n\u2022 Peripheral tumour (adenocarcinoma): often asymptomatic until advanced; pleuritic chest pain (pleural invasion), dyspnoea\n\u2022 Local invasion: superior vena cava (SVC) obstruction (facial/arm swelling, suffusion), Pancoast tumour (shoulder/arm pain, Horner's syndrome = ptosis, miosis, anhidrosis), recurrent laryngeal nerve palsy (hoarse voice), phrenic nerve palsy\n\u2022 Metastatic symptoms: bone pain, headache/neurological (brain), jaundice (liver), weight loss\n\u2022 Paraneoplastic syndromes (especially SCLC): SIADH (hyponatraemia), ACTH (Cushing's), Lambert-Eaton myasthenic syndrome, hypercalcaemia (PTHrP --- squamous cell), clubbing/HPOA","Treatment":"\u2022 Stage I--II NSCLC: surgical resection (lobectomy via VATS or open thoracotomy) \u00b1 adjuvant chemotherapy (stage II); stereotactic ablative body radiotherapy (SABR) if inoperable\n\u2022 Stage III NSCLC: concurrent chemoradiotherapy \u00b1 durvalumab (immunotherapy) consolidation\n\u2022 Stage IV NSCLC with driver mutation: targeted therapy (e.g. osimertinib for EGFR, alectinib for ALK) --- first-line, PBS-listed\n\u2022 Stage IV NSCLC without driver mutation: immunotherapy \u00b1 chemotherapy (pembrolizumab \u00b1 carboplatin/pemetrexed or paclitaxel); PD-L1 expression guides choice\n\u2022 SCLC limited: concurrent chemoradiotherapy (cisplatin + etoposide); prophylactic cranial irradiation (PCI) if response\n\u2022 SCLC extensive: chemotherapy (carboplatin + etoposide) \u00b1 atezolizumab/durvalumab; median survival \\~10--12 months\n\u2022 Palliative care: early integration regardless of stage; endobronchial stenting for obstruction; pleurodesis/IPC for malignant effusions; radiotherapy for bone/brain metastases","Investigations":"\u2022 CXR: mass, hilar enlargement, pleural effusion, collapse, rib destruction; however sensitivity only 75% --- CT is essential\n\u2022 CT chest/abdomen/pelvis (with contrast): characterise tumour, mediastinal nodes, pleural/pericardial involvement, adrenal/liver metastases; CT-guided biopsy for peripheral lesions\n\u2022 PET-CT: staging and identifying occult metastases; guides resectability\n\u2022 Bronchoscopy + BAL + biopsy: for central lesions; EBUS (endobronchial ultrasound) for mediastinal node sampling\n\u2022 Tissue biopsy (mandatory): histological type + molecular profiling (EGFR, ALK, PD-L1, ROS1, BRAF, KRAS, MET) --- essential to guide targeted therapy and immunotherapy\n\u2022 MRI brain: all patients with potentially resectable NSCLC, or SCLC; bone scan if clinical suspicion of bone mets\n\u2022 PFTs (spirometry, DLCO): pre-operative assessment for surgical candidates\n\u2022 Staging: NSCLC TNM (Stage I--IV); SCLC: limited vs extensive disease"}},{"name":"Obstructive Sleep Apnoea","stars":3,"category":"Respiratory Conditions","subcategory":"Respiratory Conditions","sections":{"Cause / Aetiology":"\u2022 Repetitive complete (apnoea) or partial (hypopnoea) upper airway obstruction during sleep, causing arousal, oxygen desaturation, and sleep fragmentation\n\u2022 Pathophysiology: reduced upper airway dilator muscle tone during sleep + anatomically narrow airway \u2192 pharyngeal collapse at end of expiration\n\u2022 Severity classified by apnoea-hypopnoea index (AHI): mild (5--14 events/h), moderate (15--29/h), severe (\u226530/h)\n\u2022 Epidemiology: affects \\~5--10% of Australians; highly underdiagnosed; more common in middle-aged men and post-menopausal women","Risk Factors":"\u2022 Obesity (BMI \u226530 kg/m\u00b2) --- strongest modifiable risk factor; neck circumference >40 cm (men >42 cm, women >39 cm)\n\u2022 Male sex; postmenopausal female; increasing age (>50 years)\n\u2022 Craniofacial anatomy: retrognathia, micrognathia, maxillary hypoplasia, macroglossia, tonsillar hypertrophy, nasal obstruction\n\u2022 Alcohol, sedatives, opioids (reduce upper airway muscle tone)\n\u2022 Family history; hypothyroidism; acromegaly","Symptoms (History)":"\u2022 Witnessed apnoeas (bed partner report) --- highly specific\n\u2022 Loud snoring, nocturnal choking or gasping arousals\n\u2022 Fragmented non-restorative sleep; nocturia; morning headaches; dry mouth\n\u2022 Excessive daytime sleepiness (Epworth Sleepiness Scale \u22658); fatigue, poor concentration, impaired cognitive function, irritability, mood disturbance\n\u2022 Women may present atypically: fatigue, insomnia, depression rather than classic snoring/apnoea\n\u2022 Risk: motor vehicle accidents (patients have 3\u00d7 risk); relationship difficulties; occupational impairment\n\u2022 Use OSA50 questionnaire (validated in Australian primary care) or STOP-Bang for screening","Treatment":"\u2022 CPAP (continuous positive airway pressure): first-line for moderate--severe OSA or symptomatic mild OSA; pneumatic splint maintaining airway patency; minimum 4 h/night usage; most effective treatment\n\u2022 Mandibular advancement splint (MAS): effective for mild--moderate OSA or CPAP-intolerant patients; custom-fitted by dentist\n\u2022 Positional therapy: if OSA predominantly supine; devices to prevent supine sleep position\n\u2022 Weight loss: strongly recommended; 10% weight loss can reduce AHI by up to 26%; GLP-1 agonists (tirzepatide) showing benefit in trials\n\u2022 Upper airway surgery: uvulopalatopharyngoplasty (UPPP), tonsillectomy (if tonsillar obstruction), maxillomandibular advancement --- selected anatomical abnormalities\n\u2022 Hypoglossal nerve stimulation (Inspire): PBS-listed for moderate--severe OSA intolerant of CPAP\n\u2022 Address cardiovascular risk factors (HTN, AF); mandatory reporting obligations for commercial/heavy vehicle drivers in Australia (notify licensing authority)","Investigations":"\u2022 Overnight sleep study (polysomnography, PSG) --- gold standard: Level 1 (attended full PSG in laboratory) or Level 2 (unattended home PSG); Level 3 (home cardiorespiratory study, 4--6 channels) acceptable for straightforward presentations\n\u2022 Medicare rebate for Level 1/2 PSG: requires positive OSA screening questionnaire (OSA50 \u22655 or STOP-Bang \u22653) + ESS \u22658, OR specialist referral\n\u2022 AHI \u22655 confirms OSA; AHI \u226530 = severe\n\u2022 TFT (hypothyroidism), IGF-1 (acromegaly) if clinically indicated; ECG; echocardiogram if pulmonary hypertension suspected\n\u2022 Epworth Sleepiness Scale for quantifying a
